<style>

  #start-btn { position: absolute !important; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) !important; width: 80px !important; height: 80px !important; border-radius: 50% !important; border: 4px solid #fff !important; background: radial-gradient(circle, var(--primary) 40%, #800 100%) !important; color: #fff !important; font-family: 'Press Start 2P' !important; font-size: 10px !important; cursor: pointer !important; z-index: 999 !important; box-shadow: 0 0 20px var(--glow) !important; }

  .std-btn { width: 100%; padding: 15px; margin: 8px 0; font-size: 20px; border-radius: 10px; font-family: 'Bebas Neue'; cursor: pointer; border: none; background: var(--primary); color: #fff; box-shadow: 0 4px 0 #800; }

  .roster-header { font-family: 'Bebas Neue'; font-size: 18px; text-align: center; border-bottom: 2px solid #444; padding-bottom: 5px; margin-bottom: 5px; color: #aaa; }

  .opp-slot { opacity: 0.7; filter: grayscale(0.5); }

  .player-sprite { width: 45px; height: 60px; position: absolute; background-image: url('16-bit pixel art spr.jpg'); background-size: 400% 300%; background-position-y: 100%; image-rendering: pixelated; animation: runAnim 0.4s steps(4) infinite; z-index: 20; mix-blend-mode: screen; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  #main-sprite { left: 10%; top: 50%; transform: translateY(-50%); }
  @keyframes runAnim { from { background-position-x: 0%; } to { background-position-x: 133.33%; } }
  .stunned { animation: flashStun 0.1s infinite; filter: grayscale(1) brightness(2) !important; }
  @keyframes flashStun { 0% { opacity: 1; } 100% { opacity: 0.3; } }

  #animation-container, #kicker-container, #playoff-banner { display: none !important; }
  #tecmo-screen { height: 180px; width: 100%; position: relative; overflow: hidden; background: #2e7d32; border: 3px solid #fff; border-radius: 12px; }
  
  /* Hard-locked heights to prevent Jittering */
  #sim-scoreboard { font-family: 'Press Start 2P'; font-size: 14px; color: #0f0; margin-bottom: 5px; height: 16px; line-height: 16px; display: block; overflow: hidden; white-space: nowrap; }
  #live-record { font-family: 'Press Start 2P'; font-size: 10px; color: #fff; margin-bottom: 12px; height: 12px; line-height: 12px; display: block; overflow: hidden; white-space: nowrap; }

  .goal-field-top { width: 100%; height: 320px; background: #1b5e20; background-image: repeating-linear-gradient(0deg, #1b5e20, #1b5e20 40px, #246b28 40px, #246b28 80px); position: relative; border: 4px solid #fff; border-radius: 15px; overflow: hidden; }
  .endzone { position: absolute; top: 0; left: 0; width: 100%; height: 60px; background: #003366; border-bottom: 4px solid #fff; z-index: 5; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; font-size: 30px; color: rgba(255,255,255,0.3); letter-spacing: 5px; }
  .top-uprights { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); width: 100px; height: 12px; border-bottom: 6px solid #ffd700; display: flex; justify-content: space-between; z-index: 15; }
  .post-tip { width: 8px; height: 35px; background: #ffd700; margin-top: -35px; border-radius: 2px; }

  #traj-line { position: absolute; height: 4px; background: rgba(255,255,255,0.7); border: 1px dashed #fff; transform-origin: left center; display: none; pointer-events: none; z-index: 90; }
  
  #results { background:#111; border-radius:10px; padding:15px; margin-top:10px; display:none; max-height: 400px; overflow-y: auto; border: 2px solid var(--primary); }
  #results-table { font-family: 'Press Start 2P'; font-size: 7px; width: 100%; border-collapse: collapse; background: #000; }
  #results-table td { padding: 8px; border-bottom: 1px solid #333; }
  #playoff-banner { background: #ffb300; color: #000; font-family: 'Press Start 2P'; font-size: 14px; padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: center; border: 4px solid #fff; }
  #room-code-display { font-family: 'Press Start 2P'; font-size: 12px; color: #ffb300; margin-bottom: 10px; text-align: center; }
</style></head><body>

<div id="main-menu">
  <h1 style="font-family:'Bebas Neue'; font-size: 45px; color: var(--primary);">FOOTBALL ARCADE</h1>
  <input type="text" id="team-name-input" class="menu-input" placeholder="ENTER TEAM NAME" maxlength="12">

</div>

<div id="lobby-menu">
  <h1 style="font-family:'Bebas Neue'; font-size: 45px; color: var(--primary);">VERSUS LOBBY</h1>
  <button class="std-btn" style="width: 260px; margin-bottom: 30px;" onclick="createRoom()">CREATE NEW ROOM</button>
  <div style="font-family: 'Press Start 2P'; font-size: 10px; color: #666; margin-bottom: 15px;">- OR -</div>
  <input type="text" id="room-code-input" class="menu-input" placeholder="ENTER 4-LETTER CODE" maxlength="4">
  <button class="std-btn" style="width: 260px; background: #013369;" onclick="joinRoom()">JOIN ROOM</button>
</div>

<div class="audio-dashboard">
  <button id="mute-toggle" onclick="toggleMute()">🔊</button>
  <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateVolume()">
</div>

<div class="main-container" id="game-ui">
  <div id="room-code-display"></div>
  <div id="playoff-banner">PLAYOFFS</div>
  <div class="glass-card" id="draft-board-container">
    <h1 id="ui-team-name">NAME</h1>
    <div class="team-logo-container">
      <div id="team-logo-emoji">🏈</div>
      <div id="spun-team-name"></div>
      <button id="start-btn" onclick="spinTeam()">SPIN</button>
    </div>
    <div id="selection-controls">
      <select id="position-select" onchange="updateDropdown()" disabled style="width:100%; padding:15px; margin:8px 0; background:#111; color:#fff; border:2px solid var(--primary); font-family:'Bebas Neue';"><option value="QB">QB</option><option value="RB">RB</option><option value="WR">WR</option><option value="TE">TE</option><option value="Defense">DEF</option><option value="Coach">HC</option></select>
      <select id="player-select" disabled style="width:100%; padding:15px; margin:8px 0; background:#111; color:#fff; border:2px solid var(--primary); font-family:'Bebas Neue';"><option>...</option></select>
      <button id="draft-btn" class="std-btn" onclick="draftPlayer()" disabled>LOCK PICK</button>
    </div>
  </div>

  <div class="glass-card" id="roster-slots">
    <div class="draft-grid draft-grid-solo" id="main-draft-grid">
      <div>
        <div class="roster-header">YOUR TEAM</div>
        <div id="roster-QB" class="roster-slot"><div class="avatar-box">🏈</div><div class="player-name">---</div></div>
        <div id="roster-RB" class="roster-slot"><div class="avatar-box">🏃</div><div class="player-name">---</div></div>
        <div id="roster-WR" class="roster-slot"><div class="avatar-box">👐</div><div class="player-name">---</div></div>
        <div id="roster-TE" class="roster-slot"><div class="avatar-box">💪</div><div class="player-name">---</div></div>
        <div id="roster-Defense" class="roster-slot"><div class="avatar-box">🛡️</div><div class="player-name">---</div></div>
        <div id="roster-Coach" class="roster-slot"><div class="avatar-box">📋</div><div class="player-name">---</div></div>
      </div>
      <div id="opp-roster-col" style="display:none;">
        <div class="roster-header">OPPONENT</div>
        <div id="opp-QB" class="roster-slot opp-slot"><div class="avatar-box">🏈</div><div class="player-name">---</div></div>
        <div id="opp-RB" class="roster-slot opp-slot"><div class="avatar-box">🏃</div><div class="player-name">---</div></div>
        <div id="opp-WR" class="roster-slot opp-slot"><div class="avatar-box">👐</div><div class="player-name">---</div></div>
        <div id="opp-TE" class="roster-slot opp-slot"><div class="avatar-box">💪</div><div class="player-name">---</div></div>
        <div id="opp-Defense" class="roster-slot opp-slot"><div class="avatar-box">🛡️</div><div class="player-name">---</div></div>
        <div id="opp-Coach" class="roster-slot opp-slot"><div class="avatar-box">📋</div><div class="player-name">---</div></div>
      </div>
    </div>
    <button id="sim-btn" class="std-btn" onclick="triggerSMG()" style="margin-top: 15px; background: #28a745; display:none;">START SEASON SIM</button>
  </div>
  
  <button id="playoff-start-btn" class="std-btn" onclick="startPlayoffGame()" style="margin-top: 15px; background: #ffb300; color:#000; display:none;">START PLAYOFF GAME</button>
  <div id="kicker-container"><div id="kick-msg" style="color:#0f0; font-family:'Press Start 2P'; font-size:10px; height:15px; margin-bottom:8px; text-align: center;">...</div><div class="goal-field-top" id="fg-field"><div class="endzone">TOUCHDOWN</div><div class="top-uprights" id="uprights-ui"><div class="post-tip"></div><div class="post-tip"></div></div><div id="traj-line"></div><div id="ball-top"></div></div></div>
  <div id="animation-container">
    <div id="sim-scoreboard">WEEK 1 vs ???</div>
    <div id="live-record">RECORD: 0-0</div>
    <div id="tecmo-screen"><div id="main-sprite" class="player-sprite">🏈</div></div>
  </div>
  <div id="results"></div>
  <button id="reset-btn" class="std-btn" onclick="location.reload()" style="display:none; background:#444;">NEW DRAFT</button>
</div>

<script>
  // ==========================================
  // 1. FIREBASE INITIALIZATION
  // ==========================================
  const firebaseConfig = {
  apiKey: "AIzaSyBzpnpvfs7IJqdUepimLuXVwwuyfG-0fbo",
  authDomain: "nfl-roster-28abd.firebaseapp.com",
  projectId: "nfl-roster-28abd",
  storageBucket: "nfl-roster-28abd.firebasestorage.app",
  messagingSenderId: "100140500341",
  appId: "1:100140500341:web:10a4370de8e7d3ffa57f3c",
  measurementId: "G-DC1SVDE42B"
};
  
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ==========================================
  // 2. GAME STATE & VARIABLES
  // ==========================================
  let isMultiplayer = false, currentRoomId = null, localPlayerId = null, opponentId = null, globallyDraftedPlayers = [], opponentConnected = false;
  let rosterData = {}, draftedTeams = [], draftedPlayers = [], roster = {QB:null,RB:null,WR:null,TE:null,Defense:null,Coach:null}, currentTeam;
  let audioCtx, gainNode, vol = 0.5, isMuted = false, lockedCount = 0, bonusWins = 0, playerTop = 50, dodges = 0, gameActive = false, isStunned = false, isPlayoffMode = false, playoffRound = 1;
  let seasonSchedule = [], teamHype = 1.0, teamPower = 1.0, baseSimWins = 0, baseSimLosses = 0;
  
  const emojiMap = {
    "Arizona Aviators":"🛩️", "Atlanta Raptors":"🦅", "Baltimore Crows":"🐦‍⬛", "Buffalo Stampede":"🦬", "Carolina Cougars":"🐆", "Chicago Grizzlies":"🐻", "Cincinnati Tigers":"🐅", "Cleveland Bulldogs":"🐶", "Dallas Deputies":"🤠", "Denver Stallions":"🐴", "Detroit Prowlers":"🦁", "Green Bay Grinders":"🧀", "Houston Outlaws":"🤠", "Indianapolis Cavalry":"🐎", "Jacksonville Wildcats":"🐆", "Kansas City Kings":"👑", "Las Vegas Bandits":"🦹", "LA Currents":"⚡", "LA Horns":"🐏", "Miami Sharks":"🦈", "Minnesota Norsemen":"🛡️", "New England Minutemen":"🇺🇸", "New Orleans Archangels":"⚜️", "NY Pilots":"✈️", "NY Titans":"🗽", "Philadelphia Hawks":"🦅", "Pittsburgh Ironmen":"🏗️", "SF Gold Rush":"⛏️", "Seattle Ospreys":"🦅", "Tampa Bay Corsairs":"🏴‍☠️", "Tennessee Spartans":"⚔️", "Washington Sentinels":"🏛️"
  };
  
  const teamThemes = { 
    "Arizona Aviators":["#97233f","#000000"], "Atlanta Raptors":["#a71930","#000000"], "Baltimore Crows":["#241773","#000000"], "Buffalo Stampede":["#00338d","#c60c30"], "Carolina Cougars":["#0085ca","#000000"], "Chicago Grizzlies":["#0b162a","#c83803"], "Cincinnati Tigers":["#fb4f14","#000000"], "Cleveland Bulldogs":["#311d00","#ff3c00"], "Dallas Deputies":["#002244","#869397"], "Denver Stallions":["#fb4f14","#002244"], "Detroit Prowlers":["#0076b6","#b0b7bc"], "Green Bay Grinders":["#203731","#ffb612"], "Houston Outlaws":["#03202f","#a71930"], "Indianapolis Cavalry":["#002c5f","#a5acaf"], "Jacksonville Wildcats":["#006778","#9f792c"], "Kansas City Kings":["#e31837","#ffb612"], "Las Vegas Bandits":["#a5acaf","#000000"], "LA Currents":["#0073cf","#ffb612"], "LA Horns":["#002244","#b3995d"], "Miami Sharks":["#008e97","#f26a24"], "Minnesota Norsemen":["#4f2683","#ffc62f"], "New England Minutemen":["#002244","#c60c30"], "New Orleans Archangels":["#d3bc8d","#000000"], "NY Pilots":["#003f2d","#ffffff"], "NY Titans":["#0b2265","#a71930"], "Philadelphia Hawks":["#004c54","#a5acaf"], "Pittsburgh Ironmen":["#000000","#ffb612"], "SF Gold Rush":["#aa0000","#b3995d"], "Seattle Ospreys":["#002244","#69be28"], "Tampa Bay Corsairs":["#d50a0a","#000000"], "Tennessee Spartans":["#4b92db","#0c2340"], "Washington Sentinels":["#5a1414","#ffb612"] 
  };

  function initAudio() { if(!audioCtx) { audioCtx = new AudioContext(); gainNode = audioCtx.createGain(); gainNode.connect(audioCtx.destination); updateVolume(); } }
  function toggleMute() { isMuted = !isMuted; document.getElementById("mute-toggle").innerText = isMuted ? "🔇" : "🔊"; if(gainNode) gainNode.gain.value = isMuted ? 0 : vol * 0.1; }
  function updateVolume() { vol = document.getElementById("volume-slider").value; if(gainNode) gainNode.gain.value = isMuted ? 0 : vol * 0.1; }
  function playNote(f, d = 0.1) { initAudio(); if(isMuted) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = 'square'; o.frequency.value = f; g.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d); }

  function setMode(m) { 
    isMultiplayer = (m === 'vs');
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); 
    document.getElementById(m + '-btn').classList.add('active'); 
  }

  function initiateGameFlow() { 
    const n = document.getElementById('team-name-input').value; 
    if(!n) return alert("ENTER TEAM NAME"); 
    if (Object.keys(rosterData).length === 0) return alert("Roster data is still loading. Please wait a second and try again.");
    
    document.getElementById('ui-team-name').innerText = n.toUpperCase(); 
    document.getElementById('main-menu').style.display = 'none'; 
    initAudio();

    const grid = document.getElementById('main-draft-grid');
    grid.classList.remove('draft-grid-solo', 'draft-grid-multi');

    if(isMultiplayer) {
      document.getElementById('lobby-menu').style.display = 'flex';
      document.getElementById('opp-roster-col').style.display = 'block';
      grid.classList.add('draft-grid-multi');
    } else {
      document.getElementById('game-ui').style.display = 'block'; 
      grid.classList.add('draft-grid-solo');
    }
  }

  // ==========================================
  // 3. MULTIPLAYER LOBBY & DISCONNECT LOGIC
  // ==========================================
  function createRoom() {
    currentRoomId = Math.random().toString(36).substring(2, 6).toUpperCase();
    localPlayerId = 'player1'; opponentId = 'player2';
    const roomRef = db.ref('rooms/' + currentRoomId);
    roomRef.onDisconnect().remove();
    roomRef.set({ player1: { name: document.getElementById('team-name-input').value, roster: {QB:"",RB:"",WR:"",TE:"",Defense:"",Coach:""} } });
    transitionToDraftBoard("ROOM CODE: " + currentRoomId); listenToRoom();
  }

  function joinRoom() {
    const code = document.getElementById('room-code-input').value.toUpperCase();
    if(!code) return alert("ENTER A ROOM CODE");
    const roomRef = db.ref('rooms/' + code);
    roomRef.once('value', (snapshot) => {
      if(snapshot.exists() && !snapshot.val().player2) {
        currentRoomId = code; localPlayerId = 'player2'; opponentId = 'player1';
        const p2Ref = db.ref('rooms/' + currentRoomId + '/player2');
        p2Ref.onDisconnect().remove();
        roomRef.update({ player2: { name: document.getElementById('team-name-input').value, roster: {QB:"",RB:"",WR:"",TE:"",Defense:"",Coach:""} } });
        transitionToDraftBoard("CONNECTED TO: " + currentRoomId); listenToRoom();
      } else { alert("ROOM FULL OR NOT FOUND"); }
    });
  }

  function transitionToDraftBoard(msg) { document.getElementById('lobby-menu').style.display = 'none'; document.getElementById('game-ui').style.display = 'block'; document.getElementById('room-code-display').innerText = msg; }

  function listenToRoom() {
    db.ref('rooms/' + currentRoomId).on('value', (snapshot) => {
      const data = snapshot.val();
      if (!data && opponentConnected) { alert("ROOM CLOSED: Host disconnected. Returning to Main Menu."); location.reload(); return; }
      if (!data) return;
      if (data[opponentId]) opponentConnected = true;
      if (opponentConnected && !data[opponentId]) { alert("OPPONENT DISCONNECTED: Match voided. Returning to Main Menu."); location.reload(); return; }

      globallyDraftedPlayers = [];
      if(data.player1 && data.player1.roster) Object.values(data.player1.roster).forEach(p => { if(p) globallyDraftedPlayers.push(p); });
      if(data.player2 && data.player2.roster) Object.values(data.player2.roster).forEach(p => { if(p) globallyDraftedPlayers.push(p); });

      if(data[opponentId] && data[opponentId].roster) {
        for (const [pos, player] of Object.entries(data[opponentId].roster)) {
          if(player) {
            document.getElementById(`opp-${pos}`).querySelector(".player-name").innerText = player;
            document.getElementById(`opp-${pos}`).style.background = "#28a745"; 
          }
        }
      }
      updateDropdown(); 
    });
  }

  // ==========================================
  // 4. MODIFIED DRAFT LOGIC WITH EMOJIS & NAMES
  // ==========================================
  function spinTeam() {
    if (!rosterData || Object.keys(rosterData).length === 0) return alert("Rosters haven't loaded yet!");
    initAudio(); 
    const btn = document.getElementById("start-btn"), emojiDiv = document.getElementById("team-logo-emoji"), nameDiv = document.getElementById("spun-team-name");
    btn.style.display = "none"; emojiDiv.style.display = "block"; nameDiv.style.display = "block";
    
    const available = Object.keys(rosterData).filter(t => !draftedTeams.includes(t));
    let count = 0; 
    
    function perform() {
      const name = available[Math.floor(Math.random()*available.length)];
      emojiDiv.innerText = emojiMap[name] || "🏈";
      nameDiv.innerText = name.toUpperCase();
      playNote(150 + count*20, 0.05); 
      if(count++ < 12) {
        setTimeout(perform, 80); 
      } else { 
        currentTeam = name; 
        loadRoster(); 
      }
    } 
    perform();
  }

  function loadRoster() { ["position-select","player-select","draft-btn"].forEach(id => document.getElementById(id).disabled=false); updateDropdown(); }
  
  function updateDropdown() {
    const pos = document.getElementById("position-select").value, sel = document.getElementById("player-select");
    sel.innerHTML = "";
    let list = (pos==="Defense") ? [`${currentTeam} D/ST`] : (pos==="Coach") ? [rosterData[currentTeam]["Coach"]] : rosterData[currentTeam][pos];
    list.forEach(p => { 
      if(!draftedPlayers.includes(p) && !globallyDraftedPlayers.includes(p)) { let o = document.createElement("option"); o.innerText=p; o.value=p; sel.appendChild(o); } 
    });
  }

  function draftPlayer() {
    const posSelect = document.getElementById("position-select");
    const pos = posSelect.value, p = document.getElementById("player-select").value;
    if(!p) return;
    
    roster[pos] = p; draftedPlayers.push(p); draftedTeams.push(currentTeam); lockedCount++;
    playNote(220); setTimeout(() => playNote(110, 0.2), 50);
    
    const slot = document.getElementById(`roster-${pos}`); slot.querySelector(".player-name").innerText = p;
    slot.style.background = teamThemes[currentTeam][0]; slot.style.borderLeft = `8px solid ${teamThemes[currentTeam][1]}`;
    
    if(isMultiplayer) db.ref(`rooms/${currentRoomId}/${localPlayerId}/roster`).update({ [pos]: p });

    posSelect.querySelector(`option[value="${pos}"]`).disabled = true;
    const nextOpt = Array.from(posSelect.options).find(opt => !opt.disabled);
    if(nextOpt) posSelect.value = nextOpt.value;

    if(lockedCount >= 6) { 
      document.getElementById("draft-board-container").style.display = "none"; 
      document.getElementById("sim-btn").style.display = "block"; 
    } else { 
      document.getElementById("start-btn").style.display = "block"; 
      document.getElementById("team-logo-emoji").style.display = "none"; 
      document.getElementById("spun-team-name").style.display = "none";
      ["position-select","player-select","draft-btn"].forEach(id => document.getElementById(id).disabled=true); 
    }
  }

  function calculateModifiers() { const getScore = (name) => name ? Array.from(name).reduce((sum, char) => sum + char.charCodeAt(0), 0) % 15 : 5; teamHype = 1.0 + ((getScore(roster.RB) + getScore(roster.WR) + getScore(roster.Coach)) / 100); teamPower = 1.0 + ((getScore(roster.QB) + getScore(roster.TE) + getScore(roster.Defense)) / 100); }
  
  function triggerSMG() { 
    document.getElementById("sim-btn").style.display="none"; 
    calculateModifiers();
    document.getElementById("animation-container").style.setProperty('display', 'block', 'important'); 
    const sprite = document.getElementById("main-sprite"), screen = document.getElementById("tecmo-screen"); 
    document.documentElement.style.setProperty('--primary', teamThemes[draftedTeams[0]][0]); 
    gameActive = true; baseSimWins = 0; baseSimLosses = 0; 
    const allT = Object.keys(rosterData); for(let i=0; i<17; i++) seasonSchedule.push(allT[Math.floor(Math.random()*allT.length)]); 
    screen.onmousemove = (e) => { if(!gameActive || isStunned) return; const rect = screen.getBoundingClientRect(); playerTop = Math.max(10, Math.min(90, ((e.clientY - rect.top) / rect.height) * 100)); sprite.style.top = playerTop + "%"; }; 
    let frame = 0; const loop = setInterval(() => { 
      const idx = Math.min(16, Math.floor(frame / 24)); 
      document.getElementById("sim-scoreboard").innerText = `WK ${idx+1} vs ${seasonSchedule[idx]}`; 
      if (frame > 0 && frame % 24 === 0 && idx <= 16) { 
        if (Math.random() > 0.45) baseSimWins++; else baseSimLosses++; 
        document.getElementById("live-record").innerText = `RECORD: ${baseSimWins}-${baseSimLosses}`; 
      } 
      if(frame % Math.floor(35 / teamHype) === 0) spawnDefender(teamThemes[seasonSchedule[idx]][0]); 
      if(frame++ > 400) { clearInterval(loop); gameActive = false; bonusWins = Math.floor(dodges/6); startFGMG(); } 
    }, 40); 
  }
  function spawnDefender(color) { const d = document.createElement("div"); d.className = "defender-16 player-sprite"; d.innerText = "🛡️"; d.style.top = Math.random()*70 + 15 + "%"; d.style.filter = `drop-shadow(0 0 10px ${color})`; document.getElementById("tecmo-screen").appendChild(d); let left = 110; const p = document.getElementById("main-sprite"); const dInt = setInterval(() => { left -= (3.5 * teamHype); d.style.left = left + "%"; if(left < 80 && !d.hit && p) { const pRect = p.getBoundingClientRect(); const dRect = d.getBoundingClientRect(); if (pRect.width > 0 && dRect.width > 0) { const padX = 15; const padY = 20; const isHit = !(pRect.right - padX < dRect.left + padX || pRect.left + padX > dRect.right - padX || pRect.bottom - padY < dRect.top + padY || pRect.top + padY > dRect.bottom - padY); if(isHit) { d.hit = true; isStunned = true; dodges = Math.max(0, dodges-2); playNote(80, 0.4); p.classList.add("stunned"); setTimeout(() => { isStunned = false; p.classList.remove("stunned"); }, 1200); } else if (left < 5 && !d.hit) { d.hit = true; dodges++; } } } if(left < -20) { clearInterval(dInt); d.remove(); } }, 30); }
  
  function startFGMG() { 
    document.getElementById("animation-container").style.setProperty('display', 'none', 'important'); 
    document.getElementById("kicker-container").style.setProperty('display', 'block', 'important'); 
    const ball = document.getElementById("ball-top"); const traj = document.getElementById("traj-line"); let isDragging = false, startX, startY; 
    ball.style.left = "50%"; ball.style.bottom = "52px"; ball.style.transform = "translateX(-50%) scale(1)"; 
    document.getElementById("kick-msg").innerText = `CLICK BALL, PULL BACK & RELEASE! PWR MULT: ${teamPower.toFixed(2)}x`; document.getElementById("kick-msg").style.color = "#0f0"; 
    ball.style.pointerEvents = 'auto'; 
    ball.onmousedown = (e) => { isDragging = true; startX = e.clientX; startY = e.clientY; traj.style.display = "block"; }; 
    window.onmousemove = (e) => { if(!isDragging) return; const dx = startX - e.clientX, dy = startY - e.clientY; const angle = Math.atan2(-dy, -dx); const dist = Math.min(120, Math.sqrt(dx*dx + dy*dy)); traj.style.left = "50%"; traj.style.bottom = "64px"; traj.style.width = dist + "px"; traj.style.transform = `rotate(${angle * 180 / Math.PI}deg)`; }; 
    window.onmouseup = (e) => { 
      if(!isDragging) return; isDragging = false; traj.style.display = "none"; ball.style.pointerEvents = 'none'; 
      playNote(150, 0.1); // Kick Audio
      launchBall((startX - e.clientX)/8, (startY - e.clientY)/8); 
    }; 
  }

  function launchBall(vx, vy) { 
    const ball = document.getElementById("ball-top"); let bx = 0, by = 52, scale = 1; const modifiedVx = vx * teamPower, modifiedVy = vy * teamPower; 
    const bLoop = setInterval(() => { 
      bx += modifiedVx; by -= modifiedVy; scale -= 0.012; 
      ball.style.left = `calc(50% + ${bx}px)`; ball.style.bottom = by + "px"; ball.style.transform = `translateX(-50%) scale(${Math.max(0.3, scale)})`; 
      if(by >= 280 || Math.abs(bx) > 200) { 
        clearInterval(bLoop); 
        const hit = by >= 280 && Math.abs(bx) < 45; 
        document.getElementById("kick-msg").innerText = hit ? "IT'S GOOD!" : "NO GOOD!"; 
        document.getElementById("kick-msg").style.color = hit ? "#0f0" : "#f00"; 
        
        // FGMG Success/Fail Audio Hooks
        if(hit) { playNote(500, 0.1); setTimeout(() => playNote(650, 0.3), 100); } 
        else { playNote(150, 0.3); setTimeout(() => playNote(100, 0.5), 250); }
        
        setTimeout(() => { if(isPlayoffMode) handlePlayoffResult(hit); else { bonusWins += hit ? 3 : -1; showFinal(); } }, 1200); 
      } 
    }, 20); 
  }

  function showFinal() {
    document.getElementById("kicker-container").style.display = "none";
    document.getElementById("roster-slots").style.display = "none";
    
    const totalWins = Math.max(0, Math.min(17, baseSimWins + bonusWins));
    const r = document.getElementById("results");

    // Dynamic Roast/Praise Evaluator
    let seasonEvaluation = "";
    if (totalWins >= 13) seasonEvaluation = "<div style='color:#0f0; font-family:\"Press Start 2P\"; font-size:10px; margin-top:15px; line-height:1.4;'>PRAISE: YOU BUILT A DYNASTY.</div>";
    else if (totalWins >= 9) seasonEvaluation = "<div style='color:#ffb300; font-family:\"Press Start 2P\"; font-size:10px; margin-top:15px; line-height:1.4;'>ANALYSIS: GOOD RUN, BUT ROOM TO IMPROVE.</div>";
    else seasonEvaluation = "<div style='color:#f00; font-family:\"Press Start 2P\"; font-size:10px; margin-top:15px; line-height:1.4;'>ROAST: ABSOLUTE DUMPSTER FIRE. FIRE THE GM.</div>";

    if (isMultiplayer) {
      db.ref(`rooms/${currentRoomId}/${localPlayerId}`).update({ wins: totalWins });
      
      r.innerHTML = `<h2 style="color: #ffb300; text-align: center;">WAITING FOR OPPONENT...</h2>`;
      r.style.display = "block";
      
      db.ref(`rooms/${currentRoomId}`).on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && data[localPlayerId]?.wins !== undefined && data[opponentId]?.wins !== undefined) {
          const myWins = data[localPlayerId].wins;
          const oppWins = data[opponentId].wins;
          
          let outcome = myWins > oppWins ? "VICTORY!" : myWins < oppWins ? "DEFEAT!" : "TIE GAME!";
          let outcomeColor = myWins > oppWins ? "#0f0" : myWins < oppWins ? "#f00" : "#ffb300";
          
          r.innerHTML = `
            <h1 style="color: ${outcomeColor}; text-align: center; font-size: 36px;">${outcome}</h1>
            <h2 style="text-align: center;">YOUR WINS: ${myWins}</h2>
            <h2 style="text-align: center; color: #888;">OPPONENT WINS: ${oppWins}</h2>
            ${seasonEvaluation}
          `;
          document.getElementById("reset-btn").style.display = "block";
          
          // Multiplayer Victory/Defeat Audio Hooks
          if(myWins > oppWins) { playNote(300, 0.1); setTimeout(()=>playNote(400,0.1),100); setTimeout(()=>playNote(500,0.4),200); confetti(); }
          else if(myWins < oppWins) { playNote(200, 0.3); setTimeout(()=>playNote(150,0.5),300); }
        }
      });
    } else {
      const allT = Object.keys(rosterData);
      let table = `<table id="results-table"><thead><tr><th>WK</th><th>OPP</th><th>SCORE</th><th>RES</th></tr></thead><tbody>`;
      for(let i=1; i<=17; i++) {
        const isW = i <= totalWins, opp = seasonSchedule[i-1];
        const s1 = isW ? Math.floor(Math.random()*17)+21 : Math.floor(Math.random()*21), s2 = isW ? Math.floor(Math.random()*s1) : Math.floor(Math.random()*17)+24;
        table += `<tr><td>${i}</td><td>${opp}</td><td>${s1}-${s2}</td><td>${isW?'W':'L'}</td></tr>`;
      }
      r.innerHTML = `<h2>RECORD: ${totalWins}-${17-totalWins}</h2>${table}</tbody></table>${seasonEvaluation}`;
      r.style.display = "block"; document.getElementById("reset-btn").style.display = "block";
      
      // Solo Mode Audio Hooks
      if(totalWins >= 10) { document.getElementById("playoff-start-btn").style.display = "block"; playNote(400, 0.1); setTimeout(()=>playNote(500, 0.1), 100); setTimeout(()=>playNote(600, 0.4), 200); }
      else { playNote(200, 0.3); setTimeout(()=>playNote(150, 0.5), 300); }
      if(totalWins >= 14) confetti();
    }
  }

  function startPlayoffGame() { isPlayoffMode = true; document.getElementById("results").style.display = "none"; document.getElementById("playoff-start-btn").style.display = "none"; document.getElementById("playoff-banner").style.setProperty('display', 'block', 'important'); document.getElementById("playoff-banner").innerText = playoffRound === 1 ? "SEMI-FINAL" : "SUPER BOWL"; startFGMG(); }
  function handlePlayoffResult(won) { if(won) { if(playoffRound === 1) { playoffRound = 2; setTimeout(startPlayoffGame, 1500); } else { showTrophy(); } } else { alert("Eliminated!"); location.reload(); } }
  function showTrophy() { 
    document.getElementById("kicker-container").style.display = "none"; 
    document.getElementById("roster-slots").style.display = "none"; 
    document.getElementById("results").style.display = "block"; 
    document.getElementById("results").innerHTML = "<h1>CHAMPIONS</h1>"; 
    playNote(400, 0.1); setTimeout(()=>playNote(500, 0.1), 100); setTimeout(()=>playNote(600, 0.4), 200);
    confetti(); 
  }

  // Restored Fetch Logic
  window.onload = async () => { 
    try { 
      const res = await fetch('rosters.json'); 
      if (!res.ok) throw new Error("File not found");
      rosterData = await res.json(); 
    } catch(e) { 
      console.error("Fetch failed, check your repo structure:", e);
      alert("Error loading rosters.json. Check the console.");
    } 
  };
</script></body></html>
