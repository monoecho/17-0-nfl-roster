<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17-0 NFL Roster Builder: 2026 Underground</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root { --primary: #d50a0a; --accent: #013369; --glow: rgba(213, 10, 10, 0.4); }
  body { font-family: 'Inter', sans-serif; background-color: #080808; color: #fff; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; }
  
  /* 20% LARGER PORTRAIT CONSTRAINT (From 450px to 540px) */
  .main-container { width: 100%; max-width: 540px; min-height: 100vh; padding: 20px; box-sizing: border-box; position: relative; }
  
  /* CRT SCANLINE OVERLAY */
  body::before { content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 1000; }
  
  .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9); margin-bottom: 20px; text-align: center; border-top: 6px solid var(--primary); transition: all 0.5s ease; position: relative; }
  
  /* BIGGER TITLES */
  h2 { font-family: 'Press Start 2P', cursive; font-size: 18px; text-shadow: 3px 3px 0 var(--primary); margin-bottom: 25px; line-height: 1.6; }
  
  select, button { width: 100%; padding: 20px; margin: 10px 0; font-size: 24px; border-radius: 10px; box-sizing: border-box; }
  select { background: #1a1a1a; color: #fff; border: 3px solid var(--primary); font-weight: bold; appearance: none; text-align: center; }
  button { font-family: 'Bebas Neue', sans-serif; background: var(--primary); color: white; border: none; cursor: pointer; text-transform: uppercase; }
  button:hover { filter: brightness(1.2); transform: scale(1.02); }

  .team-logo-container { height: 180px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); border-radius: 15px; margin-bottom: 15px; }
  #team-logo-img { max-height: 150px; display: none; filter: drop-shadow(0 0 20px var(--glow)); }

  .roster-slot { background: rgba(0,0,0,0.5); padding: 15px; margin: 8px 0; border-radius: 10px; border-left: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
  .slot-label { font-family: 'Press Start 2P', cursive; font-size: 10px; color: #555; }
  .player-name { font-weight: bold; font-size: 21px; color: #fff; }

  /* BIGGER SIMULATION BOX */
  #animation-container { display: none; margin: 25px 0; width: 100%; }
  #tecmo-screen { width: 100%; height: 180px; background-color: #2e7d32; position: relative; overflow: hidden; border: 4px solid #fff; border-radius: 10px; }
  .yard-line { width: 100%; height: 3px; background: rgba(255,255,255,0.4); position: absolute; animation: scrollField 0.6s linear infinite; }
  @keyframes scrollField { 0% { top: -10%; } 100% { top: 110%; } }
  .tecmo-player { width: 24px; height: 24px; background: var(--accent); position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); animation: run 1.5s infinite; box-shadow: 3px 3px 0 #000; }
  @keyframes run { 0%, 100% { left: 40%; } 50% { left: 60%; } }

  /* BIGGER SIM TEXT */
  #sim-scoreboard { font-family: 'Press Start 2P', cursive; font-size: 16px; color: #0f0; margin-bottom: 12px; text-shadow: 2px 2px #000; }
  #sim-event-ticker { color: #ffb300; font-family: 'Press Start 2P', cursive; font-size: 11px; margin-top: 15px; line-height: 1.4; min-height: 40px; }
  
  #results { display: none; padding: 30px; border-radius: 16px; border: 4px solid var(--primary); background: #111; line-height: 1.5; font-size: 20px; margin-top: 15px; }
  .center-flex { display: flex; flex-direction: column; align-items: center; width: 100%; }
</style>
</head>
<body>

<div class="main-container">
  <div class="glass-card" id="draft-section">
    <button id="mute-toggle" onclick="toggleMute()" style="width: auto; position: absolute; top: 15px; right: 15px; padding: 8px 12px; font-size: 12px; margin:0;">ON</button>
    <h2>UNDERGROUND<br>ROSTER BUILDER '26</h2>
    
    <div class="team-logo-container">
      <button id="start-btn" onclick="startFirstSpin()" style="font-size: 28px;">INSERT COIN</button>
      <img id="team-logo-img" src="">
    </div>

    <select id="position-select" onchange="updatePlayerDropdown()" disabled>
      <option value="QB">QB</option><option value="RB">RB</option><option value="WR">WR</option><option value="TE">TE</option><option value="Defense">DEF</option><option value="Coach">HC</option>
    </select>
    <select id="player-select" disabled><option>...</option></select>
    <button id="draft-btn" onclick="draftPlayer()" disabled>LOCK IN PICK</button>
  </div>

  <div id="challenge-banner" class="glass-card" style="display:none; border-color: #ffb300; background: rgba(255, 179, 0, 0.1);"></div>

  <div class="glass-card">
    <h3 style="font-family: 'Press Start 2P'; font-size: 11px; color: #777; margin-bottom: 15px;">ACTIVE ROSTER</h3>
    <div id="roster-QB" class="roster-slot"><span class="slot-label">QB</span><div class="player-name">---</div></div>
    <div id="roster-RB" class="roster-slot"><span class="slot-label">RB</span><div class="player-name">---</div></div>
    <div id="roster-WR" class="roster-slot"><span class="slot-label">WR</span><div class="player-name">---</div></div>
    <div id="roster-TE" class="roster-slot"><span class="slot-label">TE</span><div class="player-name">---</div></div>
    <div id="roster-Defense" class="roster-slot"><span class="slot-label">DEF</span><div class="player-name">---</div></div>
    <div id="roster-Coach" class="roster-slot"><span class="slot-label">HC</span><div class="player-name">---</div></div>
    
    <div class="center-flex">
      <button id="sim-btn" onclick="triggerSimulation()" style="display:none; background: #28a745;">SIMULATE SEASON</button>
      
      <div id="animation-container">
        <div id="sim-scoreboard">BOOTING...</div>
        <div id="tecmo-screen">
          <div class="yard-line" style="top: 20%;"></div>
          <div class="yard-line" style="top: 50%;"></div>
          <div class="yard-line" style="top: 80%;"></div>
          <div class="tecmo-player"></div>
        </div>
        <div id="sim-event-ticker">GENERATING SCHEDULE...</div>
      </div>

      <div id="results"></div>
      
      <button id="challenge-btn" onclick="handleChallengeAction()" style="display:none; background: #013369;">SHARE CHALLENGE</button>
      <button id="reset-btn" onclick="resetDraft()" style="display:none; background: #444;">NEW DRAFT</button>
    </div>
  </div>
</div>

<script>
  let isMuted = false;
  let audioCtx = null;
  let rosterData = null;
  let roster = { QB: null, RB: null, WR: null, TE: null, Defense: null, Coach: null };
  let draftedTeams = [];
  let currentTeam = null;
  let teamPower = 0;
  let finalWins = 0;
  let targetWinsToBeat = null;

  const logoMap = {
    "Arizona Cardinals": "ari", "Atlanta Falcons": "atl", "Baltimore Ravens": "bal", "Buffalo Bills": "buf", "Carolina Panthers": "car", "Chicago Bears": "chi", "Cincinnati Bengals": "cin", "Cleveland Browns": "cle", "Dallas Cowboys": "dal", "Denver Broncos": "den", "Detroit Lions": "det", "Green Bay Packers": "gb", "Houston Texans": "hou", "Indianapolis Colts": "ind", "Jacksonville Jaguars": "jax", "Kansas City Chiefs": "kc", "Las Vegas Raiders": "lv", "Los Angeles Chargers": "lac", "Los Angeles Rams": "lar", "Miami Dolphins": "mia", "Minnesota Vikings": "min", "New England Patriots": "ne", "New Orleans Saints": "no", "New York Giants": "nyg", "New York Jets": "nyj", "Philadelphia Eagles": "phi", "Pittsburgh Steelers": "pit", "San Francisco 49ers": "sf", "Seattle Seahawks": "sea", "Tampa Bay Buccaneers": "tb", "Tennessee Titans": "ten", "Washington Commanders": "wsh"
  };

  const teamThemes = {
    "Buffalo Bills": { p: "#00338D", s: "#C60C30", g: "rgba(0,51,141,0.5)" },
    "Kansas City Chiefs": { p: "#E31837", s: "#FFB612", g: "rgba(227, 24, 55, 0.5)" },
    "Dallas Cowboys": { p: "#003594", s: "#869397", g: "rgba(0, 53, 148, 0.5)" }
  };

  const elitePlayers = ["Bosch Mallon", "Hat-Trick Ma-Homes", "Crusty McRunnery", "L'Amour Action", "King Henry", "Joe Furrow", "Rock Sturdy", "Don Far-Baugh"];

  const simEvents = [
    "WEEK 1: QB throws a 70-yard moonshot!",
    "WEEK 4: Locker room fight over the last slice of pizza.",
    "WEEK 6: Defense intercepts a pass with their helmet!",
    "WEEK 9: HC loses his voice screaming at the ref.",
    "WEEK 12: RB breaks three ankles on a single run.",
    "WEEK 14: Snowstorm! Nobody can see the ball.",
    "WEEK 16: Miracle catch in the end zone!",
    "BYE WEEK: The team goes to a local taqueria.",
    "WEEK 2: Special Teams blunders a field goal.",
    "WEEK 10: The kicker hits the upright three times."
  ];

  function applyTheme(name) {
    const theme = teamThemes[name] || { p: "#d50a0a", s: "#013369", g: "rgba(213,10,10,0.4)" };
    document.documentElement.style.setProperty('--primary', theme.p);
    document.documentElement.style.setProperty('--accent', theme.s);
    document.documentElement.style.setProperty('--glow', theme.g);
  }

  function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  function playBlip() { if (isMuted || !audioCtx) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.type = 'square'; o.frequency.setValueAtTime(400, audioCtx.currentTime); g.gain.setValueAtTime(0.01, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime + 0.05); }

  function startFirstSpin() { initAudio(); document.getElementById("start-btn").style.display = "none"; spinTeam(); }

  function spinTeam() {
    const img = document.getElementById("team-logo-img"); img.style.display = "block";
    const available = Object.keys(rosterData).filter(t => !draftedTeams.includes(t));
    let count = 0; let delay = 40;
    function perform() {
      const name = available[Math.floor(Math.random() * available.length)];
      img.src = `https://a.espncdn.com/i/teamlogos/nfl/500/${logoMap[name] || 'nfl'}.png`;
      playBlip();
      if (count++ < 25) { delay += 10; setTimeout(perform, delay); }
      else { applyTheme(name); currentTeam = name; loadRoster(name); }
    }
    perform();
  }

  function loadRoster(name) {
    document.getElementById("position-select").disabled = false;
    document.getElementById("player-select").disabled = false;
    document.getElementById("draft-btn").disabled = false;
    updatePlayerDropdown();
  }

  function updatePlayerDropdown() {
    const pos = document.getElementById("position-select").value;
    const sel = document.getElementById("player-select"); sel.innerHTML = "";
    let list = (pos === "Defense") ? [`${currentTeam} D/ST`] : (pos === "Coach") ? [rosterData[currentTeam]["Coach"]] : rosterData[currentTeam][pos];
    list.forEach(p => { let o = document.createElement("option"); o.innerText = p; sel.appendChild(o); });
  }

  function draftPlayer() {
    const pos = document.getElementById("position-select").value;
    const p = document.getElementById("player-select").value;
    roster[pos] = p;
    if (elitePlayers.includes(p)) teamPower += 1.5;
    document.getElementById(`roster-${pos}`).querySelector(".player-name").innerText = p;
    draftedTeams.push(currentTeam);
    document.getElementById("position-select").remove(document.getElementById("position-select").selectedIndex);
    if (Object.values(roster).every(v => v !== null)) { document.getElementById("draft-section").style.display = "none"; document.getElementById("sim-btn").style.display = "block"; }
    else spinTeam();
  }

  function triggerSimulation() {
    document.getElementById("sim-btn").style.display = "none";
    document.getElementById("animation-container").style.display = "block";
    finalWins = Math.floor(Math.random() * 8) + 2 + Math.floor(teamPower);
    if (finalWins > 17) finalWins = 17;
    
    let step = 0;
    const totalSteps = 5;
    const ticker = document.getElementById("sim-event-ticker");
    const scoreboard = document.getElementById("sim-scoreboard");

    const timer = setInterval(() => {
      scoreboard.innerText = `RECORD: ${Math.floor((finalWins/totalSteps)*(step+1))}-${Math.floor(((17-finalWins)/totalSteps)*(step+1))}`;
      ticker.innerText = simEvents[Math.floor(Math.random() * simEvents.length)];
      
      if (step++ >= totalSteps - 1) {
        clearInterval(timer);
        setTimeout(showFinal, 1000);
      }
    }, 4000); // 4 SECOND DELAY PER STEP
  }

  function showFinal() {
    document.getElementById("animation-container").style.display = "none";
    const r = document.getElementById("results");
    let roast = "";
    if (finalWins === 17) roast = "🏆 UNTOUCHABLE. Perfection achieved. You are the GM GOAT.";
    else if (finalWins >= 12) roast = "🔥 ELITE. You built a monster. Enjoy the deep playoff run.";
    else if (finalWins >= 8) roast = "😐 MID. One-and-done playoff exit. Boring roster.";
    else if (finalWins >= 4) roast = "💩 STANKY. Your fans are burning their season tickets.";
    else roast = "🤡 WAR CRIME. This isn't a team, it's a circus. Fire everyone.";

    if (targetWinsToBeat !== null) {
      roast += `<br><hr><br>${finalWins > targetWinsToBeat ? "CHALLENGE WON! 🏆" : "CHALLENGE FAILED. 😭"}`;
    }

    r.innerHTML = `<h2 style="color:#0f0;">FINAL: ${finalWins}- ${17-finalWins}</h2><p>${roast}</p>`;
    r.style.display = "block";
    document.getElementById("challenge-btn").style.display = "block";
    document.getElementById("reset-btn").style.display = "block";
    if (finalWins >= 13) confetti({ particleCount: 250 });
  }

  function resetDraft() { window.location.href = window.location.origin + window.location.pathname; }

  async function handleChallengeAction() {
    const t = Object.values(roster).join(',');
    const url = `${window.location.origin}${window.location.pathname}?w=${finalWins}&t=${encodeURIComponent(t)}`;
    try {
      await navigator.clipboard.writeText(url);
      alert("Challenge Link Copied!");
    } catch (err) {
      alert("Error copying link. Use a modern browser!");
    }
  }

  function toggleMute() { isMuted = !isMuted; document.getElementById("mute-toggle").innerText = isMuted ? "OFF" : "ON"; }
  window.onload = async () => {
    const res = await fetch('rosters.json'); rosterData = await res.json();
    const params = new URLSearchParams(window.location.search);
    if(params.has('w')) {
      targetWinsToBeat = parseInt(params.get('w'));
      document.getElementById('challenge-banner').style.display = 'block';
      document.getElementById('challenge-banner').innerHTML = `<strong>⚠️ CHALLENGE ACTIVE ⚠️<br>Beat: ${targetWinsToBeat} Wins</strong>`;
    }
  };
</script>
</body>
</html>
