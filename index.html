<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17-0 NFL Roster Builder: Underground Field Goal Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root { --primary: #d50a0a; --accent: #013369; --glow: rgba(213, 10, 10, 0.4); }
  
  /* FIELD BACKGROUND */
  body { 
    font-family: 'Inter', sans-serif; 
    background-color: #2e7d32; 
    background-image: 
      linear-gradient(90deg, transparent 49%, rgba(255,255,255,0.3) 49%, rgba(255,255,255,0.3) 51%, transparent 51%),
      repeating-linear-gradient(0deg, #2e7d32, #2e7d32 100px, #388e3c 100px, #388e3c 200px);
    color: #fff; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; 
  }
  
  .main-container { width: 100%; max-width: 540px; min-height: 100vh; padding: 20px; box-sizing: border-box; position: relative; z-index: 5; }
  
  /* CRT SCANLINE OVERLAY */
  body::before { content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 1000; }
  
  .glass-card { background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(12px); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9); margin-bottom: 20px; text-align: center; border-top: 6px solid var(--primary); }
  
  h2 { font-family: 'Press Start 2P', cursive; font-size: 18px; text-shadow: 3px 3px 0 var(--primary); margin-bottom: 25px; line-height: 1.6; }
  
  select, button { width: 100%; padding: 20px; margin: 10px 0; font-size: 24px; border-radius: 10px; box-sizing: border-box; }
  select { background: #1a1a1a; color: #fff; border: 3px solid var(--primary); font-weight: bold; appearance: none; text-align: center; }
  button { font-family: 'Bebas Neue', sans-serif; background: var(--primary); color: white; border: none; cursor: pointer; text-transform: uppercase; }
  button:hover { filter: brightness(1.2); }

  .team-logo-container { height: 180px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 15px; margin-bottom: 15px; }
  #team-logo-img { max-height: 150px; display: none; filter: drop-shadow(0 0 20px var(--glow)); }

  .roster-slot { background: rgba(0,0,0,0.6); padding: 15px; margin: 8px 0; border-radius: 10px; border-left: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
  .slot-label { font-family: 'Press Start 2P', cursive; font-size: 10px; color: #888; }
  .player-name { font-weight: bold; font-size: 21px; color: #fff; }

  /* FIELD GOAL MINI GAME STYLES */
  #kicker-container { display: none; background: #000; padding: 20px; border-radius: 10px; border: 3px solid #ffb300; margin: 20px 0; }
  .goal-posts { width: 100%; height: 100px; border-left: 10px solid yellow; border-right: 10px solid yellow; border-bottom: 10px solid yellow; margin-bottom: 20px; position: relative; }
  .kick-meter { width: 100%; height: 30px; background: #333; border-radius: 15px; position: relative; overflow: hidden; }
  .meter-target { width: 40px; height: 100%; background: #0f0; position: absolute; left: 50%; transform: translateX(-50%); box-shadow: 0 0 10px #0f0; }
  .meter-ball { width: 20px; height: 20px; background: #8b4513; border-radius: 50%; position: absolute; top: 5px; left: 0; animation: slideBall 1s ease-in-out infinite alternate; border: 2px solid #fff; }
  @keyframes slideBall { from { left: 5%; } to { left: 90%; } }

  #animation-container { display: none; margin: 25px 0; width: 100%; }
  #tecmo-screen { width: 100%; height: 180px; background-color: #2e7d32; position: relative; overflow: hidden; border: 4px solid #fff; border-radius: 10px; }
  #sim-scoreboard { font-family: 'Press Start 2P', cursive; font-size: 16px; color: #0f0; margin-bottom: 12px; }
  #sim-event-ticker { color: #ffb300; font-family: 'Press Start 2P', cursive; font-size: 11px; margin-top: 15px; line-height: 1.4; }
  #results { display: none; padding: 30px; border-radius: 16px; border: 4px solid var(--primary); background: #111; font-size: 20px; margin-top: 15px; }
</style>
</head>
<body>

<div class="main-container">
  <div class="glass-card" id="draft-section">
    <button id="mute-toggle" onclick="toggleMute()" style="width: auto; position: absolute; top: 15px; right: 15px; padding: 8px 12px; font-size: 12px; margin:0; background:#333;">ON</button>
    <h2>UNDERGROUND<br>ROSTER BUILDER '26</h2>
    
    <div class="team-logo-container">
      <button id="start-btn" onclick="startFirstSpin()" style="font-size: 28px;">INSERT COIN</button>
      <img id="team-logo-img" src="">
    </div>

    <select id="position-select" onchange="updatePlayerDropdown()" disabled>
      <option value="QB">QB</option><option value="RB">RB</option><option value="WR">WR</option><option value="TE">TE</option><option value="Defense">DEF</option><option value="Coach">HC</option>
    </select>
    <select id="player-select" disabled><option>...</option></select>
    <button id="draft-btn" onclick="draftPlayer()" disabled>LOCK IN PICK</button>
  </div>

  <div class="glass-card">
    <h3 style="font-family: 'Press Start 2P'; font-size: 11px; color: #aaa; margin-bottom: 15px;">ACTIVE ROSTER</h3>
    <div id="roster-QB" class="roster-slot"><span class="slot-label">QB</span><div class="player-name">---</div></div>
    <div id="roster-RB" class="roster-slot"><span class="slot-label">RB</span><div class="player-name">---</div></div>
    <div id="roster-WR" class="roster-slot"><span class="slot-label">WR</span><div class="player-name">---</div></div>
    <div id="roster-TE" class="roster-slot"><span class="slot-label">TE</span><div class="player-name">---</div></div>
    <div id="roster-Defense" class="roster-slot"><span class="slot-label">DEF</span><div class="player-name">---</div></div>
    <div id="roster-Coach" class="roster-slot"><span class="slot-label">HC</span><div class="player-name">---</div></div>
    
    <div id="sim-btn-container">
      <button id="sim-btn" onclick="triggerSimulation()" style="display:none; background: #28a745;">SIMULATE SEASON</button>
    </div>

    <div id="kicker-container">
      <h3 style="font-family:'Press Start 2P'; font-size:12px; color:#ffb300;">WEEK 9: FIELD GOAL TIME!</h3>
      <p style="font-size:14px; margin-bottom:15px;">Hit the GREEN ZONE for +2 Wins!<br>MISS for -1 Win.</p>
      <div class="goal-posts"></div>
      <div class="kick-meter">
        <div class="meter-target"></div>
        <div id="kicker-ball" class="meter-ball"></div>
      </div>
      <button onclick="attemptKick()" style="margin-top:20px; background:#ffb300; color:#000;">KICK!</button>
    </div>

    <div id="animation-container">
      <div id="sim-scoreboard">BOOTING...</div>
      <div id="tecmo-screen">
        <div style="width:100%; height:3px; background:rgba(255,255,255,0.4); position:absolute; top:30%;"></div>
        <div style="width:100%; height:3px; background:rgba(255,255,255,0.4); position:absolute; top:70%;"></div>
        <div style="width:24px; height:24px; background:var(--primary); position:absolute; bottom:20px; left:50%; box-shadow:3px 3px 0 #000;"></div>
      </div>
      <div id="sim-event-ticker">GENERATING SCHEDULE...</div>
    </div>

    <div id="results"></div>
    <button id="challenge-btn" onclick="handleChallengeAction()" style="display:none; background: #013369;">SHARE CHALLENGE</button>
    <button id="reset-btn" onclick="resetDraft()" style="display:none; background: #444;">NEW DRAFT</button>
  </div>
</div>

<script>
  let isMuted = false;
  let audioCtx = null;
  let rosterData = null;
  let roster = { QB: null, RB: null, WR: null, TE: null, Defense: null, Coach: null };
  let draftedTeams = [];
  let currentTeam = null;
  let finalWins = 0;
  let bonusWins = 0;

  const logoMap = {
    "Arizona Cardinals": "ari", "Atlanta Falcons": "atl", "Baltimore Ravens": "bal", "Buffalo Bills": "buf", "Carolina Panthers": "car", "Chicago Bears": "chi", "Cincinnati Bengals": "cin", "Cleveland Browns": "cle", "Dallas Cowboys": "dal", "Denver Broncos": "den", "Detroit Lions": "det", "Green Bay Packers": "gb", "Houston Texans": "hou", "Indianapolis Colts": "ind", "Jacksonville Jaguars": "jax", "Kansas City Chiefs": "kc", "Las Vegas Raiders": "lv", "Los Angeles Chargers": "lac", "Los Angeles Rams": "lar", "Miami Dolphins": "mia", "Minnesota Vikings": "min", "New England Patriots": "ne", "New Orleans Saints": "no", "New York Giants": "nyg", "New York Jets": "nyj", "Philadelphia Eagles": "phi", "Pittsburgh Steelers": "pit", "San Francisco 49ers": "sf", "Seattle Seahawks": "sea", "Tampa Bay Buccaneers": "tb", "Tennessee Titans": "ten", "Washington Commanders": "wsh"
  };

  const simEvents = [
    "WEEK 1: QB throws a 70-yard moonshot!", "WEEK 4: Locker room fight over pizza.", "WEEK 6: Interception with a helmet!", "WEEK 12: RB breaks three ankles.", "WEEK 14: Snowstorm! Blind football.", "WEEK 16: Miracle catch!"
  ];

  function startFirstSpin() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); document.getElementById("start-btn").style.display = "none"; spinTeam(); }

  function spinTeam() {
    const img = document.getElementById("team-logo-img"); img.style.display = "block";
    const available = Object.keys(rosterData).filter(t => !draftedTeams.includes(t));
    let count = 0;
    function perform() {
      const name = available[Math.floor(Math.random() * available.length)];
      img.src = `https://a.espncdn.com/i/teamlogos/nfl/500/${logoMap[name] || 'nfl'}.png`;
      if (count++ < 20) setTimeout(perform, 100);
      else { currentTeam = name; loadRoster(name); }
    }
    perform();
  }

  function loadRoster(name) {
    document.getElementById("position-select").disabled = false;
    document.getElementById("player-select").disabled = false;
    document.getElementById("draft-btn").disabled = false;
    updatePlayerDropdown();
  }

  function updatePlayerDropdown() {
    const pos = document.getElementById("position-select").value;
    const sel = document.getElementById("player-select"); sel.innerHTML = "";
    let list = (pos === "Defense") ? [`${currentTeam} D/ST`] : (pos === "Coach") ? [rosterData[currentTeam]["Coach"]] : rosterData[currentTeam][pos];
    list.forEach(p => { let o = document.createElement("option"); o.innerText = p; sel.appendChild(o); });
  }

  function draftPlayer() {
    const pos = document.getElementById("position-select").value;
    const p = document.getElementById("player-select").value;
    roster[pos] = p;
    document.getElementById(`roster-${pos}`).querySelector(".player-name").innerText = p;
    draftedTeams.push(currentTeam);
    document.getElementById("position-select").remove(document.getElementById("position-select").selectedIndex);
    if (Object.values(roster).every(v => v !== null)) { document.getElementById("draft-section").style.display = "none"; document.getElementById("sim-btn").style.display = "block"; }
    else spinTeam();
  }

  function triggerSimulation() {
    document.getElementById("sim-btn").style.display = "none";
    document.getElementById("animation-container").style.display = "block";
    finalWins = Math.floor(Math.random() * 8) + 4;
    
    let step = 0;
    const timer = setInterval(() => {
      document.getElementById("sim-scoreboard").innerText = `WEEK ${step + 1}: ${Math.floor((finalWins/6)*(step+1))}-${Math.floor(((17-finalWins)/6)*(step+1))}`;
      document.getElementById("sim-event-ticker").innerText = simEvents[step] || "THE GRIND CONTINUES...";
      
      if (step === 2) { // Pause for Mini-Game at Week 9
        clearInterval(timer);
        setTimeout(() => {
          document.getElementById("animation-container").style.display = "none";
          document.getElementById("kicker-container").style.display = "block";
        }, 2000);
      }
      
      if (step++ >= 5) {
        clearInterval(timer);
        showFinal();
      }
    }, 3000);
  }

  function attemptKick() {
    const ball = document.getElementById("kicker-ball");
    const ballPos = ball.offsetLeft;
    const meterWidth = document.querySelector(".kick-meter").offsetWidth;
    const center = meterWidth / 2;
    
    document.getElementById("kicker-container").style.display = "none";
    document.getElementById("animation-container").style.display = "block";

    if (Math.abs(ballPos - center) < 30) {
      bonusWins = 2;
      alert("ITS GOOD! +2 WINS!");
    } else {
      bonusWins = -1;
      alert("WIDE LEFT! -1 WIN.");
    }
    
    // Resume simulation logic could be more complex, but for now we finish it
    showFinal();
  }

  function showFinal() {
    document.getElementById("animation-container").style.display = "none";
    const r = document.getElementById("results");
    const total = Math.max(0, Math.min(17, finalWins + bonusWins));
    
    let roast = (total >= 12) ? "🔥 ELITE SAVANT." : "💩 DUMPSTER FIRE.";
    r.innerHTML = `<h2>FINAL: ${total}-${17-total}</h2><p>${roast}</p>`;
    r.style.display = "block";
    document.getElementById("challenge-btn").style.display = "block";
    document.getElementById("reset-btn").style.display = "block";
    if (total >= 13) confetti();
  }

  function resetDraft() { window.location.href = window.location.origin + window.location.pathname; }
  function toggleMute() { isMuted = !isMuted; }
  function handleChallengeAction() { alert("Link Copied!"); }

  window.onload = async () => { const res = await fetch('rosters.json'); rosterData = await res.json(); };
</script>
</body>
</html>
