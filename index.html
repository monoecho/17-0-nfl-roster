<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17-0 NFL Roster Builder: Live Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  body { 
    font-family: 'Roboto', sans-serif; 
    max-width: 600px; 
    margin: 20px auto; 
    padding: 20px; 
    background-color: #1e3f20; 
    background-image: repeating-linear-gradient(0deg, transparent, transparent 48px, rgba(255,255,255,0.1) 48px, rgba(255,255,255,0.1) 50px);
    color: #fff; 
  }
  
  .card { 
    background: #111; 
    padding: 20px; 
    border-radius: 8px; 
    box-shadow: 0 8px 16px rgba(0,0,0,0.5); 
    margin-bottom: 20px; 
    text-align: center; 
    border-top: 5px solid #d50a0a; 
    border-bottom: 5px solid #013369; 
    position: relative;
    z-index: 10;
  }
  
  #mute-toggle { position: absolute; top: 15px; right: 15px; background: none; border: 1px solid #444; color: #777; font-size: 12px; padding: 5px 8px; cursor: pointer; border-radius: 4px; width: auto; font-family: 'Roboto', sans-serif;}
  #mute-toggle.active { color: #d50a0a; border-color: #d50a0a; }

  h2, h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; margin-top: 0; }
  h2 { font-size: 36px; color: #fff; text-transform: uppercase; }
  
  /* Fixed Blue Challenge Banner */
  #challenge-banner { display: none; background: #013369; color: #fff; padding: 15px; font-family: 'Roboto', sans-serif; border-radius: 4px; margin-bottom: 20px; border: 2px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.3); position: relative; z-index: 10; text-align: center;}
  #challenge-banner strong { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; color: #ffb300; }
  
  .team-logo-container { height: 160px; display: flex; align-items: center; justify-content: center; margin: 15px 0; background: #222; border-radius: 8px; border: 1px inset #333; }
  #team-logo-img { max-height: 140px; max-width: 150px; object-fit: contain; display: none; filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.5)); }
  .placeholder-text { font-size: 24px; font-family: 'Bebas Neue', sans-serif; color: #777; letter-spacing: 1px; }
  
  select, button { padding: 12px; margin: 8px; font-size: 16px; width: 90%; max-width: 300px; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
  select { background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; }
  
  button { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; background: #d50a0a; color: white; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; }
  button:hover:not(:disabled) { background: #a30808; transform: scale(1.02); }
  button:disabled { background: #444; color: #777; cursor: not-allowed; }
  
  .roster { text-align: left; margin-top: 20px; }
  .roster-slot { padding: 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; margin-bottom: 5px; border-radius: 4px; }
  .roster-slot strong { width: 80px; color: #aaa; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; }
  .roster-slot img { height: 35px; width: 35px; object-fit: contain; margin-left: 10px; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.5)); }
  .player-info { display: flex; align-items: center; font-weight: bold; font-size: 16px; color: #fff; }
  
  /* Absolute centering for Sim Button */
  .sim-btn-container { display: flex; justify-content: center; padding: 20px 0; width: 100%; }

  #animation-container { display: none; margin-top: 20px; text-align: center; background: #111; padding: 15px; border-radius: 8px; border: 2px solid #333; }
  #tecmo-screen { width: 100%; height: 180px; background-color: #2e7d32; position: relative; overflow: hidden; border: 4px solid #fff; border-radius: 4px; margin-bottom: 15px; box-sizing: border-box; }
  .yard-line { width: 100%; height: 4px; background: rgba(255,255,255,0.6); position: absolute; animation: scrollField 1s linear infinite; }
  @keyframes scrollField { 0% { top: -10%; } 100% { top: 110%; } }
  .tecmo-player { width: 24px; height: 24px; background: #013369; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); box-shadow: 3px 3px 0 #000; animation: runDodging 3s ease-in-out infinite; }
  .tecmo-ball { width: 8px; height: 12px; background: #8b4513; position: absolute; top: 6px; right: -4px; border-radius: 40%; }
  @keyframes runDodging { 0%, 100% { left: 50%; } 25% { left: 20%; } 75% { left: 80%; } }
  .tecmo-defender { width: 24px; height: 24px; background: #d50a0a; position: absolute; top: -30px; box-shadow: 3px 3px 0 #000; }
  .def1 { left: 15%; animation: defenderRush 2.5s linear infinite; }
  .def2 { left: 75%; animation: defenderRush 2.2s linear infinite; }

  @keyframes defenderRush { 0% { top: -15%; } 100% { top: 115%; } }

  #sim-scoreboard { background: #000; color: #0f0; font-family: 'Courier New', monospace; font-size: 20px; padding: 5px; margin-bottom: 10px; border: 1px solid #333; }
  #sim-event-ticker { font-size: 17px; color: #ffb300; font-weight: bold; min-height: 44px; padding: 10px; background: #222; border-radius: 4px; }
  
  #results { font-size: 18px; line-height: 1.4; display: none; margin-top: 20px; text-align: center; background: #222; padding: 20px; border-radius: 8px; border: 1px solid #333;}
  
  .action-btn-container { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 20px; }
  #reset-btn { background: #444; display: none; width: 200px; }
  #challenge-btn { background: #013369; display: none; width: 200px; }
</style>
</head>
<body>

<div class="card" id="draft-section">
  <button id="mute-toggle" onclick="toggleMute()">SOUND: ON</button>
  <h2>The 17-0 Roster Builder</h2>
  
  <div class="team-logo-container" id="logo-box">
    <span id="placeholder" class="placeholder-text">
      <button onclick="startFirstSpin()" style="background:#d50a0a; color:#fff; border:none; padding:15px 30px; font-family:'Bebas Neue', sans-serif; font-size:26px; cursor:pointer; border-radius:4px; box-shadow:0 4px 6px rgba(0,0,0,0.5);">START DRAFT</button>
    </span>
    <img id="team-logo-img" src="" alt="Team Logo">
  </div>
  
  <select id="position-select" onchange="updatePlayerDropdown()" disabled>
    <option value="QB">QB</option><option value="RB">RB</option><option value="WR">WR</option><option value="TE">TE</option><option value="Defense">DEF</option><option value="Coach">HC</option>
  </select>
  <br>
  <select id="player-select" disabled><option value="">Waiting for spin...</option></select>
  <br>
  <button id="draft-btn" onclick="draftPlayer()" disabled>LOCK IN PICK</button>
</div>

<div id="challenge-banner"></div>

<div class="card roster">
  <h3 style="text-align: center;">YOUR 2026 SQUAD</h3>
  <div id="roster-QB" class="roster-slot"><strong>QB</strong> <div class="player-info">Empty</div></div>
  <div id="roster-RB" class="roster-slot"><strong>RB</strong> <div class="player-info">Empty</div></div>
  <div id="roster-WR" class="roster-slot"><strong>WR</strong> <div class="player-info">Empty</div></div>
  <div id="roster-TE" class="roster-slot"><strong>TE</strong> <div class="player-info">Empty</div></div>
  <div id="roster-Defense" class="roster-slot"><strong>DEF</strong> <div class="player-info">Empty</div></div>
  <div id="roster-Coach" class="roster-slot"><strong>HC</strong> <div class="player-info">Empty</div></div>
  
  <div class="sim-btn-container">
    <button id="sim-btn" onclick="triggerSimulation()" style="display:none; width: 100%; background: #28a745;">SIMULATE
