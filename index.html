<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17-0 NFL Roster Builder: Live Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  body { font-family: 'Roboto', sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background-color: #1e3f20; background-image: repeating-linear-gradient(0deg, transparent, transparent 48px, rgba(255,255,255,0.1) 48px, rgba(255,255,255,0.1) 50px); color: #fff; }
  .card { background: #111; padding: 20px; border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); margin-bottom: 20px; text-align: center; border-top: 5px solid #d50a0a; border-bottom: 5px solid #013369; position: relative; z-index: 10; }
  #mute-toggle { position: absolute; top: 15px; right: 15px; background: none; border: 1px solid #444; color: #777; font-size: 12px; padding: 5px 8px; cursor: pointer; border-radius: 4px; width: auto; }
  #mute-toggle.active { color: #d50a0a; border-color: #d50a0a; }
  h2, h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; margin-top: 0; }
  h2 { font-size: 36px; color: #fff; text-transform: uppercase; }
  #challenge-banner { display: none; background: #013369; color: #fff; padding: 15px; border-radius: 4px; margin-bottom: 20px; border: 2px solid #fff; text-align: center; }
  .team-logo-container { height: 160px; display: flex; align-items: center; justify-content: center; margin: 15px 0; background: #222; border-radius: 8px; border: 1px inset #333; }
  #team-logo-img { max-height: 140px; max-width: 150px; object-fit: contain; display: none; filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.5)); }
  select, button { padding: 12px; margin: 8px; font-size: 16px; width: 90%; max-width: 300px; box-sizing: border-box; }
  select { background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; }
  button { font-family: 'Bebas Neue', sans-serif; font-size: 20px; background: #d50a0a; color: white; border: none; border-radius: 4px; cursor: pointer; }
  .roster-slot { padding: 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; margin-bottom: 5px; border-radius: 4px; }
  .roster-slot strong { width: 80px; color: #aaa; font-family: 'Bebas Neue', sans-serif; font-size: 20px; }
  .player-info img { height: 30px; margin-left: 10px; vertical-align: middle; }
  .center-btn-wrapper { display: flex; justify-content: center; width: 100%; margin-top: 20px; }
  #animation-container { display: none; margin-top: 20px; text-align: center; background: #111; padding: 15px; border-radius: 8px; }
  #sim-scoreboard { background: #000; color: #0f0; font-family: 'Courier New', monospace; font-size: 20px; padding: 5px; margin-bottom: 10px; border: 1px solid #333; }
  #results { font-size: 18px; line-height: 1.4; display: none; margin-top: 20px; text-align: center; background: #222; padding: 20px; border-radius: 8px; }
  #challenge-btn { background: #013369; display: none; width: 250px; margin: 10px auto; }
  #reset-btn { background: #444; display: none; width: 250px; margin: 0 auto; }
</style>
</head>
<body>

<div class="card" id="draft-section">
  <button id="mute-toggle" onclick="toggleMute()">SOUND: ON</button>
  <h2>The 17-0 Roster Builder</h2>
  <div class="team-logo-container">
    <span id="placeholder"><button onclick="startFirstSpin()">START DRAFT</button></span>
    <img id="team-logo-img" src="" alt="Team Logo">
  </div>
  <select id="position-select" onchange="updatePlayerDropdown()" disabled>
    <option value="QB">QB</option><option value="RB">RB</option><option value="WR">WR</option><option value="TE">TE</option><option value="Defense">DEF</option><option value="Coach">HC</option>
  </select>
  <br>
  <select id="player-select" disabled><option>Waiting...</option></select>
  <br>
  <button id="draft-btn" onclick="draftPlayer()" disabled>LOCK IN PICK</button>
</div>

<div id="challenge-banner"></div>

<div class="card roster">
  <h3 style="text-align: center;">YOUR 2026 SQUAD</h3>
  <div id="roster-QB" class="roster-slot"><strong>QB</strong> <div class="player-info">Empty</div></div>
  <div id="roster-RB" class="roster-slot"><strong>RB</strong> <div class="player-info">Empty</div></div>
  <div id="roster-WR" class="roster-slot"><strong>WR</strong> <div class="player-info">Empty</div></div>
  <div id="roster-TE" class="roster-slot"><strong>TE</strong> <div class="player-info">Empty</div></div>
  <div id="roster-Defense" class="roster-slot"><strong>DEF</strong> <div class="player-info">Empty</div></div>
  <div id="roster-Coach" class="roster-slot"><strong>HC</strong> <div class="player-info">Empty</div></div>
  
  <div class="center-btn-wrapper"><button id="sim-btn" onclick="triggerSimulation()" style="display:none; width: 100%; background: #28a745;">SIMULATE SEASON</button></div>
  <div id="animation-container">
    <div id="sim-scoreboard">RECORD: 0 - 0</div>
    <div id="sim-event-ticker">Simulating...</div>
  </div>
  <div id="results"></div>
  <div class="action-btn-container"><button id="challenge-btn" onclick="handleChallengeAction()">SHARE CHALLENGE</button><button id="reset-btn" onclick="resetDraft()">NEW DRAFT</button></div>
</div>

<script>
  let isMuted = false;
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  let audioCtx;
  let currentFetchedRoster = null;
  let roster = { QB: null, RB: null, WR: null, TE: null, Defense: null, Coach: null };
  let draftedTeams = [];
  let currentTeamObj = null;
  let finalCalculatedWins = 0;
  let targetWinsToBeat = null;

  const apiTeamIds = {"Las Vegas Raiders": 1, "Jacksonville Jaguars": 2, "New England Patriots": 3, "New York Giants": 4, "Baltimore Ravens": 5, "Tennessee Titans": 6, "Detroit Lions": 7, "Atlanta Falcons": 8, "Cleveland Browns": 9, "Cincinnati Bengals": 10, "Arizona Cardinals": 11, "Philadelphia Eagles": 12, "New York Jets": 13, "San Francisco 49ers": 14, "Green Bay Packers": 15, "Chicago Bears": 16, "Kansas City Chiefs": 17, "Washington Commanders": 18, "Carolina Panthers": 19, "Buffalo Bills": 20, "Indianapolis Colts": 21, "Pittsburgh Steelers": 22, "Seattle Seahawks": 23, "Tampa Bay Buccaneers": 24, "Miami Dolphins": 25, "Houston Texans": 26, "New Orleans Saints": 27, "Denver Broncos": 28, "Dallas Cowboys": 29, "Los Angeles Chargers": 30, "Los Angeles Rams": 31, "Minnesota Vikings": 32};
  const teams = Object.keys(apiTeamIds).map(name => ({ name, logo: `https://a.espncdn.com/i/teamlogos/nfl/500/${name.toLowerCase().split(' ').pop().substring(0,3)}.png` }));

  function toggleMute() { isMuted = !isMuted; document.getElementById("mute-toggle").innerText = isMuted ? "SOUND: OFF" : "SOUND: ON"; }
  function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
  function playRetroBlip() { if (isMuted || !audioCtx) return; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square'; osc.frequency.setValueAtTime(400 + Math.random() * 400, audioCtx.currentTime); gain.gain.setValueAtTime(0.05, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.05); }

  function startFirstSpin() { initAudio(); document.getElementById("placeholder").style.display = "none"; spinTeam(); }

  function spinTeam() {
    document.getElementById("draft-btn").disabled = true;
    const img = document.getElementById("team-logo-img"); img.style.display = "block";
    const available = teams.filter(t => !draftedTeams.includes(t.name));
    let count = 0;
    const timer = setInterval(() => {
      currentTeamObj = available[Math.floor(Math.random() * available.length)];
      img.src = `https://a.espncdn.com/i/teamlogos/nfl/500/${currentTeamObj.name.toLowerCase().split(' ').pop().substring(0,3)}.png`;
      playRetroBlip();
      if (count++ > 20) { clearInterval(timer); fetchLiveRoster(currentTeamObj.name); }
    }, 50);
  }

  async function fetchLiveRoster(teamName) {
    const sel = document.getElementById("player-select"); sel.innerHTML = "<option>Loading Live Roster...</option>";
    try {
      const res = await fetch(`/.netlify/functions/getRoster?teamId=${apiTeamIds[teamName]}`);
      const data = await res.json();
      
      // EMERGENCY FALLBACK: If API is empty, fill with generic starters
      if (!data.QB || data.QB.length === 0) {
        currentFetchedRoster = { "QB": ["Starting QB"], "RB": ["Primary RB"], "WR": ["Star WR"], "TE": ["Solid TE"] };
      } else {
        currentFetchedRoster = data;
      }

      document.getElementById("position-select").disabled = false;
      document.getElementById("player-select").disabled = false;
      document.getElementById("draft-btn").disabled = false;
      updatePlayerDropdown();
    } catch (e) {
      sel.innerHTML = "<option>Network Error. Pick below.</option>";
      currentFetchedRoster = { "QB": ["Fallback QB"], "RB": ["Fallback RB"], "WR": ["Fallback WR"], "TE": ["Fallback TE"] };
      document.getElementById("draft-btn").disabled = false;
    }
  }

  function updatePlayerDropdown() {
    const pos = document.getElementById("position-select").value;
    const sel = document.getElementById("player-select");
    sel.innerHTML = "";
    let list = (pos === "Defense") ? [`${currentTeamObj.name} D/ST`] : (pos === "Coach") ? ["Head Coach"] : currentFetchedRoster[pos];
    list.forEach(p => { let o = document.createElement("option"); o.innerText = p; sel.appendChild(o); });
  }

  function draftPlayer() {
    const pos = document.getElementById("position-select").value;
    const p = document.getElementById("player-select").value;
    roster[pos] = { name: p, logo: currentTeamObj.logo };
    document.getElementById(`roster-${pos}`).querySelector(".player-info").innerHTML = `${p} <img src="https://a.espncdn.com/i/teamlogos/nfl/500/${currentTeamObj.name.toLowerCase().split(' ').pop().substring(0,3)}.png" style="width:20px;">`;
    draftedTeams.push(currentTeamObj.name);
    document.getElementById("position-select").remove(document.getElementById("position-select").selectedIndex);
    if (Object.values(roster).every(v => v !== null)) { document.getElementById("draft-section").style.display = "none"; document.getElementById("sim-btn").style.display = "block"; }
    else spinTeam();
  }

  function triggerSimulation() {
    document.getElementById("sim-btn").style.display = "none"; document.getElementById("animation-container").style.display = "block";
    let wins = Math.floor(Math.random() * 8) + 4;
    finalCalculatedWins = wins;
    let step = 0;
    const ticker = setInterval(() => {
      document.getElementById("sim-scoreboard").innerText = `RECORD: ${Math.floor((wins/4)*(step+1))} - ${Math.floor(((17-wins)/4)*(step+1))}`;
      if (step++ >= 3) { clearInterval(ticker); showFinal(); }
    }, 1500);
  }

  function showFinal() {
    document.getElementById("animation-container").style.display = "none";
    const r = document.getElementById("results");
    r.innerHTML = `<strong>FINAL RECORD: ${finalCalculatedWins} - ${17-finalCalculatedWins}</strong>`;
    r.style.display = "block";
    document.getElementById("challenge-btn").style.display = "block";
    document.getElementById("reset-btn").style.display = "block";
    if (finalCalculatedWins >= 10) confetti();
  }

  function resetDraft() { window.location.reload(); }
  function handleChallengeAction() { alert("Link copied!"); }
</script>
</body>
</html>
