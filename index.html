<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17-0 NFL Roster Builder: SNES Pro Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root { --primary: #d50a0a; --accent: #013369; --glow: rgba(213, 10, 10, 0.4); --kickX: 0px; }
  body { font-family: 'Inter', sans-serif; background-color: #2e7d32; background-image: linear-gradient(90deg, transparent 49%, rgba(255,255,255,0.1) 49%, rgba(255,255,255,0.1) 51%, transparent 51%), repeating-linear-gradient(0deg, #2e7d32, #2e7d32 100px, #388e3c 100px, #388e3c 200px); color: #fff; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; transition: background-color 0.5s ease; }
  .main-container { width: 100%; max-width: 540px; min-height: 100vh; padding: 20px; box-sizing: border-box; position: relative; z-index: 5; }
  
  .glass-card { background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 25px; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9); margin-bottom: 20px; text-align: center; border-top: 6px solid var(--primary); transition: border-color 0.6s ease; }
  h2 { font-family: 'Press Start 2P', cursive; font-size: 11px; text-shadow: 2px 2px 0 var(--primary); margin-bottom: 25px; line-height: 1.6; }
  
  #start-btn { width: 85px; height: 85px; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 0 15px var(--glow); background: radial-gradient(circle, var(--primary) 40%, #800 100%); display: flex; align-items: center; justify-content: center; margin: 15px auto; cursor: pointer; color: white; font-family: 'Press Start 2P'; font-size: 14px; transition: transform 0.1s; }
  #start-btn:active { transform: scale(0.9); }
  
  #mute-toggle { width: auto !important; position: absolute; top: 15px; right: 15px; padding: 6px 10px; font-size: 9px; background: #333; z-index: 1100; border-radius: 4px; font-family: 'Press Start 2P'; color: white; cursor: pointer; border: 1px solid #555;}

  select, .std-btn { width: 100%; padding: 18px; margin: 10px 0; font-size: 22px; border-radius: 10px; box-sizing: border-box; font-family: 'Bebas Neue'; text-transform: uppercase; cursor: pointer; border: none; }
  select { background: #111 !important; color: #fff !important; border: 3px solid var(--primary) !important; text-align-last: center; appearance: none; }
  .std-btn { background: var(--primary); color: white; }

  .team-logo-container { height: 160px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 15px; margin-bottom: 10px; overflow: hidden; }
  #team-logo-img { max-height: 130px; filter: drop-shadow(0 0 15px var(--glow)); display: none; }

  .roster-slot { background: rgba(0,0,0,0.6); padding: 10px; margin: 5px 0; border-radius: 10px; border-left: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
  .player-name { font-weight: bold; font-size: 18px; color: #fff; }

  /* FGMG RE-ENGINEERED */
  #kicker-container { display: none; background: #000; padding: 20px; border-radius: 15px; border: 3px solid #ffb300; position: relative; }
  .goal-posts { width: 40%; margin: 0 auto 30px auto; height: 110px; border-left: 8px solid yellow; border-right: 8px solid yellow; border-bottom: 8px solid yellow; position: relative; }
  #kicking-ball { width: 22px; height: 32px; background: #8b4513; border-radius: 50%; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); border: 2px solid #fff; display: none; z-index: 10; }
  @keyframes ballFlight { 0% { bottom: -20px; transform: translateX(-50%) scale(1); opacity: 1; } 100% { bottom: 140px; transform: translateX(calc(-50% + var(--kickX))) scale(0.3); opacity: 0.7; } }
  
  .swing-meter { width: 100%; height: 35px; background: #222; border: 2px solid #555; position: relative; overflow: hidden; margin: 15px 0; }
  .accuracy-zone { width: 40px; height: 100%; background: #0f0; position: absolute; left: 10px; box-shadow: 0 0 10px #0f0; z-index: 2; opacity: 0.6; }
  .power-fill { height: 100%; background: linear-gradient(90deg, #333, #ff0, #f00); width: 0%; position: absolute; left: 0; }
  #meter-cursor { width: 8px; height: 100%; background: #fff; position: absolute; left: 0; z-index: 3; box-shadow: 0 0 8px #fff; }

  /* SIM ANIMATION */
  #animation-container { display: none; margin: 25px 0; }
  #tecmo-screen { width: 100%; height: 180px; background-color: #2e7d32; position: relative; overflow: hidden; border: 4px solid #fff; border-radius: 10px; }
  .yard-line { width: 100%; height: 3px; background: rgba(255,255,255,0.2); position: absolute; animation: scrollField 0.5s linear infinite; }
  @keyframes scrollField { 0% { top: -10%; } 100% { top: 110%; } }

  .pixel-player { width: 34px; height: 48px; position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); transition: left 0.15s ease-in-out; z-index: 20; }
  .pixel-helmet { width: 22px; height: 18px; background: var(--primary); margin: 0 auto; border-radius: 5px 5px 0 0; border: 2px solid #000; position: relative; }
  .pixel-jersey { width: 30px; height: 24px; background: var(--accent); margin: -2px auto 0; border-radius: 3px; border: 2px solid #000; }
  
  .defender { width: 28px; height: 38px; position: absolute; z-index: 15; top: -50px; background: #eee; border: 2px solid #333; border-radius: 4px; box-shadow: 2px 2px 0 #000; }
</style>
</head>
<body>
<div class="main-container">
  <button id="mute-toggle" onclick="toggleMute()">ON</button>
  <div class="glass-card" id="draft-section">
    <h2>UNDERGROUND<br>STADIUM BUILDER</h2>
    <div class="team-logo-container">
      <img id="team-logo-img" src="">
      <button id="start-btn" onclick="spinTeam()">SPIN</button>
    </div>
    <select id="position-select" onchange="updateDropdown()" disabled>
      <option value="QB">QB</option><option value="RB">RB</option><option value="WR">WR</option><option value="TE">TE</option><option value="Defense">DEF</option><option value="Coach">HC</option>
    </select>
    <select id="player-select" disabled><option>...</option></select>
    <button id="draft-btn" class="std-btn" onclick="draftPlayer()" disabled>LOCK PICK</button>
  </div>
  <div class="glass-card">
    <div id="roster-slots">
      <div id="roster-QB" class="roster-slot"><span style="font-family:'Press Start 2P'; font-size:7px; color:#888;">QB</span><div class="player-name">---</div></div>
      <div id="roster-RB" class="roster-slot"><span style="font-family:'Press Start 2P'; font-size:7px; color:#888;">RB</span><div class="player-name">---</div></div>
      <div id="roster-WR" class="roster-slot"><span style="font-family:'Press Start 2P'; font-size:7px; color:#888;">WR</span><div class="player-name">---</div></div>
      <div id="roster-TE" class="roster-slot"><span style="font-family:'Press Start 2P'; font-size:7px; color:#888;">TE</span><div class="player-name">---</div></div>
      <div id="roster-Defense" class="roster-slot"><span style="font-family:'Press Start 2P'; font-size:7px; color:#888;">DEF</span><div class="player-name">---</div></div>
      <div id="roster-Coach" class="roster-slot"><span style="font-family:'Press Start 2P'; font-size:7px; color:#888;">HC</span><div class="player-name">---</div></div>
    </div>
    <div style="display:flex; justify-content:center;"><button id="sim-btn" class="std-btn" onclick="triggerSimulation()" style="display:none; background: #28a745;">SIMULATE SEASON</button></div>
    
    <div id="kicker-container">
      <h3 style="font-family:'Press Start 2P'; font-size:9px; color:#ffb300;">FGMG: DOUBLE-BOUNCE</h3>
      <div class="goal-posts"><div id="kicking-ball"></div></div>
      <div class="swing-meter">
        <div class="power-fill" id="p-fill"></div>
        <div class="accuracy-zone"></div>
        <div id="meter-cursor"></div>
      </div>
      <button id="kick-action-btn" class="std-btn" onclick="handleKickInput()">LOCK STRENGTH</button>
    </div>

    <div id="animation-container">
      <div id="sim-scoreboard">RECORD: 0-0</div>
      <div id="tecmo-screen">
        <div class="yard-line" style="top:20%"></div><div class="yard-line" style="top:50%"></div><div class="yard-line" style="top:80%"></div>
        <div class="pixel-player" id="main-sprite"><div class="pixel-helmet"></div><div class="pixel-jersey"></div></div>
      </div>
      <div id="sim-event-ticker" style="color:#ffb300; font-family:'Press Start 2P'; font-size:8px; margin-top:15px; line-height:1.4; height:45px;">READY...</div>
    </div>
    <div id="results"></div>
    <button id="reset-btn" class="std-btn" onclick="location.reload()" style="display:none; background: #444;">NEW DRAFT</button>
  </div>
</div>
<script>
  let isMuted = false, audioCtx = null, rosterData = null, draftedTeams = [], draftedPlayers = [], roster = {QB:null,RB:null,WR:null,TE:null,Defense:null,Coach:null}, currentTeam = null, finalWins = 0, bonusWins = 0, teamPower = 0;
  let kickStep = 1, meterPos = 0, meterDir = 1, meterInterval = null, powerVal = 0, accuracyVal = 0;
  
  const teamThemes = { "Arizona Cardinals":["#97233f","#000000"],"Atlanta Falcons":["#a71930","#000000"],"Baltimore Ravens":["#241773","#000000"],"Buffalo Bills":["#00338d","#c60c30"],"Carolina Panthers":["#0085ca","#000000"],"Chicago Bears":["#0b162a","#c83803"],"Cincinnati Bengals":["#fb4f14","#000000"],"Cleveland Browns":["#311d00","#ff3c00"],"Dallas Cowboys":["#002244","#869397"],"Denver Broncos":["#fb4f14","#002244"],"Detroit Lions":["#0076b6","#b0b7bc"],"Green Bay Packers":["#203731","#ffb612"],"Houston Texans":["#03202f","#a71930"],"Indianapolis Colts":["#002c5f","#a5acaf"],"Jacksonville Jaguars":["#006778","#9f792c"],"Kansas City Chiefs":["#e31837","#ffb612"],"Las Vegas Raiders":["#a5acaf","#000000"],"Los Angeles Chargers":["#0073cf","#ffb612"],"Los Angeles Rams":["#002244","#b3995d"],"Miami Dolphins":["#008e97","#f26a24"],"Minnesota Vikings":["#4f2683","#ffc62f"],"New England Patriots":["#002244","#c60c30"],"New Orleans Saints":["#d3bc8d","#000000"],"New York Giants":["#0b2265","#a71930"],"New York Jets":["#003f2d","#ffffff"],"Philadelphia Eagles":["#004c54","#a5acaf"],"Pittsburgh Steelers":["#000000","#ffb612"],"San Francisco 49ers":["#aa0000","#b3995d"],"Seattle Seahawks":["#002244","#69be28"],"Tampa Bay Buccaneers":["#d50a0a","#000000"],"Tennessee Titans":["#4b92db","#0c2340"],"Washington Commanders":["#5a1414","#ffb612"] };
  const logoMap = {"Arizona Cardinals":"ari","Atlanta Falcons":"atl","Baltimore Ravens":"bal","Buffalo Bills":"buf","Carolina Panthers":"car","Chicago Bears":"chi","Cincinnati Bengals":"cin","Cleveland Browns":"cle","Dallas Cowboys":"dal","Denver Broncos":"den","Detroit Lions":"det","Green Bay Packers":"gb","Houston Texans":"hou","Indianapolis Colts":"ind","Jacksonville Jaguars":"jax","Kansas City Chiefs":"kc","Las Vegas Raiders":"lv","Los Angeles Chargers":"lac","Los Angeles Rams":"lar","Miami Dolphins":"mia","Minnesota Vikings":"min","New England Patriots":"ne","New Orleans Saints":"no","New York Giants":"nyg","New York Jets":"nyj","Philadelphia Eagles":"phi","Pittsburgh Steelers":"pit","San Francisco 49ers":"sf","Seattle Seahawks":"sea","Tampa Bay Buccaneers":"tb","Tennessee Titans":"ten","Washington Commanders":"wsh"};
  const quarterlyEvents = [
    ["Wk 1: Bosch Mallon moonshot.", "Wk 2: Special Teams TD.", "Wk 3: Defensive clinic.", "Wk 4: 1st QTR Complete."],
    ["Wk 5: Goal line stand.", "Wk 6: Sideline drama.", "Wk 7: HC loses mind.", "Wk 8: Mid-season form."],
    ["Wk 10: Fumble at 1yd.", "Wk 11: Snow game chaos.", "Wk 12: Sideline brawl!", "Wk 13: Playoff push."],
    ["Wk 14: Pick-six!", "Wk 15: Overtime thriller.", "Wk 16: Clutch drive.", "Wk 17: SEASON FINALE."]
  ];

  function toggleMute() { isMuted = !isMuted; document.getElementById("mute-toggle").innerText = isMuted ? "OFF" : "ON"; }
  function playSound(f, d=0.05) { if(isMuted) return; if(!audioCtx) audioCtx = new AudioContext(); if(audioCtx.state==='suspended') audioCtx.resume(); const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type='square'; o.frequency.value=f; g.gain.value=0.01; o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); }

  function spinTeam() {
    const btn = document.getElementById("start-btn"), img = document.getElementById("team-logo-img");
    btn.style.display = "none"; img.style.display = "block";
    const available = Object.keys(rosterData).filter(t => !draftedTeams.includes(t));
    let count = 0; function perform() {
      const name = available[Math.floor(Math.random()*available.length)]; img.src = `https://a.espncdn.com/i/teamlogos/nfl/500/${logoMap[name]||'nfl'}.png`;
      playSound(300 + count*15); if(count++ < 12) setTimeout(perform, 80); else { 
        currentTeam = name; document.documentElement.style.setProperty('--primary', teamThemes[name][0]);
        document.documentElement.style.setProperty('--accent', teamThemes[name][1]); loadRoster(); 
      }
    } perform();
  }

  function loadRoster() { ["position-select","player-select","draft-btn"].forEach(id => document.getElementById(id).disabled=false); updateDropdown(); }
  function updateDropdown() {
    const pos = document.getElementById("position-select").value, sel = document.getElementById("player-select"); sel.innerHTML="";
    let list = (pos==="Defense") ? [`${currentTeam} D/ST`] : (pos==="Coach") ? [rosterData[currentTeam]["Coach"]] : rosterData[currentTeam][pos];
    list.forEach(p => { if(!draftedPlayers.includes(p)) { let o = document.createElement("option"); o.innerText=p; o.value=p; sel.appendChild(o); } });
  }

  function draftPlayer() {
    const pos = document.getElementById("position-select").value, p = document.getElementById("player-select").value;
    roster[pos] = p; draftedPlayers.push(p); if (p.includes("(ELITE)")) teamPower += 2.4;
    document.getElementById(`roster-${pos}`).querySelector(".player-name").innerText = p;
    draftedTeams.push(currentTeam); document.getElementById("position-select").remove(document.getElementById("position-select").selectedIndex);
    if(Object.values(roster).every(v => v!==null)) { document.getElementById("draft-section").style.display="none"; document.getElementById("sim-btn").style.display="block"; } 
    else { document.getElementById("start-btn").style.display = "flex"; document.getElementById("team-logo-img").style.display = "none"; }
  }

  function triggerSimulation() {
    document.getElementById("sim-btn").style.display="none"; document.getElementById("animation-container").style.display="block";
    finalWins = Math.floor(Math.random()*8) + 2 + Math.floor(teamPower); if(finalWins > 17) finalWins = 17;
    let step = 0; const ticker = document.getElementById("sim-event-ticker"), sprite = document.getElementById("main-sprite");
    const timer = setInterval(() => {
      const q = Math.min(3, Math.floor(step));
      ticker.innerText = quarterlyEvents[q][Math.floor(Math.random()*4)];
      document.getElementById("sim-scoreboard").innerText = `RECORD: ${Math.floor((finalWins/6)*(step+1))}-${Math.floor(((17-finalWins)/6)*(step+1))}`;
      sprite.style.left = Math.random() > 0.5 ? "35%" : "65%"; spawnDefender();
      if(step === 2) { clearInterval(timer); setTimeout(() => { document.getElementById("animation-container").style.display="none"; document.getElementById("kicker-container").style.display="block"; startKickerMeter(); }, 1000); }
      if(step++ >= 5) { clearInterval(timer); showFinal(); }
    }, 2000);
  }

  function spawnDefender() {
    const d = document.createElement("div"); d.className = "defender"; d.style.left = Math.random()*80 + 10 + "%";
    document.getElementById("tecmo-screen").appendChild(d);
    let top = -50; const dInt = setInterval(() => { top += 14; d.style.top = top + "px"; if(top > 250) { clearInterval(dInt); d.remove(); } }, 25);
  }

  function startKickerMeter() {
    kickStep = 1; meterPos = 0; meterDir = 1;
    meterInterval = setInterval(() => {
      meterPos += meterDir * 5;
      if(meterPos >= 100 || meterPos <= 0) meterDir *= -1;
      document.getElementById("meter-cursor").style.left = meterPos + "%";
      if(kickStep === 1) document.getElementById("p-fill").style.width = meterPos + "%";
    }, 20);
  }

  function handleKickInput() {
    const btn = document.getElementById("kick-action-btn");
    if(kickStep === 1) { 
      kickStep = 2; powerVal = meterPos; 
      btn.innerText = "LOCK ACCURACY";
    } else {
      clearInterval(meterInterval); 
      accuracyVal = meterPos;
      // accuracyVal between 10 and 20 is the sweet spot
      executeKick(accuracyVal > 8 && accuracyVal < 25);
    }
  }

  function executeKick(isGood) {
    const ball = document.getElementById("kicking-ball"); document.getElementById("kick-action-btn").disabled = true;
    const curve = (accuracyVal - 15) * 1.8; document.documentElement.style.setProperty('--kickX', `${curve}px`);
    ball.style.display = "block"; ball.style.animation = "ballFlight 1s forwards ease-out";
    setTimeout(() => { bonusWins = (isGood && powerVal > 70) ? 2 : -1; document.getElementById("kicker-container").style.display="none"; showFinal(); }, 1100);
  }

  function showFinal() {
    document.getElementById("animation-container").style.display = "none";
    const r = document.getElementById("results"), total = Math.max(0, Math.min(17, finalWins + bonusWins));
    const cat = total === 17 ? 'god' : (total >= 13 ? 'elite' : (total >= 8 ? 'mid' : 'bad'));
    const burns = ["WAR CRIME MANAGEMENT.", "DUMPSTER FIRE.", "MID-SEASON FRAUD.", "PLAYOFF FLOP.", "GM DEITY."];
    r.innerHTML = `<h2>FINAL: ${total}-${17-total}</h2><p>${total > 15 ? burns[4] : (total > 8 ? burns[2] : burns[0])}</p>`;
    r.style.display="block"; document.getElementById("reset-btn").style.display="block"; if(total>=14) confetti();
  }
  window.onload = async () => { const res = await fetch('rosters.json'); rosterData = await res.json(); };
</script>
</body>
</html>
