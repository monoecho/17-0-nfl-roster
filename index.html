<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17-0 NFL Roster Builder: 2025-26 Season</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  body { font-family: 'Roboto', sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background-color: #1e3f20; background-image: repeating-linear-gradient(0deg, transparent, transparent 48px, rgba(255,255,255,0.1) 48px, rgba(255,255,255,0.1) 50px); color: #fff; }
  .card { background: #111; padding: 20px; border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); margin-bottom: 20px; text-align: center; border-top: 5px solid #d50a0a; border-bottom: 5px solid #013369; position: relative; z-index: 10; }
  #mute-toggle { position: absolute; top: 15px; right: 15px; background: none; border: 1px solid #444; color: #777; font-size: 12px; padding: 5px 8px; cursor: pointer; border-radius: 4px; width: auto; z-index: 20;}
  h2, h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; margin-top: 0; }
  h2 { font-size: 36px; color: #fff; text-transform: uppercase; }
  
  #challenge-banner { display: none; background: #013369; color: #fff; padding: 15px; border-radius: 4px; margin-bottom: 20px; border: 2px solid #fff; text-align: center; }
  #challenge-banner strong { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #ffb300; }
  
  .team-logo-container { height: 160px; display: flex; align-items: center; justify-content: center; margin: 15px 0; background: #222; border-radius: 8px; border: 1px inset #333; overflow: hidden;}
  #team-logo-img { max-height: 140px; max-width: 150px; object-fit: contain; display: none; filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.5)); }
  select, button { padding: 12px; margin: 8px; font-size: 16px; width: 90%; max-width: 300px; box-sizing: border-box; }
  select { background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; }
  button { font-family: 'Bebas Neue', sans-serif; font-size: 20px; background: #d50a0a; color: white; border: none; border-radius: 4px; cursor: pointer; }
  
  .roster-slot { padding: 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; margin-bottom: 5px; border-radius: 4px; }
  .roster-slot strong { width: 80px; color: #aaa; font-family: 'Bebas Neue', sans-serif; font-size: 20px; }
  .player-info { display: flex; align-items: center; font-weight: bold; }
  .player-info img { height: 25px; margin-left: 10px; }
  
  /* CENTERED UI */
  .center-btn-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; margin-top: 20px; }
  
  #animation-container { display: none; margin-top: 20px; text-align: center; background: #111; padding: 15px; border-radius: 8px; border: 2px solid #333; }
  #tecmo-screen { width: 100%; height: 180px; background-color: #2e7d32; position: relative; overflow: hidden; border: 4px solid #fff; transition: background-color 0.5s; }
  .yard-line { width: 100%; height: 4px; background: rgba(255,255,255,0.6); position: absolute; animation: scrollField 1s linear infinite; }
  @keyframes scrollField { 0% { top: -10%; } 100% { top: 110%; } }
  .tecmo-player { width: 24px; height: 24px; background: #013369; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); animation: runDodging 3s ease-in-out infinite; }
  @keyframes runDodging { 0%, 100% { left: 50%; } 25% { left: 20%; } 75% { left: 80%; } }
  
  #dumpster { font-size: 50px; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); display: none; animation: flicker 0.2s infinite; }
  @keyframes flicker { 0% { opacity: 0.8; } 100% { opacity: 1; } }

  #sim-scoreboard { background: #000; color: #0f0; font-family: 'Courier New', monospace; font-size: 20px; padding: 5px; margin-bottom: 10px; border: 1px solid #333; }
  #sim-event-ticker { font-size: 16px; color: #ffb300; min-height: 40px; font-weight: bold; }
  #results { font-size: 18px; line-height: 1.4; display: none; margin-top: 20px; text-align: center; background: #222; padding: 20px; border-radius: 8px; border: 1px solid #444; }
  .super-bowl-glow { border-color: #ffb300 !important; box-shadow: 0 0 25px rgba(255, 179, 0, 0.6); }
</style>
</head>
<body>

<div class="card" id="draft-section">
  <button id="mute-toggle" onclick="toggleMute()">SOUND: ON</button>
  <h2>Roster Builder 2025-26</h2>
  <div class="team-logo-container">
    <span id="placeholder"><button onclick="startFirstSpin()">START DRAFT</button></span>
    <img id="team-logo-img" src="" alt="Team Logo">
  </div>
  <select id="position-select" onchange="updatePlayerDropdown()" disabled>
    <option value="QB">QB</option><option value="RB">RB</option><option value="WR">WR</option><option value="TE">TE</option><option value="Defense">DEF</option><option value="Coach">HC</option>
  </select>
  <br>
  <select id="player-select" disabled><option>Waiting...</option></select>
  <br>
  <button id="draft-btn" onclick="draftPlayer()" disabled>LOCK IN PICK</button>
</div>

<div id="challenge-banner"></div>

<div class="card roster">
  <h3 style="text-align: center;">YOUR 2025 SQUAD</h3>
  <div id="roster-QB" class="roster-slot"><strong>QB</strong> <div class="player-info">Empty</div></div>
  <div id="roster-RB" class="roster-slot"><strong>RB</strong> <div class="player-info">Empty</div></div>
  <div id="roster-WR" class="roster-slot"><strong>WR</strong> <div class="player-info">Empty</div></div>
  <div id="roster-TE" class="roster-slot"><strong>TE</strong> <div class="player-info">Empty</div></div>
  <div id="roster-Defense" class="roster-slot"><strong>DEF</strong> <div class="player-info">Empty</div></div>
  <div id="roster-Coach" class="roster-slot"><strong>HC</strong> <div class="player-info">Empty</div></div>
  
  <div class="center-btn-wrapper">
    <button id="sim-btn" onclick="triggerSimulation()" style="display:none; background: #28a745;">SIMULATE SEASON</button>
  </div>
  
  <div id="animation-container">
    <div id="sim-scoreboard">RECORD: 0 - 0</div>
    <div id="tecmo-screen"><div id="dumpster">🔥🗑️</div><div class="yard-line"></div><div class="tecmo-player"></div></div>
    <div id="sim-event-ticker">Booting up simulation...</div>
  </div>
  
  <div id="results"></div>
  <div class="center-btn-wrapper">
    <button id="challenge-btn" onclick="handleChallengeAction()" style="display:none; background: #013369; margin-bottom: 10px;">SHARE CHALLENGE</button>
    <button id="reset-btn" onclick="resetDraft()" style="display:none; background: #444;">NEW DRAFT</button>
  </div>
</div>

<script>
  let isMuted = false;
  let audioCtx = null;
  let rosterData = null;
  let roster = { QB: null, RB: null, WR: null, TE: null, Defense: null, Coach: null };
  let draftedTeams = [];
  let currentTeamObj = null;
  let finalCalculatedWins = 0;
  let targetWinsToBeat = null;

  const coachNames = {
    "Arizona Cardinals": "Jonathan Gannon", "Atlanta Falcons": "Raheem Morris", "Baltimore Ravens": "John Harbaugh", "Buffalo Bills": "Joe Brady", "Carolina Panthers": "Dave Canales", "Chicago Bears": "Ben Johnson", "Cincinnati Bengals": "Zac Taylor", "Cleveland Browns": "Kevin Stefanski", "Dallas Cowboys": "Brian Schottenheimer", "Denver Broncos": "Sean Payton", "Detroit Lions": "Dan Campbell", "Green Bay Packers": "Matt LaFleur", "Houston Texans": "DeMeco Ryans", "Indianapolis Colts": "Shane Steichen", "Jacksonville Jaguars": "Liam Coen", "Kansas City Chiefs": "Andy Reid", "Las Vegas Raiders": "Pete Carroll", "Los Angeles Chargers": "Jim Harbaugh", "Los Angeles Rams": "Sean McVay", "Miami Dolphins": "Mike McDaniel", "Minnesota Vikings": "Kevin O'Connell", "New England Patriots": "Mike Vrabel", "New Orleans Saints": "Kellen Moore", "New York Giants": "John Harbaugh", "New York Jets": "Aaron Glenn", "Philadelphia Eagles": "Nick Sirianni", "Pittsburgh Steelers": "Mike Tomlin", "San Francisco 49ers": "Kyle Shanahan", "Seattle Seahawks": "Mike Macdonald", "Tampa Bay Buccaneers": "Todd Bowles", "Tennessee Titans": "Brian Callahan", "Washington Commanders": "Dan Quinn"
  };

  const teams = [
    { name: "Arizona Cardinals", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/ari.png" }, { name: "Atlanta Falcons", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/atl.png" }, { name: "Baltimore Ravens", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/bal.png" }, { name: "Buffalo Bills", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/buf.png" }, { name: "Carolina Panthers", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/car.png" }, { name: "Chicago Bears", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/chi.png" }, { name: "Cincinnati Bengals", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/cin.png" }, { name: "Cleveland Browns", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/cle.png" }, { name: "Dallas Cowboys", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/dal.png" }, { name: "Denver Broncos", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/den.png" }, { name: "Detroit Lions", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/det.png" }, { name: "Green Bay Packers", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/gb.png" }, { name: "Houston Texans", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/hou.png" }, { name: "Indianapolis Colts", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/ind.png" }, { name: "Jacksonville Jaguars", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/jax.png" }, { name: "Kansas City Chiefs", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/kc.png" }, { name: "Las Vegas Raiders", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/lv.png" }, { name: "Los Angeles Chargers", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/lac.png" }, { name: "Los Angeles Rams", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/lar.png" }, { name: "Miami Dolphins", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/mia.png" }, { name: "Minnesota Vikings", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/min.png" }, { name: "New England Patriots", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/ne.png" }, { name: "New Orleans Saints", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/no.png" }, { name: "New York Giants", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/nyg.png" }, { name: "New York Jets", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/nyj.png" }, { name: "Philadelphia Eagles", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/phi.png" }, { name: "Pittsburgh Steelers", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/pit.png" }, { name: "San Francisco 49ers", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/sf.png" }, { name: "Seattle Seahawks", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/sea.png" }, { name: "Tampa Bay Buccaneers", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/tb.png" }, { name: "Tennessee Titans", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/ten.png" }, { name: "Washington Commanders", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/wsh.png" }
  ];

  function toggleMute() { isMuted = !isMuted; document.getElementById("mute-toggle").innerText = isMuted ? "SOUND: OFF" : "SOUND: ON"; }
  function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  function playBlip() { if (isMuted || !audioCtx) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.type = 'square'; o.frequency.setValueAtTime(600, audioCtx.currentTime); g.gain.setValueAtTime(0.01, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime + 0.05); }

  function playHooray() {
    if (isMuted || !audioCtx) return;
    const melody = [523, 659, 783, 1046, 783, 1046]; 
    melody.forEach((f, i) => {
      const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
      o.type = 'square'; o.frequency.setValueAtTime(f, audioCtx.currentTime + (i * 0.15));
      g.gain.setValueAtTime(0.03, audioCtx.currentTime + (i * 0.15)); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (i * 0.15) + 0.1);
      o.start(audioCtx.currentTime + (i * 0.15)); o.stop(audioCtx.currentTime + (i * 0.15) + 0.15);
    });
  }

  function playSad() {
    if (isMuted || !audioCtx) return;
    const notes = [392, 370, 349, 311]; 
    notes.forEach((f, i) => {
      const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sawtooth'; o.frequency.setValueAtTime(f, audioCtx.currentTime + (i * 0.3)); o.frequency.exponentialRampToValueAtTime(f - 50, audioCtx.currentTime + (i * 0.3) + 0.25);
      g.gain.setValueAtTime(0.04, audioCtx.currentTime + (i * 0.3)); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (i * 0.3) + 0.25);
      o.start(audioCtx.currentTime + (i * 0.3)); o.stop(audioCtx.currentTime + (i * 0.3) + 0.3);
    });
  }

  function startFirstSpin() { initAudio(); document.getElementById("placeholder").style.display = "none"; spinTeam(); }

  function spinTeam() {
    const img = document.getElementById("team-logo-img"); img.style.display = "block";
    const available = teams.filter(t => !draftedTeams.includes(t.name));
    let count = 0; let delay = 50;
    function perform() {
      currentTeamObj = available[Math.floor(Math.random() * available.length)];
      img.src = currentTeamObj.logo; playBlip();
      if (count++ < 30) { delay += 10; setTimeout(perform, delay); }
      else loadTeamRoster(currentTeamObj.name);
    }
    perform();
  }

  function loadTeamRoster(name) {
    currentFetchedRoster = rosterData[name];
    document.getElementById("position-select").disabled = false; document.getElementById("player-select").disabled = false; document.getElementById("draft-btn").disabled = false;
    updatePlayerDropdown();
  }

  function updatePlayerDropdown() {
    const pos = document.getElementById("position-select").value;
    const sel = document.getElementById("player-select"); sel.innerHTML = "";
    let list = (pos === "Defense") ? [`${currentTeamObj.name} D/ST`] : (pos === "Coach") ? [coachNames[currentTeamObj.name]] : currentFetchedRoster[pos];
    list.forEach(p => { let o = document.createElement("option"); o.innerText = p; sel.appendChild(o); });
  }

  function draftPlayer() {
    const pos = document.getElementById("position-select").value;
    const p = document.getElementById("player-select").value;
    roster[pos] = { name: p, logo: currentTeamObj.logo };
    document.getElementById(`roster-${pos}`).querySelector(".player-info").innerHTML = `${p} <img src="${currentTeamObj.logo}">`;
    draftedTeams.push(currentTeamObj.name);
    document.getElementById("position-select").remove(document.getElementById("position-select").selectedIndex);
    if (Object.values(roster).every(v => v !== null)) { document.getElementById("draft-section").style.display = "none"; document.getElementById("sim-btn").style.display = "block"; }
    else spinTeam();
  }

  function triggerSimulation() {
    document.getElementById("sim-btn").style.display = "none";
    document.getElementById("animation-container").style.display = "block";
    let wins = Math.floor(Math.random() * 15);
    finalCalculatedWins = wins;
    const stories = {
      good: ["Week 1: Massive win!", "Week 6: Mid-season dominance.", "Week 12: Playoff clinch!", "Week 17: Finishing strong."],
      mid: ["Week 1: Gritty win.", "Week 6: At .500 mark.", "Week 12: Wild Card hunting.", "Week 17: Finale pressure."],
      bad: ["Week 1: Disaster start.", "Week 6: Locker room tension.", "Week 12: Eliminated.", "Week 17: Finale embarrassment."]
    };
    let step = 0;
    const ticker = setInterval(() => {
      let type = wins >= 12 ? 'good' : (wins >= 8 ? 'mid' : 'bad');
      document.getElementById("sim-scoreboard").innerText = `RECORD: ${Math.floor((wins/4)*(step+1))} - ${Math.floor(((17-wins)/4)*(step+1))}`;
      document.getElementById("sim-event-ticker").innerText = stories[type][step];
      if (step++ >= 3) { clearInterval(ticker); showFinal(); }
    }, 3000); // 3 Second intervals
  }

  function showFinal() {
    document.getElementById("animation-container").style.display = "none";
    const r = document.getElementById("results"); r.classList.remove('super-bowl-glow');
    document.getElementById("tecmo-screen").style.backgroundColor = "#2e7d32";
    document.getElementById("dumpster").style.display = "none";
    
    let msg = `<strong>FINAL RECORD: ${finalCalculatedWins} - ${17-finalCalculatedWins}</strong><br><br>`;
    if (finalCalculatedWins === 17) {
      msg += "🏆 SUPER BOWL CHAMPIONS! 🏆<br>PERFECTION ACHIEVED."; r.classList.add('super-bowl-glow'); playHooray(); confetti({ particleCount: 300 });
    } else if (finalCalculatedWins >= 11) { msg += "ELITE SQUAD. CONTENDERS."; playHooray(); confetti(); }
    else if (finalCalculatedWins >= 8) msg += "MEDIOCRE. FIRST ROUND EXIT.";
    else {
      msg += "🗑️ TOTAL DUMPSTER FIRE. FIRE THE GM.";
      document.getElementById("animation-container").style.display = "block";
      document.getElementById("tecmo-screen").style.backgroundColor = "#5d1a1a";
      document.getElementById("dumpster").style.display = "block";
      playSad();
    }
    
    if (targetWinsToBeat !== null) { msg += `<br><hr><br>${finalCalculatedWins > targetWinsToBeat ? "CHALLENGE WON! 🏆" : "CHALLENGE FAILED. 😭"}`; }
    r.innerHTML = msg; r.style.display = "block";
    document.getElementById("challenge-btn").style.display = "block";
    document.getElementById("reset-btn").style.display = "block";
  }

  function resetDraft() { window.location.href = window.location.origin + window.location.pathname; }
  function handleChallengeAction() {
    const t = Object.values(roster).map(s => s.name).join(',');
    const url = `${window.location.origin}${window.location.pathname}?w=${finalCalculatedWins}&t=${encodeURIComponent(t)}`;
    navigator.clipboard.writeText(url).then(() => alert("Link Copied!"));
  }

  window.onload = async () => {
    const res = await fetch('rosters.json'); rosterData = await res.json();
    const params = new URLSearchParams(window.location.search);
    if(params.has('w')) {
      targetWinsToBeat = parseInt(params.get('w'));
      document.getElementById('challenge-banner').style.display = 'block';
      document.getElementById('challenge-banner').innerHTML = `<strong>⚠️ CHALLENGE ACTIVE ⚠️</strong><br>Beat: ${targetWinsToBeat} Wins`;
    }
  };
</script>
</body>
</html>
