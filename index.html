<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17-0 NFL Roster Builder: 2025 Underground</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root { --primary: #d50a0a; --accent: #013369; --glow: rgba(213, 10, 10, 0.4); }
  body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; color: #fff; margin: 0; padding: 20px; overflow-x: hidden; }
  
  /* CRT SCANLINE OVERLAY */
  body::before { content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 1000; }
  
  .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 25px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); margin-bottom: 25px; transition: all 0.3s ease; }
  .neon-border { border-top: 4px solid var(--primary); box-shadow: 0 -10px 20px var(--glow); }
  
  h2 { font-family: 'Press Start 2P', cursive; font-size: 18px; color: #fff; text-shadow: 2px 2px 0 var(--primary); margin-bottom: 30px; }
  h3 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; }
  
  #team-logo-img { max-height: 140px; display: none; filter: drop-shadow(0 0 10px var(--glow)); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
  
  button { font-family: 'Bebas Neue', sans-serif; font-size: 22px; background: var(--primary); border: none; padding: 12px 30px; border-radius: 4px; color: #fff; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
  button:hover { transform: translateY(-2px); filter: brightness(1.2); box-shadow: 0 0 15px var(--glow); }
  
  .roster-slot { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; transition: 0.5s; }
  .slot-label { font-family: 'Press Start 2P', cursive; font-size: 10px; color: #777; width: 60px; }
  .player-name { font-weight: 700; font-size: 18px; color: #eee; }
  
  #sim-scoreboard { font-family: 'Press Start 2P', cursive; font-size: 14px; color: #0f0; margin-bottom: 20px; }
  #results { display: none; background: rgba(0,0,0,0.8); padding: 30px; border-radius: 12px; border: 2px solid var(--primary); font-size: 20px; }
  .center-flex { display: flex; flex-direction: column; align-items: center; gap: 15px; }
</style>
</head>
<body>

<div class="glass-card neon-border center-flex" id="draft-section">
  <h2>17-0 BUILDER</h2>
  <div id="logo-container" style="height: 150px; display: flex; align-items: center;">
    <button onclick="startFirstSpin()" id="start-btn">INSERT COIN / START</button>
    <img id="team-logo-img" src="">
  </div>
  
  <select id="position-select" onchange="updatePlayerDropdown()" disabled>
    <option value="QB">QB</option><option value="RB">RB</option><option value="WR">WR</option><option value="TE">TE</option><option value="Defense">DEF</option><option value="Coach">HC</option>
  </select>
  <select id="player-select" disabled><option>...</option></select>
  <button id="draft-btn" onclick="draftPlayer()" disabled>LOCK IN PICK</button>
</div>

<div id="challenge-banner" class="glass-card" style="display:none; border-color: #ffb300; background: rgba(255, 179, 0, 0.1);"></div>

<div class="glass-card roster">
  <h3 style="text-align: center;">THE 2025 UNDERGROUND SQUAD</h3>
  <div id="roster-QB" class="roster-slot"><span class="slot-label">QB</span><div class="player-name">---</div></div>
  <div id="roster-RB" class="roster-slot"><span class="slot-label">RB</span><div class="player-name">---</div></div>
  <div id="roster-WR" class="roster-slot"><span class="slot-label">WR</span><div class="player-name">---</div></div>
  <div id="roster-TE" class="roster-slot"><span class="slot-label">TE</span><div class="player-name">---</div></div>
  <div id="roster-Defense" class="roster-slot"><span class="slot-label">DEF</span><div class="player-name">---</div></div>
  <div id="roster-Coach" class="roster-slot"><span class="slot-label">HC</span><div class="player-name">---</div></div>
  
  <div class="center-flex">
    <button id="sim-btn" onclick="triggerSimulation()" style="display:none; background: #28a745;">SIMULATE SEASON</button>
  </div>
  
  <div id="animation-container" style="display:none; margin-top:20px;">
    <div id="sim-scoreboard">LOADING... 0-0</div>
    <div id="sim-event-ticker" style="font-size:14px; color:#ffb300; font-weight:bold;"></div>
  </div>
  
  <div id="results"></div>
  <div class="center-flex" style="margin-top: 20px;">
    <button id="challenge-btn" onclick="handleChallengeAction()" style="display:none; background: #013369;">SHARE CHALLENGE</button>
    <button id="reset-btn" onclick="resetDraft()" style="display:none; background: #444;">NEW DRAFT</button>
  </div>
</div>

<script>
  let isMuted = false;
  let audioCtx = null;
  let rosterData = null;
  let roster = { QB: null, RB: null, WR: null, TE: null, Defense: null, Coach: null };
  let draftedTeams = [];
  let currentTeamObj = null;
  let finalCalculatedWins = 0;
  let targetWinsToBeat = null;

  const teamThemes = {
    "Buffalo Bills": { p: "#00338D", s: "#C60C30", g: "rgba(0, 51, 141, 0.6)" },
    "Kansas City Chiefs": { p: "#E31837", s: "#FFB81C", g: "rgba(227, 24, 55, 0.6)" },
    "Dallas Cowboys": { p: "#003594", s: "#869397", g: "rgba(0, 53, 148, 0.6)" },
    "San Francisco 49ers": { p: "#AA0000", s: "#B3995D", g: "rgba(170, 0, 0, 0.6)" },
    "Philadelphia Eagles": { p: "#004C54", s: "#A5ACAF", g: "rgba(0, 76, 84, 0.6)" },
    "New York Jets": { p: "#125740", s: "#FFFFFF", g: "rgba(18, 87, 64, 0.6)" }
    // (Default theme used if not listed)
  };

  const teams = [
    { name: "Arizona Cardinals", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/ari.png" }, { name: "Atlanta Falcons", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/atl.png" }, { name: "Baltimore Ravens", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/bal.png" }, { name: "Buffalo Bills", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/buf.png" }, { name: "Carolina Panthers", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/car.png" }, { name: "Chicago Bears", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/chi.png" }, { name: "Cincinnati Bengals", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/cin.png" }, { name: "Cleveland Browns", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/cle.png" }, { name: "Dallas Cowboys", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/dal.png" }, { name: "Denver Broncos", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/den.png" }, { name: "Detroit Lions", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/det.png" }, { name: "Green Bay Packers", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/gb.png" }, { name: "Houston Texans", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/hou.png" }, { name: "Indianapolis Colts", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/ind.png" }, { name: "Jacksonville Jaguars", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/jax.png" }, { name: "Kansas City Chiefs", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/kc.png" }, { name: "Las Vegas Raiders", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/lv.png" }, { name: "Los Angeles Chargers", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/lac.png" }, { name: "Los Angeles Rams", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/lar.png" }, { name: "Miami Dolphins", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/mia.png" }, { name: "Minnesota Vikings", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/min.png" }, { name: "New England Patriots", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/ne.png" }, { name: "New Orleans Saints", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/no.png" }, { name: "New York Giants", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/nyg.png" }, { name: "New York Jets", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/nyj.png" }, { name: "Philadelphia Eagles", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/phi.png" }, { name: "Pittsburgh Steelers", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/pit.png" }, { name: "San Francisco 49ers", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/sf.png" }, { name: "Seattle Seahawks", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/sea.png" }, { name: "Tampa Bay Buccaneers", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/tb.png" }, { name: "Tennessee Titans", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/ten.png" }, { name: "Washington Commanders", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/wsh.png" }
  ];

  function updateTheme(name) {
    const t = teamThemes[name] || { p: "#d50a0a", s: "#013369", g: "rgba(213, 10, 10, 0.4)" };
    document.documentElement.style.setProperty('--primary', t.p);
    document.documentElement.style.setProperty('--accent', t.s);
    document.documentElement.style.setProperty('--glow', t.g);
  }

  function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  function playBlip() { if (isMuted || !audioCtx) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.type = 'square'; o.frequency.setValueAtTime(440, audioCtx.currentTime); g.gain.setValueAtTime(0.01, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime + 0.05); }

  function startFirstSpin() { initAudio(); document.getElementById("start-btn").style.display = "none"; spinTeam(); }

  function spinTeam() {
    const img = document.getElementById("team-logo-img"); img.style.display = "block";
    const available = teams.filter(t => !draftedTeams.includes(t.name));
    let count = 0; let delay = 50;
    function perform() {
      currentTeamObj = available[Math.floor(Math.random() * available.length)];
      img.src = currentTeamObj.logo; playBlip();
      if (count++ < 30) { delay += 10; setTimeout(perform, delay); }
      else { 
        updateTheme(currentTeamObj.name);
        loadTeamRoster(currentTeamObj.name); 
      }
    }
    perform();
  }

  function loadTeamRoster(name) {
    currentFetchedRoster = rosterData[name];
    document.getElementById("position-select").disabled = false;
    document.getElementById("player-select").disabled = false;
    document.getElementById("draft-btn").disabled = false;
    updatePlayerDropdown();
  }

  function updatePlayerDropdown() {
    const pos = document.getElementById("position-select").value;
    const sel = document.getElementById("player-select"); sel.innerHTML = "";
    let list = (pos === "Defense") ? [`${currentTeamObj.name} D/ST`] : (pos === "Coach") ? [currentFetchedRoster["Coach"]] : currentFetchedRoster[pos];
    list.forEach(p => { let o = document.createElement("option"); o.innerText = p; sel.appendChild(o); });
  }

  function draftPlayer() {
    const pos = document.getElementById("position-select").value;
    const p = document.getElementById("player-select").value;
    roster[pos] = p;
    document.getElementById(`roster-${pos}`).querySelector(".player-name").innerText = p;
    draftedTeams.push(currentTeamObj.name);
    document.getElementById("position-select").remove(document.getElementById("position-select").selectedIndex);
    if (Object.values(roster).every(v => v !== null)) { 
      document.getElementById("draft-section").style.display = "none"; 
      document.getElementById("sim-btn").style.display = "block"; 
    } else spinTeam();
  }

  function triggerSimulation() {
    document.getElementById("sim-btn").style.display = "none";
    document.getElementById("animation-container").style.display = "block";
    let wins = Math.floor(Math.random() * 15);
    finalCalculatedWins = wins;
    const ticker = document.getElementById("sim-event-ticker");
    let step = 0;
    const timer = setInterval(() => {
      document.getElementById("sim-scoreboard").innerText = `WEEK ${step + 4}: ${Math.floor((wins/4)*(step+1))}-${Math.floor(((17-wins)/4)*(step+1))}`;
      ticker.innerText = (wins > 8) ? "MOVING THE CHAINS!" : "LOCKER ROOM TENSION...";
      if (step++ >= 3) { clearInterval(timer); showFinal(); }
    }, 2500);
  }

  function showFinal() {
    document.getElementById("animation-container").style.display = "none";
    const r = document.getElementById("results");
    r.innerHTML = `<h2 style="color:#0f0;">SEASON OVER: ${finalCalculatedWins}- ${17-finalCalculatedWins}</h2><p>${finalCalculatedWins > 12 ? "LEGENDARY. YOU BROKE THE LEAGUE." : "BETTER LUCK NEXT YEAR, ROOKIE."}</p>`;
    r.style.display = "block";
    document.getElementById("challenge-btn").style.display = "block";
    document.getElementById("reset-btn").style.display = "block";
    if (finalCalculatedWins >= 13) confetti();
  }

  function resetDraft() { window.location.href = window.location.origin + window.location.pathname; }
  function handleChallengeAction() { alert("Link Copied!"); }

  window.onload = async () => {
    const res = await fetch('rosters.json'); rosterData = await res.json();
    const params = new URLSearchParams(window.location.search);
    if(params.has('w')) {
      targetWinsToBeat = parseInt(params.get('w'));
      document.getElementById('challenge-banner').style.display = 'block';
      document.getElementById('challenge-banner').innerHTML = `<strong>CHALLENGE DETECTED: BEAT ${targetWinsToBeat} WINS</strong>`;
    }
  };
</script>
</body>
</html>
