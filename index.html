<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17-0 NFL Roster Builder: Underground Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root { --primary: #d50a0a; --accent: #013369; --glow: rgba(213, 10, 10, 0.4); --kickX: 0px; }
  body { font-family: 'Inter', sans-serif; background-color: #2e7d32; background-image: linear-gradient(90deg, transparent 49%, rgba(255,255,255,0.2) 49%, rgba(255,255,255,0.2) 51%, transparent 51%), repeating-linear-gradient(0deg, #2e7d32, #2e7d32 100px, #388e3c 100px, #388e3c 200px); color: #fff; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; }
  .main-container { width: 100%; max-width: 540px; min-height: 100vh; padding: 20px; box-sizing: border-box; position: relative; z-index: 5; }
  body::before { content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 1000; }
  .glass-card { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9); margin-bottom: 20px; text-align: center; border-top: 6px solid var(--primary); transition: border-color 0.4s ease; }
  h2 { font-family: 'Press Start 2P', cursive; font-size: 14px; text-shadow: 3px 3px 0 var(--primary); margin-bottom: 25px; line-height: 1.6; }
  select, button { width: 100%; padding: 18px; margin: 10px 0; font-size: 22px; border-radius: 10px; box-sizing: border-box; }
  select { background: #111 !important; color: #fff !important; border: 3px solid var(--primary); font-weight: bold; appearance: none; text-align-last: center; cursor: pointer;}
  button { font-family: 'Bebas Neue', sans-serif; background: var(--primary); color: white; border: none; cursor: pointer; text-transform: uppercase; }
  #mute-toggle { width: auto; position: absolute; top: 15px; right: 15px; padding: 8px 12px; font-size: 10px; background:#333; z-index: 1001; }
  .team-logo-container { height: 180px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 15px; margin-bottom: 15px; }
  #team-logo-img { max-height: 150px; display: none; filter: drop-shadow(0 0 20px var(--glow)); }
  .roster-slot { background: rgba(0,0,0,0.6); padding: 15px; margin: 8px 0; border-radius: 10px; border-left: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
  .slot-label { font-family: 'Press Start 2P', cursive; font-size: 10px; color: #888; }
  .player-name { font-weight: bold; font-size: 20px; color: #fff; }

  #kicker-container { display: none; background: #000; padding: 20px; border-radius: 15px; border: 3px solid #ffb300; position: relative; }
  .goal-posts { width: 60%; margin-left: 20%; height: 120px; border-left: 10px solid yellow; border-right: 10px solid yellow; border-bottom: 10px solid yellow; margin-bottom: 40px; position: relative; }
  #kicking-ball { width: 24px; height: 34px; background: #8b4513; border-radius: 50%; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); border: 2px solid #fff; display: none; z-index: 10; }
  @keyframes ballFlight {
    0% { bottom: -20px; transform: translateX(-50%) scale(1); opacity: 1; }
    100% { bottom: 130px; transform: translateX(calc(-50% + var(--kickX))) scale(0.4); opacity: 0.8; }
  }
  .kick-meter { width: 100%; height: 30px; background: #333; border-radius: 15px; position: relative; overflow: hidden; }
  .meter-target { width: 65px; height: 100%; background: #0f0; position: absolute; left: 50%; transform: translateX(-50%); box-shadow: 0 0 15px #0f0; }
  #meter-cursor { width: 20px; height: 20px; background: #fff; border-radius: 50%; position: absolute; top: 5px; left: 0; animation: slide 0.7s ease-in-out infinite alternate; border: 2px solid #000;}
  @keyframes slide { from { left: 5%; } to { left: 90%; } }

  #animation-container { display: none; margin: 25px 0; }
  #tecmo-screen { width: 100%; height: 160px; background-color: #2e7d32; position: relative; overflow: hidden; border: 4px solid #fff; border-radius: 10px; }
  .yard-line { width: 100%; height: 3px; background: rgba(255,255,255,0.4); position: absolute; animation: scrollField 0.8s linear infinite; }
  @keyframes scrollField { 0% { top: -10%; } 100% { top: 110%; } }

  .pixel-player { width: 30px; height: 40px; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); animation: runBob 0.4s infinite alternate; }
  .pixel-helmet { width: 20px; height: 16px; background: var(--primary); margin: 0 auto; border-radius: 4px 4px 0 0; position: relative; }
  .pixel-visor { width: 14px; height: 4px; background: #111; position: absolute; top: 5px; left: 3px; }
  .pixel-jersey { width: 26px; height: 18px; background: var(--accent); margin: -2px auto 0; border-radius: 2px; }
  .pixel-skin { width: 12px; height: 6px; background: #e0ac69; margin: -2px auto 0; }
  @keyframes runBob { from { bottom: 20px; } to { bottom: 25px; } }

  #sim-scoreboard { font-family: 'Press Start 2P', cursive; font-size: 14px; color: #0f0; margin-bottom: 12px; }
  #sim-event-ticker { color: #ffb300; font-family: 'Press Start 2P', cursive; font-size: 10px; margin-top: 15px; line-height: 1.4; height: 40px; }
  #results { display: none; padding: 25px; border-radius: 16px; border: 4px solid var(--primary); background: #111; font-size: 18px; }
  #challenge-banner { display: none; background: rgba(255, 179, 0, 0.2); border: 2px solid #ffb300; border-radius: 10px; padding: 10px; margin-bottom: 15px; font-size: 12px; font-weight: bold; color: #ffb300; }
</style>
</head>
<body>
<div class="main-container">
  <button id="mute-toggle" onclick="toggleMute()">SOUND: ON</button>
  <div id="challenge-banner"></div>
  <div class="glass-card" id="draft-section">
    <h2>UNDERGROUND<br>STADIUM BUILDER</h2>
    <div class="team-logo-container">
      <button id="start-btn" onclick="startFirstSpin()" style="font-size: 28px;">SPIN</button>
      <img id="team-logo-img" src="">
    </div>
    <select id="position-select" onchange="updateDropdown()" disabled>
      <option value="QB">QB</option><option value="RB">RB</option><option value="WR">WR</option><option value="TE">TE</option><option value="Defense">DEF</option><option value="Coach">HC</option>
    </select>
    <select id="player-select" disabled><option>...</option></select>
    <button id="draft-btn" onclick="draftPlayer()" disabled>LOCK IN PICK</button>
  </div>
  <div class="glass-card">
    <div id="roster-slots">
      <div id="roster-QB" class="roster-slot"><span class="slot-label">QB</span><div class="player-name">---</div></div>
      <div id="roster-RB" class="roster-slot"><span class="slot-label">RB</span><div class="player-name">---</div></div>
      <div id="roster-WR" class="roster-slot"><span class="slot-label">WR</span><div class="player-name">---</div></div>
      <div id="roster-TE" class="roster-slot"><span class="slot-label">TE</span><div class="player-name">---</div></div>
      <div id="roster-Defense" class="roster-slot"><span class="slot-label">DEF</span><div class="player-name">---</div></div>
      <div id="roster-Coach" class="roster-slot"><span class="slot-label">HC</span><div class="player-name">---</div></div>
    </div>
    <div style="display:flex; justify-content:center; width:100%;">
      <button id="sim-btn" onclick="triggerSimulation()" style="display:none; background: #28a745;">SIMULATE SEASON</button>
    </div>
    <div id="kicker-container">
      <h3 style="font-family:'Press Start 2P'; font-size:10px; color:#ffb300;">MID-SEASON FIELD GOAL</h3>
      <div class="goal-posts"><div id="kicking-ball"></div></div>
      <div class="kick-meter"><div class="meter-target"></div><div id="meter-cursor"></div></div>
      <button id="kick-action-btn" onclick="attemptKick()">KICK!</button>
    </div>
    <div id="animation-container">
      <div id="sim-scoreboard">RECORD: 0-0</div>
      <div id="tecmo-screen">
        <div class="yard-line" style="top:25%"></div><div class="yard-line" style="top:50%"></div><div class="yard-line" style="top:75%"></div>
        <div class="pixel-player">
          <div class="pixel-helmet"><div class="pixel-visor"></div></div>
          <div class="pixel-jersey"></div><div class="pixel-skin"></div>
        </div>
      </div>
      <div id="sim-event-ticker">READY FOR KICKOFF...</div>
    </div>
    <div id="results"></div>
    <div style="display:flex; flex-direction:column; align-items:center; width:100%;">
      <button id="challenge-btn" onclick="handleChallengeAction()" style="display:none; background: #013369;">SHARE CHALLENGE</button>
      <button id="reset-btn" onclick="location.reload()" style="display:none; background: #444;">NEW DRAFT</button>
    </div>
  </div>
</div>
<script>
  let isMuted = false, audioCtx = null, rosterData = null, draftedTeams = [], roster = {QB:null,RB:null,WR:null,TE:null,Defense:null,Coach:null}, currentTeam = null, finalWins = 0, bonusWins = 0, targetWins = null, teamPower = 0;
  
  const logoMap = {
    "Arizona Cardinals": "ari", "Atlanta Falcons": "atl", "Baltimore Ravens": "bal", "Buffalo Bills": "buf",
    "Carolina Panthers": "car", "Chicago Bears": "chi", "Cincinnati Bengals": "cin", "Cleveland Browns": "cle",
    "Dallas Cowboys": "dal", "Denver Broncos": "den", "Detroit Lions": "det", "Green Bay Packers": "gb",
    "Houston Texans": "hou", "Indianapolis Colts": "ind", "Jacksonville Jaguars": "jax", "Kansas City Chiefs": "kc",
    "Las Vegas Raiders": "lv", "Los Angeles Chargers": "lac", "Los Angeles Rams": "lar", "Miami Dolphins": "mia",
    "Minnesota Vikings": "min", "New England Patriots": "ne", "New Orleans Saints": "no", "New York Giants": "nyg",
    "New York Jets": "nyj", "Philadelphia Eagles": "phi", "Pittsburgh Steelers": "pit", "San Francisco 49ers": "sf",
    "Seattle Seahawks": "sea", "Tampa Bay Buccaneers": "tb", "Tennessee Titans": "ten", "Washington Commanders": "wsh"
  };

  const elitePlayers = ["Bosch Mallon", "Hat-Trick Ma-Homes", "Crusty McRunnery", "L'Amour Action", "King Henry", "Joe Furrow", "Rock Sturdy", "Don Far-Baugh"];
  const simEvents = ["WEEK 1: Bosch Mallon throws a laser.","WEEK 4: Locker room beef over snacks.","WEEK 7: HC loses his mind at the refs.","WEEK 12: RB breaks three ankles.","WEEK 16: Last second FG for the win!"];

  function toggleMute() { isMuted = !isMuted; document.getElementById("mute-toggle").innerText = isMuted ? "OFF" : "ON"; }
  function playSound(f, d=0.05, type='square') { if(isMuted) return; if(!audioCtx) audioCtx = new AudioContext(); if(audioCtx.state === 'suspended') audioCtx.resume(); const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type=type; o.frequency.value=f; g.gain.value=0.01; o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); }
  function playCrowd() { if(isMuted) return; if(!audioCtx) audioCtx = new AudioContext(); if(audioCtx.state === 'suspended') audioCtx.resume(); const bufSize = audioCtx.sampleRate * 2, buffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate), data = buffer.getChannelData(0); for(let i=0; i<bufSize; i++) data[i] = Math.random() * 2 - 1; const src = audioCtx.createBufferSource(), g = audioCtx.createGain(); src.buffer = buffer; g.gain.setValueAtTime(0, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 0.2); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.8); src.connect(g); g.connect(audioCtx.destination); src.start(); }

  function startFirstSpin() { playSound(600); document.getElementById("start-btn").style.display="none"; spinTeam(); }
  function spinTeam() {
    const img = document.getElementById("team-logo-img"); img.style.display="block";
    const available = Object.keys(rosterData).filter(t => !draftedTeams.includes(t));
    let count = 0; function perform() {
      const name = available[Math.floor(Math.random()*available.length)]; 
      img.src = `https://a.espncdn.com/i/teamlogos/nfl/500/${logoMap[name]||'nfl'}.png`;
      playSound(300 + count*15); if(count++ < 20) setTimeout(perform, 100); else { currentTeam = name; loadRoster(); }
    } perform();
  }
  function loadRoster() { ["position-select","player-select","draft-btn"].forEach(id => document.getElementById(id).disabled=false); updateDropdown(); }
  function updateDropdown() {
    const pos = document.getElementById("position-select").value, sel = document.getElementById("player-select"); sel.innerHTML="";
    let list = (pos==="Defense") ? [`${currentTeam} D/ST`] : (pos==="Coach") ? [rosterData[currentTeam]["Coach"]] : rosterData[currentTeam][pos];
    list.forEach(p => { let o = document.createElement("option"); o.innerText=p; o.value=p; sel.appendChild(o); });
  }
  function draftPlayer() {
    const pos = document.getElementById("position-select").value, p = document.getElementById("player-select").value;
    roster[pos] = p;
    if (elitePlayers.includes(p)) teamPower += 2.4;
    document.getElementById(`roster-${pos}`).querySelector(".player-name").innerText = p;
    draftedTeams.push(currentTeam); document.getElementById("position-select").remove(document.getElementById("position-select").selectedIndex);
    if(Object.values(roster).every(v => v!==null)) { document.getElementById("draft-section").style.display="none"; document.getElementById("sim-btn").style.display="block"; } 
    else { document.getElementById("start-btn").style.display = "block"; document.getElementById("start-btn").innerText = "SPIN"; }
  }
  function triggerSimulation() {
    document.getElementById("sim-btn").style.display="none"; document.getElementById("animation-container").style.display="block";
    finalWins = Math.floor(Math.random()*8) + 2 + Math.floor(teamPower);
    if(finalWins > 17) finalWins = 17;
    let step = 0; const timer = setInterval(() => {
      document.getElementById("sim-scoreboard").innerText = `RECORD: ${Math.floor((finalWins/6)*(step+1))}-${Math.floor(((17-finalWins)/6)*(step+1))}`;
      document.getElementById("sim-event-ticker").innerText = simEvents[Math.floor(Math.random()*simEvents.length)];
      if(step === 2) { clearInterval(timer); setTimeout(() => { document.getElementById("animation-container").style.display="none"; document.getElementById("kicker-container").style.display="block"; }, 1500); }
      if(step++ >= 5) { clearInterval(timer); showFinal(); }
    }, 2500);
  }
  function attemptKick() {
    const cursor = document.getElementById("meter-cursor"), target = document.querySelector(".meter-target"), ball = document.getElementById("kicking-ball"), btn = document.getElementById("kick-action-btn");
    const cursorRect = cursor.getBoundingClientRect(), targetRect = target.getBoundingClientRect();
    const cursorCenter = cursorRect.left + (cursorRect.width / 2);
    cursor.style.animation = "none";
    cursor.style.left = (cursorRect.left - cursor.parentElement.getBoundingClientRect().left) + "px";
    btn.disabled = true;
    const isHit = (cursorCenter >= targetRect.left && cursorCenter <= targetRect.right);
    const kickOffset = (cursorCenter - (targetRect.left + targetRect.width/2)) * 0.9;
    document.documentElement.style.setProperty('--kickX', `${kickOffset}px`);
    ball.style.display = "block"; ball.style.animation = "ballFlight 1s forwards ease-out";
    playCrowd();
    setTimeout(() => {
      if (isHit) { bonusWins = 2; playSound(800, 0.4); alert("IT'S GOOD! +2 WINS"); } 
      else { bonusWins = -1; playSound(200, 0.4); alert("WIDE! -1 WIN"); }
      document.getElementById("kicker-container").style.display="none"; showFinal();
    }, 1100);
  }
  function showFinal() {
    document.getElementById("animation-container").style.display = "none";
    const r = document.getElementById("results"), total = Math.max(0, Math.min(17, finalWins + bonusWins));
    let text = (total >= 12) ? "🔥 ELITE SQUAD." : (total >= 8 ? "😐 AGGRESSIVELY MID." : "💩 CLOWN SHOW.");
    if (targetWins !== null) { text += `<br><hr>${total > targetWins ? "CHALLENGE WON! 🏆" : "CHALLENGE FAILED. 😭"}`; }
    r.innerHTML = `<h2>FINAL: ${total}-${17-total}</h2><p>${text}</p>`;
    r.style.display="block"; document.getElementById("challenge-btn").style.display="block"; document.getElementById("reset-btn").style.display="block";
    if(total>=13) confetti();
  }
  async function handleChallengeAction() {
    const total = Math.max(0, Math.min(17, finalWins + bonusWins));
    const url = `${window.location.origin}${window.location.pathname}?w=${total}&t=${encodeURIComponent(Object.values(roster).join(','))}`;
    try { await navigator.clipboard.writeText(url); alert("Challenge Link Copied!"); } catch (err) { alert("Copy failed."); }
  }
  window.onload = async () => { const res = await fetch('rosters.json'); rosterData = await res.json();
    const params = new URLSearchParams(window.location.search);
    if(params.has('w')) { targetWins = parseInt(params.get('w')); document.getElementById('challenge-banner').style.display = 'block'; document.getElementById('challenge-banner').innerHTML = `⚠️ CHALLENGE: BEAT ${targetWins} WINS ⚠️`; }
  };
</script>
</body>
</html>
