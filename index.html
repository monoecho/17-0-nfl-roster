<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Football Picker: Isometric Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root { --primary: #d50a0a; --accent: #013369; --glow: rgba(213, 10, 10, 0.4); }
  body { font-family: 'Inter', sans-serif; background-color: #1a472a; background-image: linear-gradient(90deg, transparent 49%, rgba(255,255,255,0.1) 49%, rgba(255,255,255,0.1) 51%, transparent 51%), repeating-linear-gradient(0deg, #1a472a, #1a472a 100px, #245c38 100px, #245c38 200px); color: #fff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
  
  /* MAIN MENU */
  #main-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
  .menu-input { background: #111; border: 2px solid var(--primary); color: white; padding: 15px; font-family: 'Press Start 2P'; font-size: 14px; width: 100%; max-width: 300px; border-radius: 10px; margin: 20px 0; outline: none; text-align: center; }
  .mode-btn { width: 280px; margin: 10px; padding: 18px; font-family: 'Bebas Neue'; font-size: 24px; color: white; background: #222; border: 2px solid #444; border-radius: 12px; cursor: pointer; transition: 0.2s; }
  .mode-btn.active { border-color: var(--primary); background: var(--primary); box-shadow: 0 0 15px var(--glow); }

  .audio-dashboard { position: fixed; top: 10px; right: 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; background: rgba(0,0,0,0.85); padding: 10px; border-radius: 20px; border: 2px solid var(--primary); z-index: 2000; }
  #mute-toggle { background: none; border: none; font-size: 18px; cursor: pointer; color: white; }
  #volume-slider { appearance: none; width: 60px; height: 3px; background: #444; transform: rotate(-90deg); margin: 30px 0; cursor: pointer; }

  .main-container { width: 100%; max-width: 460px; padding: 10px; box-sizing: border-box; display: none; }
  .glass-card { background: rgba(0, 0, 0, 0.94); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px; padding: 15px; box-shadow: 0 10px 40px rgba(0, 0, 0, 1); margin-bottom: 12px; text-align: center; border-top: 4px solid var(--primary); }
  h1 { font-family: 'Bebas Neue', cursive; font-size: 38px; text-shadow: 2px 2px 0 var(--primary); margin: 0; }
  .team-tag { font-family: 'Press Start 2P'; font-size: 8px; color: #ffb300; margin: 5px 0 10px; }

  .team-logo-container { height: 120px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 10px; position: relative; }
  #team-logo-img { max-height: 100px; display: none; filter: drop-shadow(0 0 10px white); }
  #start-btn { position: absolute; width: 75px; height: 75px; border-radius: 50%; border: 3px solid #fff; background: radial-gradient(circle, var(--primary) 40%, #800 100%); color: white; font-family: 'Press Start 2P'; font-size: 9px; cursor: pointer; z-index: 50; }

  select, .std-btn { width: 100%; padding: 12px; margin: 5px 0; font-size: 18px; border-radius: 8px; font-family: 'Bebas Neue'; cursor: pointer; border: none; }
  select { background: #111 !important; color: #fff !important; border: 2px solid var(--primary) !important; appearance: none; text-align-last: center; }
  .std-btn { background: var(--primary); color: white; box-shadow: 0 3px 0 #800; }
  .std-btn:disabled { background: #333 !important; opacity: 0.5; pointer-events: none; }

  .roster-slot { background: rgba(0,0,0,0.7); padding: 6px 10px; margin: 4px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); border-left: 5px solid var(--primary); display: flex; align-items: center; gap: 10px; text-align: left; }
  .avatar-box { width: 32px; height: 32px; background: #222; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .player-name { font-weight: bold; font-size: 14px; color: #fff; flex-grow: 1; }

  #opponent-squad { display: none; background: rgba(1, 51, 105, 0.5); border: 2px solid #ffb300; border-radius: 10px; padding: 10px; margin-bottom: 10px; text-align: left; font-size: 9px; }

  /* MINI-GAME */
  #animation-container { display: none; margin: 10px 0; }
  #tecmo-screen { height: 160px; width: 100%; position: relative; overflow: hidden; background: #2e7d32; border: 3px solid #fff; border-radius: 10px; touch-action: none; cursor: crosshair; }
  #main-sprite { width: 32px; height: 24px; position: absolute; left: 30px; top: 50%; transform: translateY(-50%); z-index: 20; border-radius: 3px; border-right: 8px solid gold; }
  .defender-h { width: 30px; height: 24px; position: absolute; background: #555; border: 2px solid #000; border-radius: 3px; z-index: 15; right: -40px; }

  /* ISOMETRIC FGMG */
  #kicker-container, #results { display: none; }
  .goal-field-iso { width: 100%; height: 240px; background: #2e7d32; position: relative; border: 3px solid #fff; border-radius: 12px; overflow: hidden; 
    perspective: 1000px; transform-style: preserve-3d; }
  
  .iso-ground { position: absolute; inset: 0; background: repeating-linear-gradient(90deg, #2e7d32, #2e7d32 40px, #2a752e 40px, #2a752e 80px); transform: rotateX(45deg); transform-origin: top; }
  
  .iso-uprights { position: absolute; top: 15px; left: 65%; transform: translateX(-50%) rotateY(-30deg); width: 60px; height: 120px; border-left: 6px solid yellow; border-right: 6px solid yellow; border-bottom: 6px solid yellow; z-index: 5; background: rgba(255,255,0,0.1); }
  
  #ball-iso { width: 18px; height: 24px; background: #8b4513; border-radius: 50%; position: absolute; z-index: 10; display: none; border: 2px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
  #ball-shadow-iso { width: 18px; height: 8px; background: rgba(0,0,0,0.3); border-radius: 50%; position: absolute; z-index: 9; display: none; }
  #aim-preview { position: absolute; width: 2px; height: 150px; background: rgba(255,255,255,0.3); bottom: 20px; left: 20%; transform-origin: bottom center; display: none; }
</style>
</head>
<body>

<div id="main-menu">
  <h1 style="font-size: 40px; color: var(--primary);">FOOTBALL PICKER</h1>
  <input type="text" id="team-name-input" class="menu-input" placeholder="FRANCHISE NAME..." maxlength="12">
  <div style="display: flex; flex-direction: column; gap: 10px;">
    <button class="mode-btn active" id="solo-btn" onclick="setMode('solo')">SOLO SEASON</button>
    <button class="mode-btn" id="vs-btn" onclick="setMode('vs')">VERSUS CHALLENGE</button>
  </div>
  <button class="std-btn" style="width: 280px; margin-top: 25px; font-size: 26px;" onclick="startGame()">START CAREER</button>
</div>

<div class="audio-dashboard">
  <button id="mute-toggle" onclick="toggleMute()">🔊</button>
  <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateVolume()">
</div>

<div class="main-container" id="game-ui">
  <div class="glass-card" id="draft-section">
    <h1 id="ui-team-name">TEAM NAME</h1>
    <div class="team-tag" id="ui-mode-tag">SOLO MODE</div>
    <div id="opponent-squad">
      <strong style="color: #ffb300; font-family:'Press Start 2P'; font-size: 8px;">CHALLENGER SQUAD FOUND:</strong><br>
      <div id="opp-players-list" style="margin-top: 5px; opacity: 0.9;"></div>
    </div>
    <div class="team-logo-container">
      <img id="team-logo-img" src="">
      <button id="start-btn" onclick="spinTeam()">SPIN</button>
    </div>
    <select id="position-select" onchange="updateDropdown()" disabled><option value="QB">QB</option><option value="RB">RB</option><option value="WR">WR</option><option value="TE">TE</option><option value="Defense">DEF</option><option value="Coach">HC</option></select>
    <select id="player-select" disabled><option>...</option></select>
    <button id="draft-btn" class="std-btn" onclick="draftPlayer()" disabled>LOCK PICK</button>
  </div>

  <div class="glass-card">
    <div id="roster-slots">
      <div id="roster-QB" class="roster-slot"><div class="avatar-box">🏈</div><div class="player-name">---</div></div>
      <div id="roster-RB" class="roster-slot"><div class="avatar-box">🏃</div><div class="player-name">---</div></div>
      <div id="roster-WR" class="roster-slot"><div class="avatar-box">👐</div><div class="player-name">---</div></div>
      <div id="roster-TE" class="roster-slot"><div class="avatar-box">💪</div><div class="player-name">---</div></div>
      <div id="roster-Defense" class="roster-slot"><div class="avatar-box">🛡️</div><div class="player-name">---</div></div>
      <div id="roster-Coach" class="roster-slot"><div class="avatar-box">📋</div><div class="player-name">---</div></div>
    </div>
    <button id="sim-btn" class="std-btn" onclick="triggerSimulation()" style="margin-top: 15px; background: #28a745; display:none;">START SEASON</button>
    
    <div id="kicker-container">
      <div id="kick-msg" style="color:#0f0; font-family:'Press Start 2P'; font-size:12px; height:15px; margin-bottom:10px;"></div>
      <div class="goal-field-iso">
        <div class="iso-ground"></div>
        <div class="iso-uprights"></div>
        <div id="aim-preview"></div>
        <div id="ball-shadow-iso"></div>
        <div id="ball-iso"></div>
      </div>
      <div id="meter-text" style="font-family:'Press Start 2P'; font-size:8px; color:#ffb300; margin: 10px 0 5px;">POWER</div>
      <div style="width:100%; height:25px; background:#222; position:relative; border-radius:8px; overflow:hidden; border: 1px solid #444;">
        <div id="p-fill" style="height:100%; background:linear-gradient(90deg,#333,#0f0,#f00); width:0%;"></div>
        <div id="meter-cursor" style="width:8px; height:100%; background:#fff; position:absolute; left:0;"></div>
      </div>
      <button id="kick-action-btn" class="std-btn" onclick="handleKickInput()">STOP POWER</button>
    </div>

    <div id="animation-container">
      <div id="sim-scoreboard" style="font-family:'Press Start 2P'; font-size:8px; color:#0f0; margin-bottom:8px;">HYPE: +0 WINS</div>
      <div id="tecmo-screen"><div id="main-sprite"></div></div>
      <div id="sim-event-ticker" style="color:#ffb300; font-family:'Press Start 2P'; font-size:10px; margin-top:8px;">DODGE!</div>
    </div>
    
    <div id="results" style="font-weight:bold; background:#111; border-radius:10px; padding:12px; margin-top:10px;"></div>
    <div style="display:flex; gap:10px; margin-top:10px;">
      <button id="reset-btn" class="std-btn" onclick="location.reload()" style="display:none; background:#444; flex:1;">NEW DRAFT</button>
      <button id="challenge-btn" class="std-btn" onclick="handleChallengeAction()" style="background:#013369; display:none; flex:1;">SHARE</button>
    </div>
  </div>
</div>

<script>
  const logoMap = {"Arizona Cardinals":"ari","Atlanta Falcons":"atl","Baltimore Ravens":"bal","Buffalo Bills":"buf","Carolina Panthers":"car","Chicago Bears":"chi","Cincinnati Bengals":"cin","Cleveland Browns":"cle","Dallas Cowboys":"dal","Denver Broncos":"den","Detroit Lions":"det","Green Bay Packers":"gb","Houston Texans":"hou","Indianapolis Colts":"ind","Jacksonville Jaguars":"jax","Kansas City Chiefs":"kc","Las Vegas Raiders":"lv","Los Angeles Chargers":"lac","Los Angeles Rams":"lar","Miami Dolphins":"mia","Minnesota Vikings":"min","New England Patriots":"ne","New Orleans Saints":"no","New York Giants":"nyg","New York Jets":"nyj","Philadelphia Eagles":"phi","Pittsburgh Steelers":"pit","San Francisco 49ers":"sf","Seattle Seahawks":"sea","Tampa Bay Buccaneers":"tb","Tennessee Titans":"ten","Washington Commanders":"wsh"};
  const teamThemes = { "Arizona Cardinals":["#97233f","#000000"],"Atlanta Falcons":["#a71930","#000000"],"Baltimore Ravens":["#241773","#000000"],"Buffalo Bills":["#00338d","#c60c30"],"Carolina Panthers":["#0085ca","#000000"],"Chicago Bears":["#0b162a","#c83803"],"Cincinnati Bengals":["#fb4f14","#000000"],"Cleveland Browns":["#311d00","#ff3c00"],"Dallas Cowboys":["#002244","#869397"],"Denver Broncos":["#fb4f14","#002244"],"Detroit Lions":["#0076b6","#b0b7bc"],"Green Bay Packers":["#203731","#ffb612"],"Houston Texans":["#03202f","#a71930"],"Indianapolis Colts":["#002c5f","#a5acaf"],"Jacksonville Jaguars":["#006778","#9f792c"],"Kansas City Chiefs":["#e31837","#ffb612"],"Las Vegas Raiders":["#a5acaf","#000000"],"Los Angeles Chargers":["#0073cf","#ffb612"],"Los Angeles Rams":["#002244","#b3995d"],"Miami Dolphins":["#008e97","#f26a24"],"Minnesota Vikings":["#4f2683","#ffc62f"],"New England Patriots":["#002244","#c60c30"],"New Orleans Saints":["#d3bc8d","#000000"],"New York Giants":["#0b2265","#a71930"],"New York Jets":["#003f2d","#ffffff"],"Philadelphia Eagles":["#004c54","#a5acaf"],"Pittsburgh Steelers":["#000000","#ffb612"],"San Francisco 49ers":["#aa0000","#b3995d"],"Seattle Seahawks":["#002244","#69be28"],"Tampa Bay Buccaneers":["#d50a0a","#000000"],"Tennessee Titans":["#4b92db","#0c2340"],"Washington Commanders":["#5a1414","#ffb612"] };

  let audioCtx, gainNode, rosterData, draftedTeams = [], draftedPlayers = [], roster = {QB:null,RB:null,WR:null,TE:null,Defense:null,Coach:null}, currentTeam, finalWins, challengerWins = 0, bonusWins = 0, vol = 0.5, isMuted = false, gameMode = 'solo';
  let kickStep = 1, meterPos = 0, meterDir = 1, meterInterval, powerVal = 0, aimVal = 50;
  let playerTop = 50, dodges = 0, gameActive = false, isStunned = false;

  function setMode(mode) { 
    gameMode = mode; 
    document.getElementById('solo-btn').classList.toggle('active', mode==='solo'); 
    document.getElementById('vs-btn').classList.toggle('active', mode==='vs'); 
  }

  function startGame() {
    const name = document.getElementById('team-name-input').value || 'MY TEAM';
    document.getElementById('ui-team-name').innerText = name.toUpperCase();
    document.getElementById('ui-mode-tag').innerText = gameMode === 'vs' ? 'VS CHALLENGE' : 'SOLO CAREER';
    if(gameMode === 'solo') {
      document.getElementById('opponent-squad').style.display = 'none';
      challengerWins = 0;
    }
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    initAudio();
  }

  function initAudio() { if(!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); gainNode = audioCtx.createGain(); gainNode.connect(audioCtx.destination); updateVolume(); } if(audioCtx.state === 'suspended') audioCtx.resume(); }
  function toggleMute() { isMuted = !isMuted; document.getElementById("mute-toggle").innerText = isMuted ? "🔇" : "🔊"; if(gainNode) gainNode.gain.value = isMuted ? 0 : vol * 0.1; }
  function updateVolume() { vol = document.getElementById("volume-slider").value; if(gainNode) gainNode.gain.value = isMuted ? 0 : vol * 0.1; }
  function playNote(f, d = 0.1) { initAudio(); if(isMuted) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = 'square'; o.frequency.value = f; g.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d); }

  function spinTeam() {
    initAudio(); const btn = document.getElementById("start-btn"), img = document.getElementById("team-logo-img");
    if(!rosterData) return; btn.style.display = "none"; img.style.display = "block";
    const available = Object.keys(rosterData).filter(t => !draftedTeams.includes(t));
    let count = 0; function perform() {
      const name = available[Math.floor(Math.random()*available.length)];
      img.src = `https://a.espncdn.com/i/teamlogos/nfl/500/${logoMap[name] || 'nfl'}.png`;
      playNote(150 + count*20); if(count++ < 12) setTimeout(perform, 80); else { currentTeam = name; document.documentElement.style.setProperty('--primary', teamThemes[name][0]); loadRoster(); }
    } perform();
  }

  function loadRoster() { ["position-select","player-select","draft-btn"].forEach(id => document.getElementById(id).disabled=false); updateDropdown(); }
  function updateDropdown() {
    const pos = document.getElementById("position-select").value, sel = document.getElementById("player-select"); sel.innerHTML="";
    let list = (pos==="Defense") ? [`${currentTeam} D/ST`] : (pos==="Coach") ? [rosterData[currentTeam]["Coach"]] : rosterData[currentTeam][pos];
    list.forEach(p => { if(!draftedPlayers.includes(p)) { let o = document.createElement("option"); o.innerText=p; o.value=p; sel.appendChild(o); } });
  }

  function draftPlayer() {
    const pos = document.getElementById("position-select").value, p = document.getElementById("player-select").value, btn = document.getElementById("draft-btn");
    btn.disabled = true; roster[pos] = p; draftedPlayers.push(p);
    playNote(220); setTimeout(() => playNote(110, 0.2), 50);
    const slot = document.getElementById(`roster-${pos}`); slot.querySelector(".player-name").innerText = p;
    slot.style.background = teamThemes[currentTeam][0]; slot.style.borderColor = teamThemes[currentTeam][1];
    draftedTeams.push(currentTeam); document.getElementById("position-select").remove(document.getElementById("position-select").selectedIndex);
    if(Object.values(roster).every(v => v!==null)) { document.getElementById("draft-section").style.display="none"; document.getElementById("sim-btn").style.display="block"; } 
    else { document.getElementById("start-btn").style.display = "block"; document.getElementById("team-logo-img").style.display = "none"; }
  }

  function triggerSimulation() {
    document.getElementById("sim-btn").style.display="none"; document.getElementById("animation-container").style.display="block";
    const sprite = document.getElementById("main-sprite"), screen = document.getElementById("tecmo-screen");
    sprite.style.background = teamThemes[draftedTeams[0]][0]; gameActive = true; dodges = 0;
    const move = (e) => {
      if(!gameActive || isStunned) return;
      const rect = screen.getBoundingClientRect();
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
      playerTop = Math.max(10, Math.min(90, (y / rect.height) * 100));
      sprite.style.top = playerTop + "%";
    };
    screen.addEventListener("mousemove", move);
    screen.addEventListener("touchmove", (e) => { e.preventDefault(); move(e); }, {passive: false});

    let frame = 0, userWins = 0;
    const gameLoop = setInterval(() => {
      if(frame % 35 === 0) spawnDefender();
      if(frame % 25 === 0 && Math.random() < 0.5) userWins++;
      document.getElementById("sim-scoreboard").innerText = `YOU: ${userWins}-${Math.max(0, Math.ceil(frame/25)-userWins)} | HYPE: +${Math.floor(dodges/6)}`;
      if(frame++ > 400) { clearInterval(gameLoop); gameActive = false; finalWins = userWins; bonusWins = Math.floor(dodges/6); setTimeout(() => { document.getElementById("animation-container").style.display="none"; document.getElementById("kicker-container").style.display="block"; startKickerMeter(); }, 1000); }
    }, 40);
  }

  function spawnDefender() {
    const d = document.createElement("div"); d.className = "defender-h"; d.style.top = Math.random()*70 + 15 + "%";
    document.getElementById("tecmo-screen").appendChild(d);
    let left = 110; const dInt = setInterval(() => { 
      left -= 3.5; d.style.left = left + "%"; 
      if(left < 15 && !d.hit && Math.abs(parseFloat(d.style.top) - playerTop) < 15) { 
        d.hit = true; isStunned = true; dodges = Math.max(0, dodges - 2);
        document.getElementById("main-sprite").classList.add("stunned"); playNote(80, 0.4);
        setTimeout(() => { isStunned = false; document.getElementById("main-sprite").classList.remove("stunned"); }, 1200);
      } else if (left < 5 && !d.hit) { d.hit = true; dodges++; playNote(600, 0.05); }
      if(left < -20) { clearInterval(dInt); d.remove(); } 
    }, 30);
  }

  // ISOMETRIC FGMG ENGINE
  function startKickerMeter() {
    kickStep = 1; meterPos = 0; meterDir = 1;
    document.getElementById("aim-preview").style.display = "none";
    meterInterval = setInterval(() => {
      meterPos += meterDir * 2.5; if(meterPos >= 100 || meterPos <= 0) meterDir *= -1;
      document.getElementById("meter-cursor").style.left = meterPos + "%";
      if(kickStep === 1) document.getElementById("p-fill").style.width = meterPos + "%";
      else {
        document.getElementById("aim-preview").style.display = "block";
        document.getElementById("aim-preview").style.transform = `translateX(-50%) rotate(${(meterPos-50)/5}deg)`;
      }
    }, 20);
  }

  function handleKickInput() {
    if(kickStep === 1) { 
      kickStep = 2; powerVal = meterPos; 
      document.getElementById("meter-text").innerText = "AIM"; 
      document.getElementById("kick-action-btn").innerText = "KICK!";
    } else { clearInterval(meterInterval); aimVal = meterPos; executeIsoKick(); }
  }

  function executeIsoKick() {
    const ball = document.getElementById("ball-iso"), shadow = document.getElementById("ball-shadow-iso");
    ball.style.display = shadow.style.display = "block";
    document.getElementById("aim-preview").style.display = "none";

    let x = 15, y = 20, z = 0; // Starting iso position
    let vx = (powerVal / 18) + 3, vy = (aimVal - 50) / 10, vz = 12, grav = 0.45;
    
    const pInt = setInterval(() => {
      x += vx; y += vy; z += vz; vz -= grav;
      
      // Isometric projection
      ball.style.left = (x * 3) + "px";
      ball.style.bottom = (y + z) + "px";
      shadow.style.left = (x * 3) + "px";
      shadow.style.bottom = y + "px";
      ball.style.transform = `scale(${Math.max(0.2, 1 - (x/150))})`;
      shadow.style.transform = `scale(${Math.max(0.1, 1 - (x/150))})`;

      if(x >= 95) { 
        clearInterval(pInt);
        // Uprights are at left: 65% (approx 290px). crossbar is at bottom 120px.
        const ballPos = parseFloat(ball.style.bottom);
        const isGood = (ballPos > 115 && y > 165 && y < 225); 
        document.getElementById("kick-msg").innerText = isGood ? "IT'S GOOD!" : "MISS!";
        bonusWins = isGood ? 3 : -1;
        setTimeout(() => { document.getElementById("kicker-container").style.display="none"; showFinal(); }, 1500);
      }
    }, 30);
  }

  function showFinal() {
    const r = document.getElementById("results"); const total = Math.max(0, Math.min(17, finalWins + bonusWins));
    const winV = challengerWins > 0 && total > challengerWins;
    const praise = total >= 14 ? "ELITE GM. YOU OWN THIS LEAGUE." : (total < 9 ? "WASTED ROSTER. THE FANS ARE BOOING." : "AVERAGE. THE MID-TIER TRAP.");
    r.innerHTML = `<h2>FINAL: ${total}-${17-total}</h2><p style="font-size:10px; color:#ffb300;">${praise}</p><span>${challengerWins > 0 ? (winV ? '🏆 CHALLENGER DEFEATED!' : '❌ CHALLENGER WON') : ''}</span>`;
    r.style.display="block"; document.getElementById("reset-btn").style.display="block"; document.getElementById("challenge-btn").style.display="block"; if(total>=14) confetti();
  }

  async function handleChallengeAction() {
    const total = Math.max(0, Math.min(17, finalWins + bonusWins));
    navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?w=${total}&t=${encodeURIComponent(Object.values(roster).join(','))}`).then(() => alert("Link Copied!"));
  }

  window.onload = async () => { 
    const res = await fetch('rosters.json'); rosterData = await res.json(); 
    const params = new URLSearchParams(window.location.search);
    if(params.has('t')) {
      document.getElementById('opponent-squad').style.display = 'block';
      document.getElementById('opp-players-list').innerHTML = params.get('t').split(',').map(p => `• ${p}`).join('<br>');
      challengerWins = parseInt(params.get('w'));
      setMode('vs');
    }
  };
</script>
