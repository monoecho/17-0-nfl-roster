<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Football Picker: Compact Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root { --primary: #d50a0a; --accent: #013369; --glow: rgba(213, 10, 10, 0.4); }
  body { font-family: 'Inter', sans-serif; background-color: #1a472a; background-image: linear-gradient(90deg, transparent 49%, rgba(255,255,255,0.1) 49%, rgba(255,255,255,0.1) 51%, transparent 51%), repeating-linear-gradient(0deg, #1a472a, #1a472a 100px, #245c38 100px, #245c38 200px); color: #fff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; touch-action: pan-y; }
  
  .audio-dashboard { position: fixed; top: 10px; right: 10px; display: flex; flex-direction: column; align-items: center; gap: 10px; background: rgba(0,0,0,0.85); padding: 10px 8px; border-radius: 20px; border: 2px solid var(--primary); z-index: 2000; }
  #mute-toggle { background: none; border: none; font-size: 18px; cursor: pointer; color: white; }
  #volume-slider { appearance: none; width: 60px; height: 3px; background: #444; transform: rotate(-90deg); margin: 30px 0; border-radius: 2px; cursor: pointer; }

  .main-container { width: 100%; max-width: 480px; padding: 10px; box-sizing: border-box; }
  .glass-card { background: rgba(0, 0, 0, 0.94); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px; padding: 15px; box-shadow: 0 10px 40px rgba(0, 0, 0, 1); margin-bottom: 12px; text-align: center; border-top: 4px solid var(--primary); position: relative; }
  h1 { font-family: 'Bebas Neue', cursive; font-size: 38px; text-shadow: 2px 2px 0 var(--primary); margin: 0 0 10px 0; }

  .team-logo-container { height: 140px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 10px; position: relative; }
  #team-logo-img { max-height: 110px; display: none; filter: drop-shadow(0 0 10px white); }
  #start-btn { position: absolute; width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fff; background: radial-gradient(circle, var(--primary) 40%, #800 100%); color: white; font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer; }

  select, .std-btn { width: 100%; padding: 12px; margin: 6px 0; font-size: 18px; border-radius: 8px; box-sizing: border-box; font-family: 'Bebas Neue'; cursor: pointer; border: none; }
  select { background: #111 !important; color: #fff !important; border: 2px solid var(--primary) !important; text-align-last: center; appearance: none; }
  .std-btn { background: var(--primary); color: white; box-shadow: 0 3px 0 #800; }
  .std-btn:disabled { background: #333 !important; opacity: 0.5; box-shadow: none; pointer-events: none; }

  .roster-slot { background: rgba(0,0,0,0.7); padding: 6px 10px; margin: 4px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); border-left: 5px solid var(--primary); display: flex; align-items: center; gap: 10px; text-align: left; }
  .avatar-box { width: 32px; height: 32px; background: #222; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .player-name { font-weight: bold; font-size: 14px; color: #fff; }

  #opponent-squad { display: none; background: rgba(1, 51, 105, 0.5); border: 2px solid #ffb300; border-radius: 10px; padding: 10px; margin-bottom: 10px; text-align: left; font-size: 10px; }

  /* COMPACT MINI-GAME */
  #animation-container { display: none; margin: 10px 0; }
  #tecmo-screen { height: 180px; width: 100%; position: relative; overflow: hidden; background: #2e7d32; border: 3px solid #fff; border-radius: 10px; touch-action: none; cursor: crosshair; }
  #main-sprite { width: 34px; height: 26px; position: absolute; left: 30px; top: 50%; transform: translateY(-50%); z-index: 20; border-radius: 3px; border-right: 8px solid gold; }
  .defender-h { width: 30px; height: 24px; position: absolute; background: #555; border: 2px solid #000; border-radius: 3px; z-index: 15; right: -40px; }
  .stunned { animation: flashStun 0.1s infinite; opacity: 0.5; }
  @keyframes flashStun { 0% { background: red; } 100% { background: white; } }

  /* COMPACT FGMG */
  #kicker-container, #results { display: none; }
  .goal-field { width: 100%; height: 200px; background: linear-gradient(#1b5e20, #2e7d32); position: relative; border: 2px solid #fff; overflow: hidden; border-radius: 10px; }
  .uprights { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 14%; height: 80px; border-left: 5px solid yellow; border-right: 5px solid yellow; border-bottom: 5px solid yellow; z-index: 5; }
  #ball-physics { width: 16px; height: 22px; background: #8b4513; border-radius: 50%; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); border: 2px solid #fff; z-index: 10; display: none; }
  #ball-shadow { width: 16px; height: 6px; background: rgba(0,0,0,0.3); border-radius: 50%; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 9; display: none; }
</style>
</head>
<body>

<div class="audio-dashboard">
  <button id="mute-toggle" onclick="toggleMute()">🔊</button>
  <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateVolume()">
</div>

<div class="main-container">
  <div class="glass-card" id="draft-section">
    <h1>TEAM PICKER</h1>
    <div id="opponent-squad">
      <strong style="color: #ffb300; font-family:'Press Start 2P'; font-size: 8px;">VS CHALLENGER:</strong><br>
      <div id="opp-players-list" style="margin-top: 5px; opacity: 0.9;"></div>
    </div>
    <div class="team-logo-container">
      <img id="team-logo-img" src="">
      <button id="start-btn" onclick="spinTeam()">SPIN</button>
    </div>
    <select id="position-select" onchange="updateDropdown()" disabled><option value="QB">QB</option><option value="RB">RB</option><option value="WR">WR</option><option value="TE">TE</option><option value="Defense">DEF</option><option value="Coach">HC</option></select>
    <select id="player-select" disabled><option>...</option></select>
    <button id="draft-btn" class="std-btn" onclick="draftPlayer()" disabled>LOCK PICK</button>
  </div>

  <div class="glass-card">
    <div id="roster-slots">
      <div id="roster-QB" class="roster-slot"><div class="avatar-box">🏈</div><div class="player-name">---</div></div>
      <div id="roster-RB" class="roster-slot"><div class="avatar-box">🏃</div><div class="player-name">---</div></div>
      <div id="roster-WR" class="roster-slot"><div class="avatar-box">👐</div><div class="player-name">---</div></div>
      <div id="roster-TE" class="roster-slot"><div class="avatar-box">💪</div><div class="player-name">---</div></div>
      <div id="roster-Defense" class="roster-slot"><div class="avatar-box">🛡️</div><div class="player-name">---</div></div>
      <div id="roster-Coach" class="roster-slot"><div class="avatar-box">📋</div><div class="player-name">---</div></div>
    </div>
    <button id="sim-btn" class="std-btn" onclick="triggerSimulation()" style="margin-top: 20px; background: #28a745; display:none;">START SIM</button>
    
    <div id="kicker-container">
      <div id="kick-msg" style="color:#0f0; font-family:'Press Start 2P'; font-size:10px; height:15px; margin-bottom:5px;"></div>
      <div class="goal-field"><div class="uprights"></div><div id="ball-shadow"></div><div id="ball-physics"></div></div>
      <div id="kicker-meter-ui" style="width:100%; height:30px; background:#222; position:relative; margin:10px 0; overflow:hidden;"><div id="p-fill" style="height:100%; background:linear-gradient(90deg,#333,#ff0,#f00); width:0%;"></div><div id="meter-cursor" style="width:6px; height:100%; background:#fff; position:absolute; left:0;"></div></div>
      <button id="kick-action-btn" class="std-btn" onclick="handleKickInput()">KICK!</button>
    </div>

    <div id="animation-container">
      <div id="sim-scoreboard" style="font-family:'Press Start 2P'; font-size:8px; color:#0f0; margin-bottom:8px; line-height:1.4;">RECORD: 0-0</div>
      <div id="tecmo-screen"><div id="main-sprite"></div></div>
      <div id="sim-event-ticker" style="color:#ffb300; font-family:'Press Start 2P'; font-size:10px; margin-top:10px;">MOUSE/TOUCH TO DODGE!</div>
    </div>
    <div id="results" style="font-size:14px; border:2px solid var(--primary); padding:10px; border-radius:10px; background:#111; margin-top:10px;"></div>
    <button id="reset-btn" class="std-btn" onclick="location.reload()" style="display:none; background:#444;">NEW DRAFT</button>
    <button id="challenge-btn" class="std-btn" onclick="handleChallengeAction()" style="background:#013369; display:none;">SHARE</button>
  </div>
</div>

<script>
  const logoMap = {"Arizona Cardinals":"ari","Atlanta Falcons":"atl","Baltimore Ravens":"bal","Buffalo Bills":"buf","Carolina Panthers":"car","Chicago Bears":"chi","Cincinnati Bengals":"cin","Cleveland Browns":"cle","Dallas Cowboys":"dal","Denver Broncos":"den","Detroit Lions":"det","Green Bay Packers":"gb","Houston Texans":"hou","Indianapolis Colts":"ind","Jacksonville Jaguars":"jax","Kansas City Chiefs":"kc","Las Vegas Raiders":"lv","Los Angeles Chargers":"lac","Los Angeles Rams":"lar","Miami Dolphins":"mia","Minnesota Vikings":"min","New England Patriots":"ne","New Orleans Saints":"no","New York Giants":"nyg","New York Jets":"nyj","Philadelphia Eagles":"phi","Pittsburgh Steelers":"pit","San Francisco 49ers":"sf","Seattle Seahawks":"sea","Tampa Bay Buccaneers":"tb","Tennessee Titans":"ten","Washington Commanders":"wsh"};
  const teamThemes = { "Arizona Cardinals":["#97233f","#000000"],"Atlanta Falcons":["#a71930","#000000"],"Baltimore Ravens":["#241773","#000000"],"Buffalo Bills":["#00338d","#c60c30"],"Carolina Panthers":["#0085ca","#000000"],"Chicago Bears":["#0b162a","#c83803"],"Cincinnati Bengals":["#fb4f14","#000000"],"Cleveland Browns":["#311d00","#ff3c00"],"Dallas Cowboys":["#002244","#869397"],"Denver Broncos":["#fb4f14","#002244"],"Detroit Lions":["#0076b6","#b0b7bc"],"Green Bay Packers":["#203731","#ffb612"],"Houston Texans":["#03202f","#a71930"],"Indianapolis Colts":["#002c5f","#a5acaf"],"Jacksonville Jaguars":["#006778","#9f792c"],"Kansas City Chiefs":["#e31837","#ffb612"],"Las Vegas Raiders":["#a5acaf","#000000"],"Los Angeles Chargers":["#0073cf","#ffb612"],"Los Angeles Rams":["#002244","#b3995d"],"Miami Dolphins":["#008e97","#f26a24"],"Minnesota Vikings":["#4f2683","#ffc62f"],"New England Patriots":["#002244","#c60c30"],"New Orleans Saints":["#d3bc8d","#000000"],"New York Giants":["#0b2265","#a71930"],"New York Jets":["#003f2d","#ffffff"],"Philadelphia Eagles":["#004c54","#a5acaf"],"Pittsburgh Steelers":["#000000","#ffb612"],"San Francisco 49ers":["#aa0000","#b3995d"],"Seattle Seahawks":["#002244","#69be28"],"Tampa Bay Buccaneers":["#d50a0a","#000000"],"Tennessee Titans":["#4b92db","#0c2340"],"Washington Commanders":["#5a1414","#ffb612"] };

  let audioCtx, gainNode, rosterData, draftedTeams = [], draftedPlayers = [], roster = {QB:null,RB:null,WR:null,TE:null,Defense:null,Coach:null}, currentTeam, finalWins, challengerWins = 0, bonusWins = 0, eliteCount = 0, vol = 0.5, isMuted = false;
  let kickStep = 1, meterPos = 0, meterDir = 1, meterInterval, powerVal, aimAngle = 0, aimDir = 1;
  let playerTop = 50, dodges = 0, gameActive = false, isStunned = false;

  function initAudio() { if(!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); gainNode = audioCtx.createGain(); gainNode.connect(audioCtx.destination); updateVolume(); } if(audioCtx.state === 'suspended') audioCtx.resume(); }
  function toggleMute() { isMuted = !isMuted; document.getElementById("mute-toggle").innerText = isMuted ? "🔇" : "🔊"; if(gainNode) gainNode.gain.value = isMuted ? 0 : vol * 0.1; }
  function updateVolume() { vol = document.getElementById("volume-slider").value; if(gainNode) gainNode.gain.value = isMuted ? 0 : vol * 0.1; }
  function playNote(f, d = 0.1, type = 'square') { initAudio(); if(isMuted) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = type; o.frequency.value = f; g.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d); }

  function spinTeam() {
    initAudio(); const btn = document.getElementById("start-btn"), img = document.getElementById("team-logo-img");
    if(!rosterData) return; btn.style.display = "none"; img.style.display = "block";
    const available = Object.keys(rosterData).filter(t => !draftedTeams.includes(t));
    let count = 0; function perform() {
      const name = available[Math.floor(Math.random()*available.length)];
      img.src = `https://a.espncdn.com/i/teamlogos/nfl/500/${logoMap[name] || 'nfl'}.png`;
      playNote(150 + count*20); if(count++ < 12) setTimeout(perform, 80); else { currentTeam = name; document.documentElement.style.setProperty('--primary', teamThemes[name][0]); loadRoster(); }
    } perform();
  }

  function loadRoster() { ["position-select","player-select","draft-btn"].forEach(id => document.getElementById(id).disabled=false); updateDropdown(); }
  function updateDropdown() {
    const pos = document.getElementById("position-select").value, sel = document.getElementById("player-select"); sel.innerHTML="";
    let list = (pos==="Defense") ? [`${currentTeam} D/ST`] : (pos==="Coach") ? [rosterData[currentTeam]["Coach"]] : rosterData[currentTeam][pos];
    list.forEach(p => { if(!draftedPlayers.includes(p)) { let o = document.createElement("option"); o.innerText=p; o.value=p; sel.appendChild(o); } });
  }

  function draftPlayer() {
    const pos = document.getElementById("position-select").value, p = document.getElementById("player-select").value, btn = document.getElementById("draft-btn");
    btn.disabled = true; roster[pos] = p; draftedPlayers.push(p); if (p.includes("(ELITE)")) eliteCount++;
    playNote(220, 0.1); setTimeout(() => playNote(110, 0.15), 40);
    const slot = document.getElementById(`roster-${pos}`); slot.querySelector(".player-name").innerText = p;
    slot.style.background = teamThemes[currentTeam][0]; slot.style.borderColor = teamThemes[currentTeam][1];
    draftedTeams.push(currentTeam); document.getElementById("position-select").remove(document.getElementById("position-select").selectedIndex);
    if(Object.values(roster).every(v => v!==null)) { document.getElementById("draft-section").style.display="none"; document.getElementById("sim-btn").style.display="block"; } 
    else { document.getElementById("start-btn").style.display = "block"; document.getElementById("team-logo-img").style.display = "none"; }
  }

  // MOUSE/TOUCH RUNNER ENGINE
  function triggerSimulation() {
    document.getElementById("sim-btn").style.display="none"; document.getElementById("animation-container").style.display="block";
    const sprite = document.getElementById("main-sprite"), screen = document.getElementById("tecmo-screen");
    sprite.style.background = teamThemes[draftedTeams[0]][0]; gameActive = true;
    
    const moveHandler = (e) => {
      if(!gameActive || isStunned) return;
      const rect = screen.getBoundingClientRect();
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
      playerTop = Math.max(10, Math.min(90, (y / rect.height) * 100));
      sprite.style.top = playerTop + "%";
    };

    screen.addEventListener("mousemove", moveHandler);
    screen.addEventListener("touchmove", (e) => { e.preventDefault(); moveHandler(e); }, {passive: false});

    let frame = 0, userWins = 0; const ticker = document.getElementById("sim-event-ticker");
    const gameLoop = setInterval(() => {
      if(frame % 35 === 0) spawnDefender();
      if(frame % 25 === 0 && Math.random() < 0.5) userWins++;
      document.getElementById("sim-scoreboard").innerHTML = `YOU: ${userWins}-${Math.max(0, Math.ceil(frame/25)-userWins)} | BONUS: +${Math.floor(dodges/5)}`;
      if(frame++ > 400) { clearInterval(gameLoop); gameActive = false; finalWins = userWins; bonusWins = Math.floor(dodges/5); setTimeout(() => { document.getElementById("animation-container").style.display="none"; document.getElementById("kicker-container").style.display="block"; startKickerMeter(); }, 1000); }
    }, 40);
  }

  function spawnDefender() {
    const d = document.createElement("div"); d.className = "defender-h"; d.style.top = Math.random()*70 + 15 + "%";
    document.getElementById("tecmo-screen").appendChild(d);
    let left = 110; const dInt = setInterval(() => { 
      left -= 3; d.style.left = left + "%"; 
      if(left < 10 && !d.hit && Math.abs(parseFloat(d.style.top) - playerTop) < 12) { 
        d.hit = true; if(!isStunned) { dodges = Math.max(0, dodges - 2); isStunned = true; document.getElementById("main-sprite").classList.add("stunned"); playNote(80, 0.3, 'sawtooth'); setTimeout(() => { isStunned = false; document.getElementById("main-sprite").classList.remove("stunned"); }, 1500); }
      } else if (left < 5 && !d.hit) { d.hit = true; dodges++; playNote(600, 0.05); }
      if(left < -20) { clearInterval(dInt); d.remove(); } 
    }, 30);
  }

  function startKickerMeter() {
    meterInterval = setInterval(() => {
      if(kickStep === 1) { meterPos += meterDir * 2.2; if(meterPos >= 100 || meterPos <= 0) meterDir *= -1; document.getElementById("meter-cursor").style.left = meterPos + "%"; document.getElementById("p-fill").style.width = meterPos + "%"; }
      else { aimAngle += aimDir * 1.5; if(aimAngle >= 45 || aimAngle <= -45) aimDir *= -1; document.getElementById("meter-cursor").style.left = (aimAngle + 45) / 90 * 100 + "%"; }
    }, 20);
  }

  function handleKickInput() {
    if(kickStep === 1) { kickStep = 2; powerVal = meterPos; document.getElementById("kick-action-btn").innerText = "SET AIM!"; }
    else { clearInterval(meterInterval); executePhysicsKick(); }
  }

  function executePhysicsKick() {
    const ball = document.getElementById("ball-physics"), shadow = document.getElementById("ball-shadow");
    ball.style.display = shadow.style.display = "block";
    let x = 50, y = 10, z = 0, vy = (powerVal / 4) + 12, vx = (aimAngle / 10), grav = 0.38;
    const pInt = setInterval(() => {
      z += 2.2; y += vy; vy -= grav; x += vx;
      ball.style.left = shadow.style.left = x + "%"; ball.style.bottom = y + "px";
      ball.style.transform = `translateX(-50%) scale(${Math.max(0.15, 1 - (z/200))})`;
      shadow.style.transform = `translateX(-50%) scale(${Math.max(0.1, 1 - (z/200))})`;
      if(z >= 185) { clearInterval(pInt); const isGood = (x > 43.5 && x < 56.5 && y > 75); document.getElementById("kick-msg").innerText = isGood ? "IT'S GOOD!" : "MISS!"; bonusWins += isGood ? 2 : -1; setTimeout(() => { document.getElementById("kicker-container").style.display="none"; showFinal(); }, 1200); }
    }, 30);
  }

  function showFinal() {
    const r = document.getElementById("results"), total = Math.max(0, Math.min(17, finalWins + bonusWins));
    r.innerHTML = `FINAL: ${total}-${17-total}<br>Hype Wins: +${bonusWins}`;
    r.style.display="block"; document.getElementById("reset-btn").style.display="block"; document.getElementById("challenge-btn").style.display="block"; if(total>=14) confetti();
  }

  async function handleChallengeAction() {
    const total = Math.max(0, Math.min(17, finalWins + bonusWins));
    navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?w=${total}&t=${encodeURIComponent(Object.values(roster).join(','))}`).then(() => alert("Link Copied!"));
  }
  window.onload = async () => { const res = await fetch('rosters.json'); rosterData = await res.json(); 
    const params = new URLSearchParams(window.location.search);
    if(params.has('t')) { document.getElementById('opponent-squad').style.display = 'block'; document.getElementById('opp-players-list').innerHTML = params.get('t').split(',').map(p => `• ${p}`).join('<br>'); }
  };
</script>
</body>
</html>
