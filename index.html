<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Football Picker: Precision Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root { --primary: #d50a0a; --accent: #013369; --glow: rgba(213, 10, 10, 0.4); }
  body { font-family: 'Inter', sans-serif; background-color: #1a472a; background-image: linear-gradient(90deg, transparent 49%, rgba(255,255,255,0.1) 49%, rgba(255,255,255,0.1) 51%, transparent 51%), repeating-linear-gradient(0deg, #1a472a, #1a472a 100px, #245c38 100px, #245c38 200px); color: #fff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; touch-action: none; }
  
  #main-menu { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
  .menu-input { background: #111; border: 3px solid var(--primary); color: white; padding: 15px; font-family: 'Press Start 2P'; font-size: 12px; width: 260px; margin-bottom: 20px; border-radius: 8px; text-align: center; }
  .mode-btn { width: 260px; margin: 5px; padding: 15px; font-family: 'Bebas Neue'; font-size: 22px; color: white; background: #222; border: 2px solid #444; border-radius: 10px; cursor: pointer; }
  .mode-btn.active { background: var(--primary); border-color: #fff; box-shadow: 0 0 15px var(--glow); }

  .audio-dashboard { position: fixed; top: 10px; right: 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; background: rgba(0,0,0,0.85); padding: 10px; border-radius: 20px; border: 2px solid var(--primary); z-index: 8000; }
  #mute-toggle { background: none; border: none; font-size: 20px; cursor: pointer; color: white; }
  #volume-slider { appearance: none; width: 60px; height: 3px; background: #444; transform: rotate(-90deg); margin: 30px 0; cursor: pointer; }

  .main-container { width: 100%; max-width: 440px; padding: 15px; box-sizing: border-box; display: none; margin-top: 10px; }
  .glass-card { background: rgba(0, 0, 0, 0.96); border-radius: 20px; padding: 15px; box-shadow: 0 10px 40px #000; margin-bottom: 15px; border-top: 5px solid var(--primary); position: relative; }
  
  .team-logo-container { height: 120px !important; width: 100% !important; display: flex !important; align-items: center !important; justify-content: center !important; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 15px; position: relative !important; overflow: hidden !important; border: 2px solid rgba(255,255,255,0.1); }
  #team-logo-img { height: 85px !important; width: auto !important; max-width: 85% !important; display: none; object-fit: contain !important; filter: drop-shadow(0 0 10px #fff); z-index: 10 !important; }
  #start-btn { position: absolute !important; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) !important; width: 80px !important; height: 80px !important; border-radius: 50% !important; border: 4px solid #fff !important; background: radial-gradient(circle, var(--primary) 40%, #800 100%) !important; color: #fff !important; font-family: 'Press Start 2P' !important; font-size: 10px !important; cursor: pointer !important; z-index: 999 !important; box-shadow: 0 0 20px var(--glow) !important; }

  .std-btn { width: 100%; padding: 15px; margin: 8px 0; font-size: 20px; border-radius: 10px; font-family: 'Bebas Neue'; cursor: pointer; border: none; background: var(--primary); color: #fff; box-shadow: 0 4px 0 #800; }
  .std-btn:disabled { background: #333 !important; opacity: 0.5; pointer-events: none; box-shadow: none; }

  /* 16-BIT SPRITE ENGINE */
  .player-sprite { 
    width: 45px !important; 
    height: 60px !important; 
    position: absolute; 
    background-image: url('16-bit pixel art spr.jpg') !important; 
    background-size: 400% 300% !important; 
    background-position-y: 100% !important; 
    image-rendering: pixelated !important; 
    animation: runAnim 0.4s steps(4) infinite; 
    z-index: 20; 
    mix-blend-mode: screen !important;
  }
  @keyframes runAnim { from { background-position-x: 0%; } to { background-position-x: 133.33%; } }
  
  .stunned { animation: flashStun 0.1s infinite; filter: grayscale(1) brightness(2) !important; }
  @keyframes flashStun { 0% { opacity: 1; } 100% { opacity: 0.3; } }
  .defender-16 { background-position-y: 0% !important; filter: drop-shadow(0 0 10px #fff); }

  #animation-container, #kicker-container { display: none !important; }
  #tecmo-screen { height: 180px; width: 100%; position: relative; overflow: hidden; background: #2e7d32; border: 3px solid #fff; border-radius: 12px; }

  /* 16-BIT FGMG FIELD */
  .goal-field-top { width: 100%; height: 320px; background: #1b5e20; background-image: repeating-linear-gradient(0deg, #1b5e20, #1b5e20 40px, #246b28 40px, #246b28 80px); position: relative; border: 4px solid #fff; border-radius: 15px; overflow: hidden; }
  .top-uprights { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 100px; height: 12px; border-bottom: 6px solid #ffd700; display: flex; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
  .post-tip { width: 10px; height: 25px; background: #ffd700; margin-top: -15px; border-radius: 2px; }
  #ball-top { width: 20px; height: 24px; background: #8b4513; border-radius: 50%; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); border: 2px solid #fff; z-index: 100; cursor: grab; }
  #traj-line { position: absolute; height: 4px; background: rgba(255,255,255,0.7); border: 1px dashed #fff; transform-origin: left center; display: none; pointer-events: none; z-index: 90; border-radius: 2px; }

  .roster-slot { background: rgba(0,0,0,0.7); padding: 8px; margin: 5px 0; border-radius: 10px; display: flex; align-items: center; gap: 10px; text-align: left; border-left: 6px solid #333; transition: all 0.4s ease; }
  .avatar-box { width: 35px; height: 35px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 6px; }
  .player-name { font-weight: bold; font-size: 14px; color: #fff; flex-grow: 1; text-shadow: 1px 1px 2px #000; }
  
  #results { background:#111; border-radius:10px; padding:15px; margin-top:10px; display:none; max-height: 400px; overflow-y: auto; border: 2px solid var(--primary); }
  #results-table { font-family: 'Press Start 2P'; font-size: 7px; width: 100%; border-collapse: collapse; background: #000; }
  #results-table td { padding: 8px; border-bottom: 1px solid #333; }
</style>
</head>
<body>

<div id="main-menu">
  <h1 style="font-family:'Bebas Neue'; font-size: 50px; color: var(--primary);">FOOTBALL ARCADE</h1>
  <input type="text" id="team-name-input" class="menu-input" placeholder="ENTER TEAM NAME" maxlength="12">
  <button class="mode-btn active" id="solo-btn" onclick="setMode('solo')">SOLO CAREER</button>
  <button class="mode-btn" id="vs-btn" onclick="setMode('vs')">VERSUS MODE</button>
  <button class="std-btn" style="width: 260px; margin-top: 20px; font-size: 26px;" onclick="startGame()">KICKOFF</button>
</div>

<div class="audio-dashboard">
  <button id="mute-toggle" onclick="toggleMute()">🔊</button>
  <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateVolume()">
</div>

<div class="main-container" id="game-ui">
  <div class="glass-card" id="draft-board-container">
    <h1 id="ui-team-name">NAME</h1>
    <div class="team-logo-container">
      <img id="team-logo-img" src="">
      <button id="start-btn" onclick="spinTeam()">SPIN</button>
    </div>
    <div id="selection-controls">
      <select id="position-select" onchange="updateDropdown()" disabled style="width:100%; padding:15px; margin:8px 0; background:#111; color:#fff; border:2px solid var(--primary); font-family:'Bebas Neue';"><option value="QB">QB</option><option value="RB">RB</option><option value="WR">WR</option><option value="TE">TE</option><option value="Defense">DEF</option><option value="Coach">HC</option></select>
      <select id="player-select" disabled style="width:100%; padding:15px; margin:8px 0; background:#111; color:#fff; border:2px solid var(--primary); font-family:'Bebas Neue';"><option>...</option></select>
      <button id="draft-btn" class="std-btn" onclick="draftPlayer()" disabled>LOCK PICK</button>
    </div>
  </div>

  <div class="glass-card">
    <div id="roster-slots">
      <div id="roster-QB" class="roster-slot"><div class="avatar-box">🏈</div><div class="player-name">---</div></div>
      <div id="roster-RB" class="roster-slot"><div class="avatar-box">🏃</div><div class="player-name">---</div></div>
      <div id="roster-WR" class="roster-slot"><div class="avatar-box">👐</div><div class="player-name">---</div></div>
      <div id="roster-TE" class="roster-slot"><div class="avatar-box">💪</div><div class="player-name">---</div></div>
      <div id="roster-Defense" class="roster-slot"><div class="avatar-box">🛡️</div><div class="player-name">---</div></div>
      <div id="roster-Coach" class="roster-slot"><div class="avatar-box">📋</div><div class="player-name">---</div></div>
    </div>
    <button id="sim-btn" class="std-btn" onclick="triggerSMG()" style="margin-top: 15px; background: #28a745; display:none;">START SEASON SIM</button>
    
    <div id="kicker-container">
      <div id="kick-msg" style="color:#0f0; font-family:'Press Start 2P'; font-size:10px; height:15px; margin-bottom:8px;">PULL BACK & RELEASE!</div>
      <div class="goal-field-top" id="fg-field">
        <div class="top-uprights" id="uprights-ui"><div class="post-tip"></div><div class="post-tip"></div></div>
        <div id="traj-line"></div>
        <div id="ball-top"></div>
      </div>
    </div>

    <div id="animation-container">
      <div id="sim-scoreboard" style="font-family:'Press Start 2P'; font-size:8px; color:#0f0; margin-bottom:10px;">WEEK 1 vs ???</div>
      <div id="tecmo-screen"><div id="main-sprite" class="player-sprite"></div></div>
    </div>
    <div id="results"></div>
    <button id="reset-btn" class="std-btn" onclick="location.reload()" style="display:none; background:#444;">NEW DRAFT</button>
  </div>
</div>

<script>
  let rosterData, draftedTeams = [], draftedPlayers = [], roster = {QB:null,RB:null,WR:null,TE:null,Defense:null,Coach:null}, currentTeam;
  let audioCtx, gainNode, vol = 0.5, isMuted = false, lockedCount = 0, bonusWins = 0, playerTop = 50, dodges = 0, gameActive = false, isStunned = false;
  let seasonSchedule = [];

  const logoMap = {"Arizona Cardinals":"ari","Atlanta Falcons":"atl","Baltimore Ravens":"bal","Buffalo Bills":"buf","Carolina Panthers":"car","Chicago Bears":"chi","Cincinnati Bengals":"cin","Cleveland Browns":"cle","Dallas Cowboys":"dal","Denver Broncos":"den","Detroit Lions":"det","Green Bay Packers":"gb","Houston Texans":"hou","Indianapolis Colts":"ind","Jacksonville Jaguars":"jax","Kansas City Chiefs":"kc","Las Vegas Raiders":"lv","Los Angeles Chargers":"lac","Los Angeles Rams":"lar","Miami Dolphins":"mia","Minnesota Vikings":"min","New England Patriots":"ne","New Orleans Saints":"no","New York Giants":"nyg","New York Jets":"nyj","Philadelphia Eagles":"phi","Pittsburgh Steelers":"pit","San Francisco 49ers":"sf","Seattle Seahawks":"sea","Tampa Bay Buccaneers":"tb","Tennessee Titans":"ten","Washington Commanders":"wsh"};
  const teamThemes = { "Arizona Cardinals":["#97233f","#000000"],"Atlanta Falcons":["#a71930","#000000"],"Baltimore Ravens":["#241773","#000000"],"Buffalo Bills":["#00338d","#c60c30"],"Carolina Panthers":["#0085ca","#000000"],"Chicago Bears":["#0b162a","#c83803"],"Cincinnati Bengals":["#fb4f14","#000000"],"Cleveland Browns":["#311d00","#ff3c00"],"Dallas Cowboys":["#002244","#869397"],"Denver Broncos":["#fb4f14","#002244"],"Detroit Lions":["#0076b6","#b0b7bc"],"Green Bay Packers":["#203731","#ffb612"],"Houston Texans":["#03202f","#a71930"],"Indianapolis Colts":["#002c5f","#a5acaf"],"Jacksonville Jaguars":["#006778","#9f792c"],"Kansas City Chiefs":["#e31837","#ffb612"],"Las Vegas Raiders":["#a5acaf","#000000"],"Los Angeles Chargers":["#0073cf","#ffb612"],"Los Angeles Rams":["#002244","#b3995d"],"Miami Dolphins":["#008e97","#f26a24"],"Minnesota Vikings":["#4f2683","#ffc62f"],"New England Patriots":["#002244","#c60c30"],"New Orleans Saints":["#d3bc8d","#000000"],"New York Giants":["#0b2265","#a71930"],"New York Jets":["#003f2d","#ffffff"],"Philadelphia Eagles":["#004c54","#a5acaf"],"Pittsburgh Steelers":["#000000","#ffb612"],"San Francisco 49ers":["#aa0000","#b3995d"],"Seattle Seahawks":["#002244","#69be28"],"Tampa Bay Buccaneers":["#d50a0a","#000000"],"Tennessee Titans":["#4b92db","#0c2340"],"Washington Commanders":["#5a1414","#ffb612"] };

  function initAudio() { if(!audioCtx) { audioCtx = new AudioContext(); gainNode = audioCtx.createGain(); gainNode.connect(audioCtx.destination); updateVolume(); } }
  function toggleMute() { isMuted = !isMuted; document.getElementById("mute-toggle").innerText = isMuted ? "🔇" : "🔊"; if(gainNode) gainNode.gain.value = isMuted ? 0 : vol * 0.1; }
  function updateVolume() { vol = document.getElementById("volume-slider").value; if(gainNode) gainNode.gain.value = isMuted ? 0 : vol * 0.1; }
  function playNote(f, d = 0.1) { initAudio(); if(isMuted) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = 'square'; o.frequency.value = f; g.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d); }

  function setMode(m) { document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); document.getElementById(m + '-btn').classList.add('active'); }
  function startGame() { const n = document.getElementById('team-name-input').value; if(!n) return alert("ENTER TEAM NAME"); document.getElementById('ui-team-name').innerText = n.toUpperCase(); document.getElementById('main-menu').style.display = 'none'; document.getElementById('game-ui').style.display = 'block'; initAudio(); }

  function spinTeam() {
    initAudio(); const btn = document.getElementById("start-btn"), img = document.getElementById("team-logo-img");
    btn.style.display = "none"; img.style.display = "block";
    const available = Object.keys(rosterData).filter(t => !draftedTeams.includes(t));
    let count = 0; function perform() {
      const name = available[Math.floor(Math.random()*available.length)]; img.src = `https://a.espncdn.com/i/teamlogos/nfl/500/${logoMap[name]}.png`;
      playNote(150 + count*20, 0.05); if(count++ < 12) setTimeout(perform, 80); else { currentTeam = name; loadRoster(); }
    } perform();
  }

  function loadRoster() { ["position-select","player-select","draft-btn"].forEach(id => document.getElementById(id).disabled=false); updateDropdown(); }
  function updateDropdown() {
    const pos = document.getElementById("position-select").value, sel = document.getElementById("player-select");
    sel.innerHTML = "";
    let list = (pos==="Defense") ? [`${currentTeam} D/ST`] : (pos==="Coach") ? [rosterData[currentTeam]["Coach"]] : rosterData[currentTeam][pos];
    list.forEach(p => { if(!draftedPlayers.includes(p)) { let o = document.createElement("option"); o.innerText=p; o.value=p; sel.appendChild(o); } });
  }

  function draftPlayer() {
    const pos = document.getElementById("position-select").value, p = document.getElementById("player-select").value;
    if(!p) return;
    roster[pos] = p; draftedPlayers.push(p); draftedTeams.push(currentTeam); lockedCount++;
    playNote(220); setTimeout(() => playNote(110, 0.2), 50);
    const slot = document.getElementById(`roster-${pos}`); slot.querySelector(".player-name").innerText = p;
    slot.style.background = teamThemes[currentTeam][0]; slot.style.borderLeft = `8px solid ${teamThemes[currentTeam][1]}`;
    
    if(lockedCount >= 6) { 
        document.getElementById("draft-board-container").style.display = "none";
        document.getElementById("sim-btn").style.display = "block";
    } else {
        document.getElementById("start-btn").style.display = "block";
        document.getElementById("team-logo-img").style.display = "none";
        ["position-select","player-select","draft-btn"].forEach(id => document.getElementById(id).disabled=true);
    }
  }

  function triggerSMG() {
    document.getElementById("sim-btn").style.display="none"; document.getElementById("animation-container").style.setProperty('display', 'block', 'important');
    const sprite = document.getElementById("main-sprite"), screen = document.getElementById("tecmo-screen");
    document.documentElement.style.setProperty('--primary', teamThemes[draftedTeams[0]][0]); gameActive = true;
    
    const allT = Object.keys(rosterData);
    for(let i=0; i<17; i++) seasonSchedule.push(allT[Math.floor(Math.random()*allT.length)]);

    screen.onmousemove = (e) => { if(!gameActive || isStunned) return; const rect = screen.getBoundingClientRect(); playerTop = Math.max(10, Math.min(90, ((e.clientY - rect.top) / rect.height) * 100)); sprite.style.top = playerTop + "%"; };
    
    let frame = 0; const loop = setInterval(() => {
      const currentWeekIdx = Math.min(16, Math.floor(frame / 24));
      const opp = seasonSchedule[currentWeekIdx];
      document.getElementById("sim-scoreboard").innerText = `WEEK ${currentWeekIdx+1} vs ${opp.split(' ').pop().toUpperCase()} | HYPE: +${Math.floor(dodges/6)}`;
      if(frame % 35 === 0) spawnDefender(teamThemes[opp][0]);
      if(frame++ > 400) { clearInterval(loop); gameActive = false; bonusWins = Math.floor(dodges/6); startFGMG(); }
    }, 40);
  }

  function spawnDefender(color) {
    const d = document.createElement("div"); d.className = "defender-16 player-sprite";
    d.style.top = Math.random()*70 + 15 + "%";
    d.style.filter = `drop-shadow(0 0 10px ${color})`;
    document.getElementById("tecmo-screen").appendChild(d);
    let left = 110; const dInt = setInterval(() => { left -= 3.5; d.style.left = left + "%"; 
      if(left < 15 && !d.hit && Math.abs(parseFloat(d.style.top) - playerTop) < 15) { d.hit = true; isStunned = true; dodges = Math.max(0, dodges-2); d.classList.add("stunned"); playNote(80, 0.4); setTimeout(() => { isStunned = false; d.classList.remove("stunned"); }, 1200); }
      else if (left < 5 && !d.hit) { d.hit = true; dodges++; }
      if(left < -20) { clearInterval(dInt); d.remove(); }
    }, 30);
  }

  function startFGMG() {
    document.getElementById("animation-container").style.setProperty('display', 'none', 'important');
    document.getElementById("kicker-container").style.setProperty('display', 'block', 'important');
    const ball = document.getElementById("ball-top"), traj = document.getElementById("traj-line"), field = document.getElementById("fg-field");
    let isDragging = false, startX, startY;
    ball.onmousedown = (e) => { isDragging = true; startX = e.clientX; startY = e.clientY; traj.style.display = "block"; };
    window.onmousemove = (e) => {
      if(!isDragging) return;
      const dx = startX - e.clientX, dy = startY - e.clientY;
      const angle = Math.atan2(-dy, -dx); // Inverted direction for billiard feel
      const dist = Math.min(120, Math.sqrt(dx*dx + dy*dy));
      traj.style.left = "50%"; traj.style.bottom = "40px"; traj.style.width = dist + "px";
      traj.style.transform = `rotate(${angle * 180 / Math.PI}deg)`;
    };
    window.onmouseup = (e) => { 
      if(!isDragging) return; isDragging = false; traj.style.display = "none";
      launchBall((startX - e.clientX)/8, (startY - e.clientY)/8);
    };
  }

  function launchBall(vx, vy) {
    const ball = document.getElementById("ball-top"); let bx = 0, by = 40;
    const bLoop = setInterval(() => { 
      bx += vx; by -= vy; // subtract vy because pulling down (positive vy) should move ball up
      ball.style.left = `calc(50% + ${bx}px)`; ball.style.bottom = by + "px";
      if(by > 320 || Math.abs(bx) > 200) { clearInterval(bLoop); const hit = by > 280 && Math.abs(bx) < 50; document.getElementById("kick-msg").innerText = hit ? "IT'S GOOD!" : "MISS!"; bonusWins += hit ? 3 : -1; setTimeout(showFinal, 1500); }
    }, 20);
  }

  function showFinal() {
    document.getElementById("kicker-container").style.display = "none";
    const r = document.getElementById("results"), totalWins = Math.max(0, Math.min(17, (Math.floor(Math.random()*6) + 4) + bonusWins)), allT = Object.keys(rosterData);
    let table = `<table id="results-table"><thead><tr><th>WK</th><th>OPP</th><th>SCORE</th><th>RES</th></tr></thead><tbody>`;
    for(let i=1; i<=17; i++) {
      const isW = i <= totalWins, opp = seasonSchedule[i-1].split(' ').pop().toUpperCase();
      const s1 = isW ? Math.floor(Math.random()*17)+21 : Math.floor(Math.random()*21), s2 = isW ? Math.floor(Math.random()*s1) : Math.floor(Math.random()*17)+24;
      table += `<tr><td>${i}</td><td>${opp}</td><td>${s1}-${s2}</td><td>${isW?'W':'L'}</td></tr>`;
    }
    r.innerHTML = `<h2>FINAL: ${totalWins}-${17-totalWins}</h2>${table}</tbody></table>`;
    r.style.display = "block"; document.getElementById("reset-btn").style.display = "block";
    if(totalWins >= 14) confetti();
  }

  window.onload = async () => { try { const res = await fetch('rosters.json'); rosterData = await res.json(); } catch(e) {} };
</script>
</body>
</html>
