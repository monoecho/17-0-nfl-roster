<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17-0 NFL Roster Builder: Stadium Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root { --primary: #d50a0a; --accent: #013369; }
  body { 
    font-family: 'Inter', sans-serif; background-color: #2e7d32; 
    background-image: linear-gradient(90deg, transparent 49%, rgba(255,255,255,0.3) 49%, rgba(255,255,255,0.3) 51%, transparent 51%),
      repeating-linear-gradient(0deg, #2e7d32, #2e7d32 100px, #388e3c 100px, #388e3c 200px);
    color: #fff; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; 
  }
  .main-container { width: 100%; max-width: 540px; min-height: 100vh; padding: 20px; box-sizing: border-box; position: relative; }
  .glass-card { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px); border-radius: 20px; padding: 25px; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9); margin-bottom: 20px; text-align: center; border-top: 6px solid var(--primary); }
  
  h2 { font-family: 'Press Start 2P', cursive; font-size: 14px; text-shadow: 3px 3px 0 var(--primary); margin-bottom: 25px; line-height: 1.6; }
  select, button { width: 100%; padding: 18px; margin: 10px 0; font-size: 22px; border-radius: 10px; box-sizing: border-box; }
  button { font-family: 'Bebas Neue', sans-serif; background: var(--primary); color: white; border: none; cursor: pointer; text-transform: uppercase; }
  #mute-toggle { width: auto; position: absolute; top: 15px; right: 15px; padding: 8px 12px; font-size: 10px; background:#333; z-index: 1001; }

  /* FIELD GOAL GAME */
  #kicker-container { display: none; background: #111; padding: 20px; border-radius: 15px; border: 3px solid #ffb300; position: relative; }
  .goal-posts { width: 100%; height: 120px; border-left: 10px solid yellow; border-right: 10px solid yellow; border-bottom: 10px solid yellow; margin-bottom: 40px; position: relative; }
  #kicking-ball { width: 24px; height: 34px; background: #8b4513; border-radius: 50%; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); border: 2px solid #fff; display: none; }
  
  /* ANIMATION FOR KICK */
  @keyframes ballFlight {
    0% { bottom: -20px; transform: translateX(-50%) scale(1); }
    50% { bottom: 150px; transform: translateX(-50%) scale(0.5); }
    100% { bottom: 120px; transform: translateX(-50%) scale(0.3); opacity: 0; }
  }

  .kick-meter { width: 100%; height: 30px; background: #333; border-radius: 15px; position: relative; overflow: hidden; }
  .meter-target { width: 50px; height: 100%; background: #0f0; position: absolute; left: 50%; transform: translateX(-50%); box-shadow: 0 0 15px #0f0; }
  #meter-cursor { width: 20px; height: 20px; background: #fff; border-radius: 50%; position: absolute; top: 5px; left: 0; animation: slide 0.8s ease-in-out infinite alternate; }
  @keyframes slide { from { left: 5%; } to { left: 90%; } }

  /* RESTORED SIM ANIMATION */
  #animation-container { display: none; margin: 25px 0; }
  #tecmo-screen { width: 100%; height: 160px; background-color: #2e7d32; position: relative; overflow: hidden; border: 4px solid #fff; border-radius: 10px; }
  .yard-line { width: 100%; height: 3px; background: rgba(255,255,255,0.4); position: absolute; animation: scrollField 0.8s linear infinite; }
  @keyframes scrollField { 0% { top: -10%; } 100% { top: 110%; } }
  .tecmo-player { width: 22px; height: 22px; background: var(--accent); position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); animation: runDodging 2s ease-in-out infinite; box-shadow: 3px 3px 0 #000; }
  @keyframes runDodging { 0%, 100% { left: 40%; } 50% { left: 60%; } }

  #sim-scoreboard { font-family: 'Press Start 2P', cursive; font-size: 14px; color: #0f0; margin-bottom: 12px; }
  #results { display: none; padding: 25px; border-radius: 16px; border: 4px solid var(--primary); background: #111; font-size: 18px; }
</style>
</head>
<body>

<div class="main-container">
  <button id="mute-toggle" onclick="toggleMute()">SOUND: ON</button>

  <div class="glass-card" id="draft-section">
    <h2>UNDERGROUND<br>STADIUM BUILDER</h2>
    <div class="team-logo-container" style="height:150px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.05); border-radius:15px; margin-bottom:15px;">
      <button id="start-btn" onclick="startFirstSpin()">INSERT COIN</button>
      <img id="team-logo-img" style="max-height:130px; display:none;">
    </div>
    <select id="position-select" onchange="updatePlayerDropdown()" disabled><option value="QB">QB</option><option value="RB">RB</option><option value="WR">WR</option><option value="TE">TE</option><option value="Defense">DEF</option><option value="Coach">HC</option></select>
    <select id="player-select" disabled><option>...</option></select>
    <button id="draft-btn" onclick="draftPlayer()" disabled>LOCK IN PICK</button>
  </div>

  <div class="glass-card">
    <div id="roster-display">
      <div id="roster-QB" style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #333;"><span>QB</span><b class="p-name">---</b></div>
      <div id="roster-RB" style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #333;"><span>RB</span><b class="p-name">---</b></div>
      <div id="roster-WR" style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #333;"><span>WR</span><b class="p-name">---</b></div>
      <div id="roster-TE" style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #333;"><span>TE</span><b class="p-name">---</b></div>
      <div id="roster-Defense" style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #333;"><span>DEF</span><b class="p-name">---</b></div>
      <div id="roster-Coach" style="display:flex; justify-content:space-between; padding:8px;"><span>HC</span><b class="p-name">---</b></div>
    </div>
    
    <button id="sim-btn" onclick="triggerSimulation()" style="display:none; background: #28a745;">SIMULATE SEASON</button>

    <div id="kicker-container">
      <h3 style="font-family:'Press Start 2P'; font-size:10px; color:#ffb300;">MID-SEASON FIELD GOAL</h3>
      <div class="goal-posts"><div id="kicking-ball"></div></div>
      <div class="kick-meter"><div class="meter-target"></div><div id="meter-cursor"></div></div>
      <button id="kick-action-btn" onclick="attemptKick()">KICK!</button>
    </div>

    <div id="animation-container">
      <div id="sim-scoreboard">RECORD: 0-0</div>
      <div id="tecmo-screen">
        <div class="yard-line" style="top:25%"></div><div class="yard-line" style="top:50%"></div><div class="yard-line" style="top:75%"></div>
        <div class="tecmo-player"></div>
      </div>
      <div id="sim-event-ticker" style="color:#ffb300; font-size:10px; margin-top:10px; font-family:'Press Start 2P';"></div>
    </div>

    <div id="results"></div>
    <button id="reset-btn" onclick="location.reload()" style="display:none; background: #444;">NEW DRAFT</button>
  </div>
</div>

<script>
  let isMuted = false, audioCtx = null, rosterData = null, draftedTeams = [], roster = {QB:null,RB:null,WR:null,TE:null,Defense:null,Coach:null}, currentTeam = null, finalWins = 0, bonusWins = 0;
  const logoMap = {"Arizona Cardinals":"ari","Atlanta Falcons":"atl","Baltimore Ravens":"bal","Buffalo Bills":"buf","Carolina Panthers":"car","Chicago Bears":"chi","Cincinnati Bengals":"cin","Cleveland Browns":"cle","Dallas Cowboys":"dal","Denver Broncos":"den","Lions":"det","Packers":"gb","Texans":"hou","Colts":"ind","Jaguars":"jax","Chiefs":"kc","Raiders":"lv","Chargers":"lac","Rams":"lar","Dolphins":"mia","Vikings":"min","Patriots":"ne","Saints":"no","Giants":"nyg","Jets":"nyj","Eagles":"phi","Steelers":"pit","49ers":"sf","Seahawks":"sea","Buccaneers":"tb","Titans":"ten","Commanders":"wsh"};

  function toggleMute() { isMuted = !isMuted; document.getElementById("mute-toggle").innerText = isMuted ? "OFF" : "ON"; }
  function playSound(f, d=0.05, type='square') { if(isMuted) return; if(!audioCtx) audioCtx = new AudioContext(); const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type=type; o.frequency.value=f; g.gain.value=0.01; o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); }
  function playCrowd() { if(isMuted) return; const bufSize = audioCtx.sampleRate * 2, buffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate), data = buffer.getChannelData(0); for(let i=0; i<bufSize; i++) data[i] = Math.random() * 2 - 1; const src = audioCtx.createBufferSource(), g = audioCtx.createGain(); src.buffer = buffer; g.gain.setValueAtTime(0, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.5); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2); src.connect(g); g.connect(audioCtx.destination); src.start(); }

  function startFirstSpin() { playSound(600); document.getElementById("start-btn").style.display="none"; spinTeam(); }
  function spinTeam() {
    const img = document.getElementById("team-logo-img"); img.style.display="block";
    const available = Object.keys(rosterData).filter(t => !draftedTeams.includes(t));
    let count = 0;
    function perform() {
      const name = available[Math.floor(Math.random()*available.length)];
      img.src = `https://a.espncdn.com/i/teamlogos/nfl/500/${logoMap[name]||'nfl'}.png`;
      playSound(300 + count*10);
      if(count++ < 20) setTimeout(perform, 100);
      else { currentTeam = name; loadRoster(); }
    }
    perform();
  }
  function loadRoster() { ["position-select","player-select","draft-btn"].forEach(id => document.getElementById(id).disabled=false); updateDropdown(); }
  function updateDropdown() {
    const pos = document.getElementById("position-select").value, sel = document.getElementById("player-select"); sel.innerHTML="";
    let list = (pos==="Defense") ? [`${currentTeam} D/ST`] : (pos==="Coach") ? [rosterData[currentTeam]["Coach"]] : rosterData[currentTeam][pos];
    list.forEach(p => { let o = document.createElement("option"); o.innerText=p; sel.appendChild(o); });
  }
  function draftPlayer() {
    const pos = document.getElementById("position-select").value, p = document.getElementById("player-select").value;
    roster[pos] = p; document.getElementById(`roster-${pos}`).querySelector(".p-name").innerText = p;
    draftedTeams.push(currentTeam); document.getElementById("position-select").remove(document.getElementById("position-select").selectedIndex);
    if(Object.values(roster).every(v => v!==null)) { document.getElementById("draft-section").style.display="none"; document.getElementById("sim-btn").style.display="block"; }
    else spinTeam();
  }
  function triggerSimulation() {
    document.getElementById("sim-btn").style.display="none"; document.getElementById("animation-container").style.display="block";
    finalWins = Math.floor(Math.random()*8)+4;
    let step = 0; const timer = setInterval(() => {
      document.getElementById("sim-scoreboard").innerText = `RECORD: ${Math.floor((finalWins/6)*(step+1))}-${Math.floor(((17-finalWins)/6)*(step+1))}`;
      if(step === 2) { clearInterval(timer); setTimeout(() => { document.getElementById("animation-container").style.display="none"; document.getElementById("kicker-container").style.display="block"; }, 1500); }
      if(step++ >= 5) { clearInterval(timer); showFinal(); }
    }, 2000);
  }
  function attemptKick() {
    const ball = document.getElementById("kicking-ball"), cursor = document.getElementById("meter-cursor"), target = document.querySelector(".meter-target");
    const cursorX = cursor.offsetLeft, targetX = target.offsetLeft, targetW = target.offsetWidth;
    document.getElementById("kick-action-btn").disabled = true;
    ball.style.display = "block"; ball.style.animation = "ballFlight 1s forwards";
    playCrowd();
    setTimeout(() => {
      if(cursorX >= targetX && cursorX <= (targetX + targetW)) { bonusWins = 2; playSound(800, 0.5); alert("IT'S GOOD! +2 WINS"); }
      else { bonusWins = -1; playSound(200, 0.5); alert("WIDE LEFT! -1 WIN"); }
      document.getElementById("kicker-container").style.display="none"; showFinal();
    }, 1100);
  }
  function showFinal() {
    document.getElementById("animation-container").style.display="none";
    const r = document.getElementById("results"), total = Math.max(0, Math.min(17, finalWins + bonusWins));
    r.innerHTML = `<h2>FINAL: ${total}-${17-total}</h2><p>${total>=12?"🔥 LEGENDARY GM.":"💩 DUMPSTER FIRE."}</p>`;
    r.style.display="block"; document.getElementById("reset-btn").style.display="block"; if(total>=13) confetti();
  }
  window.onload = async () => { const res = await fetch('rosters.json'); rosterData = await res.json(); };
</script>
</body>
</html>
